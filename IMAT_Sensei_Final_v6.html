67 mol; O = 53.33 g / 16 = 3.33 mol. Divide by smallest (3.33): C : H : O = 1 : 2 : 1 → empirical formula = CH₂O. This is the formula for formaldehyde and also the empirical formula of glucose (C₆H₁₂O₆ = 6 × CH₂O) and fructose.`,concepts_tested:[`empirical formula`,`percentage composition`,`mole ratios`,`molecular formula`,`stoichiometry`],formulas_used:[],common_trap:`Steps: (1) % → g (assume 100g). (2) g → moles (divide by Ar). (3) Divide all by smallest mole value. (4) Round to whole numbers. CH₂O is the empirical formula — glucose is 6×(CH₂O).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00184`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Balancing Equations`,subtopic:`Balancing Equations`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`What are the coefficients needed to balance: Fe + O₂ → Fe₂O₃?`,options:[`A) 1, 1, 1`,`B) 4, 3, 2`,`C) 2, 3, 2`,`D) 4, 3, 4`,`E) 2, 1, 2`],correct_index:1,explanation:`4Fe + 3O₂ → 2Fe₂O₃. Check: Left: 4 Fe, 6 O. Right: 4 Fe (2×2), 6 O (2×3). ✓ Balanced. Method: balance metals first, then non-metals, then adjust if needed. This is the rusting/oxidation of iron reaction. Conservation of mass and atoms: same number of each element on both sides.`,concepts_tested:[`balancing equations`,`iron oxide`,`stoichiometry`,`conservation of mass`,`coefficients`],formulas_used:[],common_trap:`Balance by inspection: start with Fe (Fe₂O₃ has 2 Fe → need even number of Fe on left). Then balance O. Always check both sides at the end.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00185`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Concentration`,subtopic:`Concentration`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A solution contains 5.85 g of NaCl (molar mass = 58.5 g/mol) dissolved in 500 mL of water. What is its concentration?`,options:[`A) 0.100 mol/L`,`B) 0.200 mol/L`,`C) 1.00 mol/L`,`D) 0.500 mol/L`,`E) 11.7 mol/L`],correct_index:1,explanation:`Moles of NaCl = mass/molar mass = 5.85/58.5 = 0.100 mol. Volume = 500 mL = 0.500 L. Concentration = moles/volume = 0.100/0.500 = 0.200 mol/L. Note: always convert mL to L before dividing. Concentration (molarity, M or mol/L) = moles of solute / litres of solution.`,concepts_tested:[`concentration`,`molarity`,`NaCl`,`solution chemistry`,`moles`],formulas_used:[],common_trap:`c = n/V. Convert mL → L. Then n = m/Mr. Putting it together: c = m/(Mr × V_L). This is the most basic concentration calculation — do it every time without a calculator until it's automatic.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00186`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Avogadro's Number`,subtopic:`Avogadro's Number`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`How many molecules are in 2 moles of CO₂?`,options:[`A) 6.022 × 10²³`,`B) 1.204 × 10²⁴`,`C) 3.011 × 10²³`,`D) 2.408 × 10²⁴`,`E) 6.022 × 10²⁴`],correct_index:1,explanation:`Avogadro's number: 1 mole = 6.022 × 10²³ particles. For 2 moles: 2 × 6.022 × 10²³ = 1.204 × 10²⁴ molecules. Each CO₂ molecule contains 3 atoms (1 C + 2 O), so the total number of atoms = 3 × 1.204 × 10²⁴ = 3.612 × 10²⁴ atoms. N = n × Nₐ where N = number of particles, n = moles, Nₐ = 6.022 × 10²³ mol⁻¹.`,concepts_tested:[`Avogadro's number`,`moles`,`molecules`,`CO2`,`stoichiometry`],formulas_used:[],common_trap:`N = n × 6.022 × 10²³. For atoms in a compound: multiply by atoms per molecule. 2 mol CO₂ = 1.204 × 10²⁴ molecules = 3.612 × 10²⁴ atoms total.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00187`,subject:`Chemistry`,chapter:`Ch6: Aqueous Equilibria & Kinetics`,topic:`Le Chatelier`,subtopic:`Le Chatelier`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`For the equilibrium: N₂(g) + 3H₂(g) ⇌ 2NH₃(g)  ΔH = -92 kJ/mol

What effect does INCREASING PRESSURE have on this equilibrium?`,options:[`A) Shifts equilibrium to the LEFT (more N₂ and H₂)`,`B) Shifts equilibrium to the RIGHT (more NH₃)`,`C) Has no effect on position of equilibrium`,`D) Increases the rate of forward reaction only`,`E) Decreases the value of Kc`],correct_index:1,explanation:`Le Chatelier's Principle: increasing pressure shifts equilibrium towards the side with FEWER moles of gas. Left side: 1 + 3 = 4 moles gas. Right side: 2 moles gas. Fewer moles on the right → equilibrium shifts RIGHT → more NH₃ produced. This is used industrially in the Haber process (200-300 atm). Increasing temperature shifts LEFT (exothermic reaction, removing heat). Neither P nor T changes Kc value — only temperature changes Kc.`,concepts_tested:[`Le Chatelier`,`equilibrium`,`Haber process`,`pressure`,`moles of gas`],formulas_used:[],common_trap:`Higher pressure → shift to side with FEWER gas moles. Temperature changes Kc (and shifts equilibrium). Pressure and concentration changes do NOT change Kc, only the position of equilibrium.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00188`,subject:`Chemistry`,chapter:`Ch6: Aqueous Equilibria & Kinetics`,topic:`Kc Expression`,subtopic:`Kc Expression`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`For the equilibrium: 2SO₂(g) + O₂(g) ⇌ 2SO₃(g), what is the correct expression for Kc?`,options:[`A) Kc = [SO₃]² / ([SO₂]² × [O₂])`,`B) Kc = [SO₂]² × [O₂] / [SO₃]²`,`C) Kc = [SO₃] / ([SO₂] × [O₂])`,`D) Kc = 2[SO₃] / (2[SO₂] × [O₂])`,`E) Kc = [SO₃]² × [SO₂]² × [O₂]`],correct_index:0,explanation:`Kc = [products]^coefficients / [reactants]^coefficients (at equilibrium, from the balanced equation). For 2SO₂ + O₂ ⇌ 2SO₃: Kc = [SO₃]² / ([SO₂]² × [O₂]). The coefficients from the balanced equation become the POWERS in the equilibrium expression. Note: pure solids and pure liquids are NOT included in Kc (their concentrations are constant).`,concepts_tested:[`equilibrium constant`,`Kc`,`equilibrium expression`,`SO2`,`SO3`],formulas_used:[],common_trap:`Write Kc: products over reactants, each raised to the power of its stoichiometric coefficient. NEVER include solids or pure liquids in the Kc expression.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00189`,subject:`Chemistry`,chapter:`Ch6: Aqueous Equilibria & Kinetics`,topic:`Buffer Solutions`,subtopic:`Buffer Solutions`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`A buffer solution resists changes in pH because:`,options:[`A) It contains a strong acid to neutralise any base added`,`B) It contains both a weak acid and its conjugate base, which can neutralise added acid or base`,`C) It has a very high concentration of H⁺ ions`,`D) The pH of a buffer solution is always 7`,`E) It contains sodium chloride which neutralises both acids and bases`],correct_index:1,explanation:`A buffer = weak acid (HA) + conjugate base (A⁻, from its salt). If acid (H⁺) is added: A⁻ + H⁺ → HA (conjugate base absorbs added H⁺). If base (OH⁻) is added: HA + OH⁻ → A⁻ + H₂O (weak acid neutralises added base). pH of buffer ≈ pKa + log([A⁻]/[HA]) (Henderson-Hasselbalch equation). Buffers work best when pH ≈ pKa of the weak acid.`,concepts_tested:[`buffer solution`,`weak acid`,`conjugate base`,`Henderson-Hasselbalch`,`pH regulation`],formulas_used:[],common_trap:`Buffer = weak acid + its conjugate base (salt). Blood pH 7.35-7.45 is maintained by H₂CO₃/HCO₃⁻ buffer. A buffer does NOT have pH=7 — its pH = pKa of the weak acid (approximately).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00190`,subject:`Chemistry`,chapter:`Ch6: Aqueous Equilibria & Kinetics`,topic:`Reaction Rate`,subtopic:`Reaction Rate`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following factors does NOT directly increase the rate of a chemical reaction?`,options:[`A) Increasing temperature`,`B) Increasing concentration of reactants`,`C) Adding a catalyst`,`D) Increasing the pressure of gaseous reactants`,`E) Decreasing the surface area of a solid reactant`],correct_index:4,explanation:`Rate increases with: higher temperature (more particles have ≥ activation energy, Maxwell-Boltzmann distribution shifts right), higher concentration (more frequent collisions), catalyst (lowers activation energy), increased pressure of gases (increases concentration), increased surface area (more exposed particles for heterogeneous reactions). DECREASING surface area DECREASES the rate — e.g. a large stone reacts slower than the same mass of powder.`,concepts_tested:[`reaction rate`,`surface area`,`temperature`,`concentration`,`catalyst`,`collision theory`],formulas_used:[],common_trap:`Surface area: MORE surface = FASTER reaction. Smaller particle size = more surface area exposed = faster. Decreasing surface area = SLOWER rate. All other options (A-D) increase rate.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00191`,subject:`Chemistry`,chapter:`Ch6: Aqueous Equilibria & Kinetics`,topic:`Activation Energy`,subtopic:`Activation Energy`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A catalyst increases the rate of reaction by:`,options:[`A) Increasing the temperature of the reaction mixture`,`B) Increasing the concentration of reactants`,`C) Providing an alternative reaction pathway with lower activation energy`,`D) Being consumed in the reaction to provide energy`,`E) Increasing the frequency of collisions between reactant molecules`],correct_index:2,explanation:`A catalyst provides an alternative reaction mechanism with a LOWER activation energy (Ea). This means a greater proportion of collisions have sufficient energy to react (from the Maxwell-Boltzmann distribution). The catalyst is NOT consumed (it is regenerated) and does NOT change the thermodynamics (ΔH, equilibrium position, Kc). It only increases the RATE — both forward and reverse reactions equally, reaching equilibrium faster.`,concepts_tested:[`catalyst`,`activation energy`,`reaction rate`,`Maxwell-Boltzmann`,`equilibrium`],formulas_used:[],common_trap:`Catalyst: lowers Ea, NOT consumed, does NOT change ΔH or Kc, speeds up BOTH forward and reverse reactions equally. It gets you to equilibrium faster but doesn't shift it.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00192`,subject:`Chemistry`,chapter:`Ch6: Aqueous Equilibria & Kinetics`,topic:`Solubility Product`,subtopic:`Solubility Product`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`The Ksp of AgCl is 1.8 × 10⁻¹⁰ at 25°C. What is the molar solubility of AgCl in pure water?`,options:[`A) 1.8 × 10⁻¹⁰ mol/L`,`B) 1.34 × 10⁻⁵ mol/L`,`C) 9.0 × 10⁻¹¹ mol/L`,`D) 3.6 × 10⁻² mol/L`,`E) 4.24 × 10⁻⁵ mol/L`],correct_index:1,explanation:`AgCl(s) ⇌ Ag⁺(aq) + Cl⁻(aq). Let molar solubility = s mol/L. Then [Ag⁺] = s and [Cl⁻] = s. Ksp = [Ag⁺][Cl⁻] = s × s = s². s = √Ksp = √(1.8 × 10⁻¹⁰) = √(18 × 10⁻¹¹) ≈ 4.24 × 10⁻⁵... Wait: √(1.8 × 10⁻¹⁰) = √1.8 × 10⁻⁵ ≈ 1.34 × 10⁻⁵ mol/L. Check: (1.34×10⁻⁵)² = 1.8×10⁻¹⁰ ✓`,concepts_tested:[`solubility product`,`Ksp`,`molar solubility`,`AgCl`,`precipitation`],formulas_used:[],common_trap:`For 1:1 salts like AgCl: s = √Ksp. For 1:2 salts like CaF₂: Ksp = [Ca²⁺][F⁻]² = s(2s)² = 4s³, so s = (Ksp/4)^(1/3). Always write the expression first.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00193`,subject:`Chemistry`,chapter:`Ch7: Redox & Electrochemistry`,topic:`Oxidation Numbers`,subtopic:`Oxidation Numbers`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the oxidation number of sulfur in H₂SO₄?`,options:[`A) +2`,`B) +4`,`C) +6`,`D) -2`,`E) 0`],correct_index:2,explanation:`In H₂SO₄: H = +1 (×2 = +2); O = -2 (×4 = -8); molecule is neutral (sum = 0). So: +2 + S + (-8) = 0 → S = +6. Sulfur is in its highest oxidation state (+6) in sulfuric acid. In H₂SO₃: S = +4. In H₂S: S = -2. In S: S = 0. Oxidation numbers help identify redox reactions and balance half-equations.`,concepts_tested:[`oxidation number`,`sulfuric acid`,`sulfur`,`redox`,`H2SO4`],formulas_used:[],common_trap:`Oxidation number rules: O = -2 (usually), H = +1 (usually), pure element = 0, sum in neutral molecule = 0, sum in ion = charge. Apply these in order.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00194`,subject:`Chemistry`,chapter:`Ch7: Redox & Electrochemistry`,topic:`Redox Reactions`,subtopic:`Redox Reactions`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the reaction: MnO₄⁻ + Fe²⁺ → Mn²⁺ + Fe³⁺ (in acid), which species is OXIDISED?`,options:[`A) MnO₄⁻ (manganese changes from +7 to +2)`,`B) Fe²⁺ (iron changes from +2 to +3)`,`C) H⁺ (hydrogen is reduced)`,`D) Mn²⁺ (manganese gains electrons)`,`E) O²⁻ (oxygen is oxidised)`],correct_index:1,explanation:`Oxidation = loss of electrons = increase in oxidation number. Reduction = gain of electrons = decrease in oxidation number. Mn: +7 in MnO₄⁻ → +2 in Mn²⁺ (decreases) = REDUCTION. Fe: +2 in Fe²⁺ → +3 in Fe³⁺ (increases) = OXIDATION. Therefore: Fe²⁺ is oxidised (loses e⁻); MnO₄⁻ is reduced (gains e⁻). MnO₄⁻ is the oxidising agent; Fe²⁺ is the reducing agent.`,concepts_tested:[`redox`,`oxidation`,`reduction`,`permanganate`,`iron`,`OIL RIG`],formulas_used:[],common_trap:`OIL RIG: Oxidation Is Loss (of electrons), Reduction Is Gain. Or LEO the lion says GER: Lose Electrons = Oxidation; Gain Electrons = Reduction. Oxidation number INCREASES = oxidised.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00195`,subject:`Chemistry`,chapter:`Ch7: Redox & Electrochemistry`,topic:`Electrochemical Cells`,subtopic:`Electrochemical Cells`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a galvanic (voltaic) cell, oxidation occurs at the:`,options:[`A) Cathode (positive electrode)`,`B) Anode (negative electrode)`,`C) Salt bridge`,`D) External circuit`,`E) Cathode (negative electrode)`],correct_index:1,explanation:`In a galvanic (voltaic) cell (spontaneous redox reaction generating electricity): ANODE = oxidation occurs (species loses electrons) = NEGATIVE electrode (electrons flow from anode through external circuit). CATHODE = reduction occurs (species gains electrons) = POSITIVE electrode. In electrolytic cells (non-spontaneous, driven by external power): reversed signs (anode = positive), but oxidation still at anode and reduction still at cathode.`,concepts_tested:[`electrochemical cell`,`anode`,`cathode`,`oxidation`,`reduction`,`galvanic cell`],formulas_used:[],common_trap:`Memory trick: 'AN OX, RED CAT' — ANOde = OXidation; REDuction = CATHode. Always true for both galvanic and electrolytic cells. The sign (+/-) flips between galvanic and electrolytic, but the chemistry doesn't.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00196`,subject:`Chemistry`,chapter:`Ch7: Redox & Electrochemistry`,topic:`Half-Reactions`,subtopic:`Half-Reactions`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Balance the following half-reaction in acidic solution: MnO₄⁻ → Mn²⁺

How many electrons are transferred?`,options:[`A) 3`,`B) 5`,`C) 7`,`D) 2`,`E) 4`],correct_index:1,explanation:`Step 1: Mn: +7 → +2, change = 5 (reduction). Step 2: balance Mn: MnO₄⁻ → Mn²⁺ (already 1 each). Step 3: balance O with H₂O: MnO₄⁻ → Mn²⁺ + 4H₂O. Step 4: balance H with H⁺: MnO₄⁻ + 8H⁺ → Mn²⁺ + 4H₂O. Step 5: balance charge with electrons: left = -1+8 = +7; right = +2; difference = 5. Add 5e⁻ to the left: MnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O. 5 electrons transferred.`,concepts_tested:[`half-reaction`,`permanganate`,`electrons transferred`,`redox balancing`,`acidic solution`],formulas_used:[],common_trap:`Steps for balancing half-reactions in acid: (1) balance atoms except O and H; (2) balance O with H₂O; (3) balance H with H⁺; (4) balance charge with electrons. In base: add OH⁻ instead of H⁺.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00197`,subject:`Chemistry`,chapter:`Ch7: Redox & Electrochemistry`,topic:`Standard Electrode Potential`,subtopic:`Standard Electrode Potential`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`Given E°(Cu²⁺/Cu) = +0.34 V and E°(Zn²⁺/Zn) = -0.76 V, what is the EMF of a Daniell cell (Zn|Zn²⁺||Cu²⁺|Cu)?`,options:[`A) -0.42 V`,`B) +0.42 V`,`C) +1.10 V`,`D) -1.10 V`,`E) +0.34 V`],correct_index:2,explanation:`E°cell = E°cathode - E°anode. In the Daniell cell: Zn is oxidised (anode), Cu²⁺ is reduced (cathode). E°cell = E°(Cu²⁺/Cu) - E°(Zn²⁺/Zn) = +0.34 - (-0.76) = +0.34 + 0.76 = +1.10 V. A positive E°cell indicates a spontaneous reaction. The more positive the standard electrode potential, the stronger the oxidising agent (tendency to be reduced).`,concepts_tested:[`standard electrode potential`,`EMF`,`Daniell cell`,`Zn-Cu`,`electrochemistry`],formulas_used:[],common_trap:`E°cell = E°cathode - E°anode. Anode = more negative potential (oxidised). Cathode = more positive potential (reduced). Positive E°cell = spontaneous. The Daniell cell EMF = 1.10 V is a classic value to know.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00198`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Functional Groups`,subtopic:`Functional Groups`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which functional group is present in carboxylic acids?`,options:[`A) –OH (hydroxyl)`,`B) –CHO (aldehyde)`,`C) –COOH (carboxyl)`,`D) –CO– (ketone)`,`E) –NH₂ (amine)`],correct_index:2,explanation:`Carboxylic acids contain the carboxyl group –COOH, which consists of a carbonyl (C=O) and a hydroxyl (–OH) on the same carbon. They are weak acids (donate H⁺ from –COOH). Examples: methanoic acid (HCOOH), ethanoic acid (CH₃COOH = acetic acid/vinegar), amino acids (all contain –COOH). Key reactions: esterification with alcohols, neutralisation with bases to form carboxylate salts.`,concepts_tested:[`carboxylic acid`,`functional group`,`COOH`,`organic chemistry`],formulas_used:[],common_trap:`–COOH (carboxylic acid) vs –CHO (aldehyde) vs –CO– (ketone). All contain C=O but in different contexts: COOH = acid (C=O plus OH), CHO = end of chain, CO = within chain.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00199`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Alkanes`,subtopic:`Alkanes`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`What is the general formula for alkanes?`,options:[`A) CₙH₂ₙ`,`B) CₙH₂ₙ₊₂`,`C) CₙH₂ₙ₋₂`,`D) CₙHₙ`,`E) CₙH₂ₙ₊₁`],correct_index:1,explanation:`Alkanes: saturated hydrocarbons (single bonds only), general formula CₙH₂ₙ₊₂. Examples: methane (CH₄, n=1), ethane (C₂H₆, n=2), propane (C₃H₈, n=3), butane (C₄H₁₀, n=4). CₙH₂ₙ = alkenes (one double bond). CₙH₂ₙ₋₂ = alkynes or dienes (two degrees of unsaturation). Alkanes are relatively unreactive (only undergo combustion and free radical substitution).`,concepts_tested:[`alkanes`,`general formula`,`hydrocarbons`,`saturated`,`CnH2n+2`],formulas_used:[],common_trap:`CₙH₂ₙ₊₂ = alkanes (saturated). CₙH₂ₙ = alkenes (one C=C). CₙH₂ₙ₋₂ = alkynes (one C≡C). Each degree of unsaturation removes 2 H atoms from the alkane formula.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00200`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Isomerism`,subtopic:`Isomerism`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which type of isomerism arises from restricted rotation around a C=C double bond?`,options:[`A) Chain isomerism`,`B) Position isomerism`,`C) Optical isomerism`,`D) Geometric (cis-trans) isomerism`,`E) Functional group isomerism`],correct_index:3,explanation:`Geometric (cis-trans) isomerism occurs in alkenes when: (1) there is a C=C double bond (restricted rotation due to pi bond), and (2) each carbon of the double bond has two DIFFERENT substituents. Cis = same groups on the same side; trans = same groups on opposite sides. Example: but-2-ene has cis (both CH₃ on same side) and trans (CH₃ on opposite sides) isomers. Optical isomerism requires a chiral centre (4 different groups on sp³ C).`,concepts_tested:[`geometric isomerism`,`cis-trans`,`C=C double bond`,`alkenes`,`pi bond`],formulas_used:[],common_trap:`Geometric isomers: caused by C=C double bond restricting rotation. Optical isomers: caused by chiral centre (sp³ C with 4 different groups). Different causes, different consequences.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00201`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Alcohols`,subtopic:`Alcohols`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What type of reaction occurs when ethanol undergoes dehydration?`,options:[`A) Addition reaction forming an ether`,`B) Substitution reaction forming a halide`,`C) Elimination reaction forming an alkene (ethene)`,`D) Oxidation reaction forming ethanoic acid`,`E) Condensation reaction forming an ester`],correct_index:2,explanation:`Dehydration of ethanol (using concentrated H₂SO₄ or Al₂O₃, at high temperature): CH₃CH₂OH → CH₂=CH₂ + H₂O. This is an ELIMINATION reaction — water (H₂O) is removed from adjacent carbons. At lower temperatures with excess ethanol, H₂SO₄ can catalyse SUBSTITUTION/CONDENSATION to form diethyl ether. Oxidation of ethanol with acidified K₂Cr₂O₇: primary alcohol → aldehyde → carboxylic acid.`,concepts_tested:[`alcohol`,`dehydration`,`elimination`,`ethene`,`ethanol`],formulas_used:[],common_trap:`Dehydration = elimination of H₂O → alkene. Oxidation of primary alcohol: → aldehyde (partial) → carboxylic acid (complete). Oxidation of secondary alcohol: → ketone. Tertiary alcohols resist oxidation.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00202`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`IUPAC Nomenclature`,subtopic:`IUPAC Nomenclature`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the IUPAC name for CH₃–CH₂–CH(CH₃)–CH₂–CH₃?`,options:[`A) 2-methylbutane`,`B) 3-methylpentane`,`C) 2-ethylbutane`,`D) 3-ethylpentane`,`E) methylpentane`],correct_index:1,explanation:`Count the longest carbon chain: CH₃–CH₂–CH–CH₂–CH₃ = 5 carbons (pentane backbone). The –CH₃ branch is on carbon 3. Name = 3-methylpentane. Always number from the end that gives the LOWEST locant to the substituent: numbering from either end gives carbon 3, so it's 3-methylpentane. 2-methylbutane would be CH₃–CH(CH₃)–CH₂–CH₃ (4-carbon chain, branch at C2).`,concepts_tested:[`IUPAC nomenclature`,`branched alkanes`,`3-methylpentane`,`systematic naming`],formulas_used:[],common_trap:`Steps: (1) find longest chain, (2) number to give lowest locants to substituents, (3) name substituents alphabetically with numbers. Always use the longest chain as the parent.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00203`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Esterification`,subtopic:`Esterification`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following conditions are required for esterification of ethanol with ethanoic acid?`,options:[`A) High temperature and NaOH catalyst`,`B) Concentrated H₂SO₄ catalyst and heat (reflux)`,`C) Aqueous HCl and room temperature`,`D) UV light and a halogen`,`E) KMnO₄ and acidic conditions`],correct_index:1,explanation:`Esterification: carboxylic acid + alcohol ⇌ ester + water. CH₃COOH + C₂H₅OH ⇌ CH₃COOC₂H₅ + H₂O. Conditions: concentrated H₂SO₄ as ACID CATALYST + heat (reflux). This is a reversible reaction (equilibrium), so yield is typically <100%. The ester (ethyl ethanoate) has a characteristic fruity smell. NaOH would neutralise the acid (not catalyse esterification). Saponification (reverse) = ester + NaOH → alcohol + sodium carboxylate.`,concepts_tested:[`esterification`,`ester`,`ethyl ethanoate`,`H2SO4`,`condensation reaction`],formulas_used:[],common_trap:`Esterification catalyst = concentrated H₂SO₄ (acid catalyst). NOT NaOH (base would neutralise the acid). Reaction is reversible — use excess of one reactant or remove water to push equilibrium right.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00204`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Benzene`,subtopic:`Benzene`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following statements about benzene (C₆H₆) is correct?`,options:[`A) It undergoes addition reactions more readily than alkenes`,`B) It has alternating single and double bonds that are fixed in position`,`C) All C–C bond lengths in benzene are equal and intermediate between single and double bonds`,`D) It is a highly reactive compound that decolourises bromine water immediately`,`E) Benzene contains three isolated C=C double bonds`],correct_index:2,explanation:`Benzene's structure is a regular hexagon with delocalised π electrons (6 electrons spread over all 6 carbons). ALL C–C bonds are identical: bond length ~140 pm (between single 154 pm and double 134 pm). This delocalisation gives benzene exceptional stability (aromatic stabilisation energy ~150 kJ/mol). It does NOT decolourise bromine water (unlike alkenes) — it undergoes electrophilic SUBSTITUTION, not addition, to preserve the stable aromatic system.`,concepts_tested:[`benzene`,`aromaticity`,`delocalised electrons`,`electrophilic substitution`,`bond length`],formulas_used:[],common_trap:`Benzene: equal bond lengths, delocalised electrons, prefers SUBSTITUTION over addition (to preserve aromaticity). Alkenes: prefer ADDITION (they are not aromatic). Bromine water: alkenes decolourise it; benzene does NOT.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00205`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Polymers`,subtopic:`Polymers`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Addition polymerisation of ethene (CH₂=CH₂) produces:`,options:[`A) Polypropylene`,`B) PVC (polyvinyl chloride)`,`C) Poly(ethene) [polyethylene/LDPE/HDPE]`,`D) Nylon`,`E) Polyester`],correct_index:2,explanation:`Addition polymerisation: the C=C double bond opens and monomers join together with no atoms lost. n(CH₂=CH₂) → –(CH₂–CH₂)ₙ– = poly(ethene)/polyethylene. This is the simplest addition polymer. Propene → polypropylene. Vinyl chloride (CH₂=CHCl) → PVC. Nylon is a condensation polymer (polyamide). Polyester is also a condensation polymer. Addition polymers contain no heteroatoms in the chain.`,concepts_tested:[`addition polymerisation`,`poly(ethene)`,`polyethylene`,`monomers`,`alkenes`],formulas_used:[],common_trap:`Addition polymer: no atoms lost, all come from the double bond opening. Condensation polymer: small molecule (usually H₂O) lost per monomer joining. Nylon and polyester are condensation polymers.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00206`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Optical Isomerism`,subtopic:`Optical Isomerism`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`A molecule has optical isomers when it contains:`,options:[`A) A C=C double bond`,`B) A chiral centre — a carbon bonded to four different groups`,`C) More than 5 carbon atoms`,`D) A benzene ring`,`E) At least one bromine atom`],correct_index:1,explanation:`Optical isomerism arises when a molecule has a CHIRAL CENTRE: a carbon atom bonded to FOUR DIFFERENT groups (substituents). The two non-superimposable mirror image structures are called enantiomers. They rotate plane-polarised light in opposite directions (one dextrorotatory +, one laevorotatory −). Example: lactic acid, amino acids (all have a chiral α-carbon except glycine). Racemic mixture = 50:50 enantiomers, no net optical rotation.`,concepts_tested:[`optical isomerism`,`chiral centre`,`enantiomers`,`stereoisomerism`,`polarised light`],formulas_used:[],common_trap:`Chiral centre = sp³ carbon with 4 DIFFERENT groups. Check: are all four substituents different? If yes → chiral centre → optical isomers. Glycine (H₂N–CH₂–COOH) has NO chiral centre (two H on the α-carbon).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00207`,subject:`Chemistry`,chapter:`Ch8: Organic Chemistry`,topic:`Aldehydes vs Ketones`,subtopic:`Aldehydes vs Ketones`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which reagent distinguishes between an aldehyde and a ketone?`,options:[`A) Bromine water (Br₂/H₂O)`,`B) Tollens' reagent (ammoniacal silver nitrate)`,`C) Concentrated H₂SO₄`,`D) Aqueous NaOH`,`E) Litmus paper`],correct_index:1,explanation:`Tollens' reagent ([Ag(NH₃)₂]⁺, ammoniacal AgNO₃) distinguishes aldehydes from ketones: ALDEHYDES reduce Ag⁺ to Ag⁰ → silver mirror on test tube (positive result). KETONES do NOT reduce Tollens' → no reaction. Fehling's solution (Cu²⁺ → Cu₂O red precipitate) also detects aldehydes. Aldehydes can be oxidised to carboxylic acids; ketones resist oxidation under mild conditions.`,concepts_tested:[`Tollens reagent`,`aldehyde`,`ketone`,`silver mirror test`,`oxidation`],formulas_used:[],common_trap:`Tollens' = silver mirror test = positive with ALDEHYDES only. Fehling's = blue solution → red precipitate = also ALDEHYDES only. Ketones give NEGATIVE results with both tests.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00208`,subject:`Chemistry`,chapter:`Ch9: Solutions & Concentration`,topic:`Colligative Properties`,subtopic:`Colligative Properties`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is a colligative property of a solution?`,options:[`A) Colour of the solution`,`B) Boiling point elevation`,`C) Conductivity of the solution`,`D) pH of the solution`,`E) Viscosity of the solution`],correct_index:1,explanation:`Colligative properties depend ONLY on the NUMBER of solute particles, not their identity: boiling point elevation (ΔTb = Kb × m × i), freezing point depression (ΔTf = Kf × m × i), osmotic pressure (π = MRT i), and vapour pressure lowering (Raoult's Law). The 'i' factor accounts for dissociation (e.g. NaCl → 2 particles, i=2). Applications: antifreeze in radiators (freezing point depression), salting icy roads.`,concepts_tested:[`colligative properties`,`boiling point elevation`,`freezing point depression`,`osmotic pressure`,`Raoult's Law`],formulas_used:[],common_trap:`Colligative: depends on particle NUMBER not identity. Boiling point RISES (more energy to escape). Freezing point DROPS. Osmotic pressure RISES. All from adding solute.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00209`,subject:`Chemistry`,chapter:`Ch9: Solutions & Concentration`,topic:`Solubility`,subtopic:`Solubility`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly describes the effect of temperature on the solubility of most solid solutes in water?`,options:[`A) Solubility decreases as temperature increases`,`B) Solubility is unaffected by temperature`,`C) Solubility increases as temperature increases`,`D) Solubility decreases then increases with temperature`,`E) Solubility depends only on the pressure, not temperature`],correct_index:2,explanation:`For most solid solutes in water, solubility INCREASES with temperature (endothermic dissolution — adding heat drives more solid into solution, Le Chatelier's principle). Exceptions include some salts like Li₂SO₄ and Ce₂(SO₄)₃ which become less soluble at higher temperatures. For GASES dissolved in water, solubility DECREASES with increasing temperature (explains why warm water holds less dissolved O₂, affecting aquatic life).`,concepts_tested:[`solubility`,`temperature`,`solid solute`,`gas solubility`,`Le Chatelier`],formulas_used:[],common_trap:`Solids in water: solubility usually INCREASES with temperature. Gases in water: solubility DECREASES with temperature (CO₂ fizzes out of warm soda). This distinction is frequently tested.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00210`,subject:`Chemistry`,chapter:`Ch9: Solutions & Concentration`,topic:`Dilution`,subtopic:`Dilution`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`25.0 mL of 2.00 mol/L HCl is diluted to 100 mL. What is the new concentration?`,options:[`A) 8.00 mol/L`,`B) 0.500 mol/L`,`C) 2.00 mol/L`,`D) 0.250 mol/L`,`E) 4.00 mol/L`],correct_index:1,explanation:`Dilution: moles of solute stays constant. C₁V₁ = C₂V₂. C₁ = 2.00 mol/L, V₁ = 25.0 mL, V₂ = 100 mL. C₂ = C₁V₁/V₂ = (2.00 × 25.0)/100 = 50.0/100 = 0.500 mol/L. Alternatively: moles = 2.00 × 0.025 = 0.05 mol. New concentration = 0.05/0.100 = 0.500 mol/L.`,concepts_tested:[`dilution`,`concentration`,`C1V1=C2V2`,`molarity`,`HCl`],formulas_used:[],common_trap:`C₁V₁ = C₂V₂ (dilution formula). Units must be consistent (both volumes in same units — mL or L). Dilution increases volume → decreases concentration. Never mix up V₁ and V₂.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00211`,subject:`Chemistry`,chapter:`Ch9: Solutions & Concentration`,topic:`Raoult's Law`,subtopic:`Raoult's Law`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`According to Raoult's Law, the vapour pressure of a solvent above a solution is:`,options:[`A) Equal to the pure solvent vapour pressure`,`B) Higher than the pure solvent vapour pressure`,`C) Equal to the pure solvent vapour pressure multiplied by the mole fraction of the solvent`,`D) Equal to the mole fraction of the solute`,`E) Independent of the amount of solute added`],correct_index:2,explanation:`Raoult's Law: P_solution = X_solvent × P°_solvent, where X_solvent = mole fraction of solvent, P°_solvent = vapour pressure of pure solvent. Adding a non-volatile solute reduces the solvent's mole fraction (X_solvent < 1) → vapour pressure is LOWERED. This vapour pressure lowering is a colligative property. The boiling point elevation and freezing point depression both arise from this vapour pressure reduction.`,concepts_tested:[`Raoult's Law`,`vapour pressure`,`mole fraction`,`colligative properties`,`solution`],formulas_used:[],common_trap:`Raoult's Law: P = X_solvent × P°. Adding solute lowers X_solvent (fewer solvent molecules at surface to evaporate) → lowers vapour pressure → raises boiling point, lowers freezing point.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00212`,subject:`Chemistry`,chapter:`Ch9: Solutions & Concentration`,topic:`Henry's Law`,subtopic:`Henry's Law`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Henry's Law states that the solubility of a gas in a liquid is:`,options:[`A) Inversely proportional to temperature`,`B) Directly proportional to the partial pressure of the gas above the liquid`,`C) Independent of pressure`,`D) Directly proportional to the volume of the liquid`,`E) Inversely proportional to the molar mass of the gas`],correct_index:1,explanation:`Henry's Law: C = kH × P, where C = concentration of dissolved gas, kH = Henry's Law constant, P = partial pressure of gas above the solution. Higher pressure → more gas dissolves. Applications: carbonated drinks (CO₂ under pressure → fizzy), decompression sickness in divers (N₂ comes out of solution if pressure drops too quickly), hyperbaric oxygen therapy.`,concepts_tested:[`Henry's Law`,`gas solubility`,`partial pressure`,`carbonated drinks`,`decompression`],formulas_used:[],common_trap:`Henry's Law: gas solubility ∝ partial pressure. Carbonated drinks: bottled under high CO₂ pressure. Opening releases pressure → CO₂ comes out → bubbles. Divers ascending too fast: N₂ bubbles in blood ('the bends').`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00213`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Kinematics`,subtopic:`Kinematics`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A car accelerates uniformly from rest to 20 m/s in 4 seconds. What is its acceleration?`,options:[`A) 80 m/s²`,`B) 5 m/s²`,`C) 0.2 m/s²`,`D) 4 m/s²`,`E) 10 m/s²`],correct_index:1,explanation:`Acceleration a = Δv/Δt = (v_f - v_i)/t = (20 - 0)/4 = 5 m/s². SUVAT equations: v = u + at, s = ut + ½at², v² = u² + 2as, s = (u+v)t/2. Here: u=0 (from rest), v=20 m/s, t=4 s, a=? Using a = (v-u)/t = 20/4 = 5 m/s².`,concepts_tested:[`kinematics`,`acceleration`,`SUVAT`,`uniform acceleration`,`velocity`],formulas_used:[],common_trap:`SUVAT: s=displacement, u=initial velocity, v=final velocity, a=acceleration, t=time. 'From rest' means u=0. 'Comes to rest' means v=0. Always identify which 3 variables are given and which you need.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00214`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Newton's Laws`,subtopic:`Newton's Laws`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Newton's Second Law states that the net force on an object equals:`,options:[`A) Mass divided by acceleration`,`B) Mass multiplied by velocity`,`C) Mass multiplied by acceleration (F = ma)`,`D) Momentum divided by distance`,`E) Weight multiplied by velocity`],correct_index:2,explanation:`Newton's Second Law: F = ma, where F = net force (N), m = mass (kg), a = acceleration (m/s²). The acceleration is in the SAME direction as the net force. Weight (W = mg) is the gravitational force. A larger mass requires a greater force for the same acceleration. If F_net = 0, then a = 0 (constant velocity) — Newton's First Law.`,concepts_tested:[`Newton's Second Law`,`F=ma`,`force`,`mass`,`acceleration`],formulas_used:[],common_trap:`F = ma is the net (resultant) force, not just any single force. If multiple forces act, find the vector sum first, then apply F_net = ma.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00215`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Projectile Motion`,subtopic:`Projectile Motion`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A ball is thrown horizontally from a height of 20 m with a speed of 15 m/s. Taking g = 10 m/s², how long does it take to hit the ground?`,options:[`A) 1 s`,`B) 2 s`,`C) 3 s`,`D) 1.5 s`,`E) 4 s`],correct_index:1,explanation:`Horizontal and vertical motions are independent. Vertical: starts with u_y = 0 (thrown horizontally), falls height h = 20 m under gravity. Using s = ut + ½at²: 20 = 0 + ½(10)t² = 5t². t² = 4, t = 2 s. Horizontal speed (15 m/s) does NOT affect the time to fall — both a ball thrown horizontally and one dropped vertically from the same height hit the ground at the same time.`,concepts_tested:[`projectile motion`,`free fall`,`horizontal throw`,`kinematics`,`independent motion`],formulas_used:[],common_trap:`Key insight: horizontal velocity has NO effect on time of fall. Only vertical initial velocity and height determine fall time. Horizontal: x = v_x × t (constant speed). Vertical: y = ½gt² (free fall, if thrown horizontally).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00216`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Momentum`,subtopic:`Momentum`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A 1500 kg car moving at 20 m/s collides with a stationary 1000 kg car. They stick together. What is their combined velocity after the collision?`,options:[`A) 20 m/s`,`B) 10 m/s`,`C) 12 m/s`,`D) 15 m/s`,`E) 6 m/s`],correct_index:2,explanation:`Conservation of momentum: total momentum before = total momentum after (no external forces). p_before = m₁v₁ + m₂v₂ = 1500×20 + 1000×0 = 30,000 kg⋅m/s. After: (m₁+m₂)v_f = 30,000. v_f = 30,000/2500 = 12 m/s. This is a perfectly inelastic collision (they stick together). KE is NOT conserved in inelastic collisions (some converted to heat/deformation).`,concepts_tested:[`momentum conservation`,`inelastic collision`,`p=mv`,`velocity`,`collision`],formulas_used:[],common_trap:`Perfectly inelastic collision: objects stick together, momentum conserved, KE not conserved. p = mv. Momentum is always conserved in collisions (no external forces). KE is only conserved in perfectly elastic collisions.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00217`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Friction`,subtopic:`Friction`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The force of kinetic (sliding) friction between two surfaces depends on:`,options:[`A) The area of contact between the surfaces`,`B) The speed of sliding`,`C) The normal force and the coefficient of kinetic friction (F_f = μ_k × N)`,`D) The mass of the object only`,`E) The surface area and coefficient of friction`],correct_index:2,explanation:`Kinetic friction: F_f = μ_k × N, where μ_k = coefficient of kinetic friction (dimensionless, 0 to ~1), N = normal force (perpendicular to surface). Importantly, friction does NOT depend on contact area (counter-intuitive). Static friction (when object is not moving): F_s ≤ μ_s × N. μ_s > μ_k always — static friction is greater than kinetic friction (harder to start something moving than to keep it moving).`,concepts_tested:[`friction`,`normal force`,`coefficient of friction`,`F=muN`,`kinetic friction`],formulas_used:[],common_trap:`Friction = μ × N (not mass directly, though N often = mg on a flat surface). Friction does NOT depend on contact AREA — a key exam trap. Static friction > kinetic friction.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00218`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Work-Energy Theorem`,subtopic:`Work-Energy Theorem`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A force of 50 N is applied at 60° to the horizontal to move a box 10 m along a flat surface. How much work is done by this force?`,options:[`A) 500 J`,`B) 433 J`,`C) 250 J`,`D) 866 J`,`E) 0 J`],correct_index:2,explanation:`Work = F × d × cos(θ), where θ = angle between force and displacement. W = 50 × 10 × cos(60°) = 50 × 10 × 0.5 = 250 J. The cos(60°) factor accounts for only the HORIZONTAL component of force doing work (parallel to displacement). At 90° (force perpendicular to displacement): W = 0. At 0° (force parallel to displacement): W = Fd (maximum).`,concepts_tested:[`work`,`force displacement`,`cos theta`,`angle`,`energy`],formulas_used:[],common_trap:`W = Fd cosθ. The angle is between force and displacement vectors. cos(90°)=0, cos(60°)=0.5, cos(45°)=√2/2≈0.707, cos(30°)=√3/2≈0.866, cos(0°)=1.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00219`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Energy Conservation`,subtopic:`Energy Conservation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A 2 kg ball is dropped from a height of 5 m. Taking g = 10 m/s², what is its kinetic energy just before hitting the ground?`,options:[`A) 10 J`,`B) 50 J`,`C) 100 J`,`D) 25 J`,`E) 200 J`],correct_index:2,explanation:`Conservation of energy (ignoring air resistance): all PE converts to KE. PE at top = mgh = 2 × 10 × 5 = 100 J. KE at bottom = 100 J. Alternatively: v² = u² + 2as = 0 + 2(10)(5) = 100, v = 10 m/s. KE = ½mv² = ½ × 2 × 100 = 100 J. Both methods give 100 J.`,concepts_tested:[`energy conservation`,`kinetic energy`,`potential energy`,`mgh`,`free fall`],formulas_used:[],common_trap:`PE = mgh converts entirely to KE = ½mv² when dropped (no air resistance). At the exact midpoint, PE = KE = 50 J each. Total mechanical energy stays constant.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00220`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Circular Motion`,subtopic:`Circular Motion`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A car goes around a circular bend of radius 50 m at 20 m/s. What centripetal acceleration does it experience?`,options:[`A) 0.4 m/s²`,`B) 2.5 m/s²`,`C) 8 m/s²`,`D) 400 m/s²`,`E) 40 m/s²`],correct_index:2,explanation:`Centripetal acceleration: a_c = v²/r = (20)²/50 = 400/50 = 8 m/s². This acceleration is directed towards the centre of the circle. The centripetal FORCE = ma_c = m × v²/r. For a car: this force is provided by friction between tyres and road. At higher speeds: greater centripetal force needed → higher risk of skidding (friction limit exceeded).`,concepts_tested:[`centripetal acceleration`,`circular motion`,`v squared over r`,`radius`,`centripetal force`],formulas_used:[],common_trap:`a_c = v²/r = ω²r. F_c = mv²/r. Centripetal force always points INWARD (towards centre). It is NOT a separate force — it's the name for whatever force (gravity, tension, friction, normal) that provides the inward acceleration.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00221`,subject:`Physics`,chapter:`Ch1: Mechanics & Kinematics`,topic:`Torque`,subtopic:`Torque`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A force of 30 N is applied perpendicular to a spanner at 0.4 m from the pivot. What torque does it produce?`,options:[`A) 75 Nm`,`B) 12 Nm`,`C) 0.013 Nm`,`D) 30.4 Nm`,`E) 120 Nm`],correct_index:1,explanation:`Torque (moment) τ = F × d × sin(θ), where d = distance from pivot, θ = angle between force and lever arm. When force is perpendicular to the arm (θ=90°, sin90°=1): τ = F × d = 30 × 0.4 = 12 Nm. Torque is the rotational equivalent of force. For equilibrium (no rotation): clockwise torques = anticlockwise torques (principle of moments).`,concepts_tested:[`torque`,`moment`,`pivot`,`force`,`perpendicular`],formulas_used:[],common_trap:`Torque = F × d (when force is perpendicular to the moment arm). Units: Nm. Torque is maximum when force is perpendicular (sin90°=1) and zero when parallel (sin0°=0).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00222`,subject:`Physics`,chapter:`Ch2: Forces & Newton's Laws`,topic:`Newton's Third Law`,subtopic:`Newton's Third Law`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Newton's Third Law states that for every action there is an equal and opposite reaction. When a person pushes on a wall, the wall pushes back with:`,options:[`A) A smaller force in the same direction`,`B) A larger force in the opposite direction`,`C) An equal force in the opposite direction`,`D) An equal force in the same direction`,`E) No force, because the wall is stationary`],correct_index:2,explanation:`Newton's Third Law: every force has an equal magnitude and opposite direction reaction force, acting on a DIFFERENT object. Person pushes wall with force F → wall pushes person with force F in the opposite direction. These forces act on DIFFERENT objects (person and wall), so they don't cancel each other. They are called 'Newton's Third Law pairs' or 'action-reaction pairs'.`,concepts_tested:[`Newton's Third Law`,`action-reaction`,`forces`,`equal and opposite`],formulas_used:[],common_trap:`Newton's 3rd Law pairs act on DIFFERENT objects. They are EQUAL in magnitude and OPPOSITE in direction. They DO NOT cancel because they act on different bodies.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00223`,subject:`Physics`,chapter:`Ch2: Forces & Newton's Laws`,topic:`Free Body Diagrams`,subtopic:`Free Body Diagrams`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A 5 kg block rests on a frictionless surface. A horizontal force of 20 N is applied. What is the acceleration?`,options:[`A) 100 m/s²`,`B) 0.25 m/s²`,`C) 4 m/s²`,`D) 25 m/s²`,`E) 2.5 m/s²`],correct_index:2,explanation:`F_net = ma. On a frictionless surface, the only horizontal force is the applied force (no friction). F_net = 20 N. a = F/m = 20/5 = 4 m/s². Vertically: normal force = weight = 5 × 10 = 50 N (balanced, no vertical acceleration). The frictionless condition means we don't subtract a friction force from the net horizontal force.`,concepts_tested:[`Newton's Second Law`,`frictionless`,`acceleration`,`F=ma`,`free body diagram`],formulas_used:[],common_trap:`On frictionless surface: F_net (horizontal) = applied force only. With friction: F_net = F_applied - F_friction = F_applied - μmg. Always draw a free body diagram first.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00224`,subject:`Physics`,chapter:`Ch2: Forces & Newton's Laws`,topic:`Inclined Plane`,subtopic:`Inclined Plane`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A 10 kg block rests on a frictionless incline at 30° to the horizontal. Taking g = 10 m/s², what is the acceleration of the block down the incline?`,options:[`A) 10 m/s²`,`B) 8.66 m/s²`,`C) 5 m/s²`,`D) 4.5 m/s²`,`E) 0 m/s²`],correct_index:2,explanation:`On a frictionless incline: the component of gravity along the incline = mg sin(θ). a = g sin(30°) = 10 × 0.5 = 5 m/s² (down the slope). Normal force N = mg cos(30°) = 10 × 10 × 0.866 = 86.6 N (perpendicular to slope). sin(30°) = 0.5, cos(30°) = √3/2 ≈ 0.866, sin(45°) = cos(45°) = √2/2 ≈ 0.707.`,concepts_tested:[`inclined plane`,`component of gravity`,`acceleration`,`sin theta`,`friction`],formulas_used:[],common_trap:`Incline: component along slope = mg sinθ. Component perpendicular = mg cosθ. Acceleration along frictionless slope = g sinθ. With friction: a = g(sinθ - μcosθ).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00225`,subject:`Physics`,chapter:`Ch2: Forces & Newton's Laws`,topic:`Equilibrium`,subtopic:`Equilibrium`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`An object is in static equilibrium when:`,options:[`A) The net force is zero only`,`B) The net torque is zero only`,`C) Both the net force AND the net torque are zero`,`D) All forces on it are equal`,`E) The object is at rest, regardless of forces`],correct_index:2,explanation:`Static equilibrium requires TWO conditions simultaneously: (1) ΣF = 0 (translational equilibrium — no linear acceleration), and (2) Στ = 0 (rotational equilibrium — no angular acceleration). Both conditions must be satisfied. An object CAN have zero net force but non-zero torque (it would rotate but not translate). Similarly, zero net torque but non-zero force means it translates but doesn't rotate.`,concepts_tested:[`equilibrium`,`net force`,`net torque`,`static equilibrium`,`conditions`],formulas_used:[],common_trap:`Equilibrium requires BOTH: ΣF = 0 AND Στ = 0. Missing either condition means the object will accelerate (linearly or rotationally).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00226`,subject:`Physics`,chapter:`Ch2: Forces & Newton's Laws`,topic:`Gravity`,subtopic:`Gravity`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The gravitational force between two objects is doubled if:`,options:[`A) The mass of one object is doubled`,`B) The distance between them is doubled`,`C) The distance between them is halved`,`D) The mass of one object is halved`,`E) Both masses are doubled and distance is doubled`],correct_index:2,explanation:`Newton's Law of Gravitation: F = Gm₁m₂/r². If r is halved (r → r/2): F = Gm₁m₂/(r/2)² = Gm₁m₂/(r²/4) = 4Gm₁m₂/r² = 4F. Force is QUADRUPLED (×4), not doubled, when distance is halved. To double force: double one mass OR multiply both masses such that product doubles; or reduce distance by factor of √2.`,concepts_tested:[`gravity`,`Newton's Law of Gravitation`,`inverse square law`,`distance`,`force`],formulas_used:[],common_trap:`F ∝ 1/r². Halving r → r² decreases by 4 → F increases by 4 (quadrupled). To DOUBLE F: reduce r by factor √2 ≈ 1.41. This is an INVERSE SQUARE LAW.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00227`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Ohm's Law`,subtopic:`Ohm's Law`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Ohm's Law states that, at constant temperature, the current through a conductor is:`,options:[`A) Inversely proportional to voltage`,`B) Directly proportional to voltage (V = IR)`,`C) Proportional to the square of voltage`,`D) Independent of voltage`,`E) Directly proportional to resistance`],correct_index:1,explanation:`Ohm's Law: V = IR, where V = voltage (volts, V), I = current (amperes, A), R = resistance (ohms, Ω). Current is DIRECTLY proportional to voltage (at constant R and temperature). Rearrangements: I = V/R, R = V/I. A device that obeys Ohm's Law (constant R regardless of V) is called 'ohmic'. Bulb filaments and diodes are non-ohmic (resistance changes with temperature or direction).`,concepts_tested:[`Ohm's Law`,`V=IR`,`current`,`voltage`,`resistance`],formulas_used:[],common_trap:`V = IR → I = V/R → R = V/I. If V doubles (and R is constant), I doubles. If R doubles (and V is constant), I halves. Don't confuse proportional/inversely proportional.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00228`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Series Circuits`,subtopic:`Series Circuits`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Three resistors of 2 Ω, 3 Ω, and 5 Ω are connected in series. What is the total resistance?`,options:[`A) 0.97 Ω`,`B) 10 Ω`,`C) 1.03 Ω`,`D) 30 Ω`,`E) 5 Ω`],correct_index:1,explanation:`Series resistors: R_total = R₁ + R₂ + R₃ = 2 + 3 + 5 = 10 Ω. In series: same current flows through each resistor; total voltage = sum of individual voltage drops. Parallel resistors: 1/R_total = 1/R₁ + 1/R₂ + 1/R₃. Parallel always gives SMALLER total resistance than the smallest individual resistor.`,concepts_tested:[`series circuit`,`resistance`,`resistors`,`total resistance`,`Ohm's Law`],formulas_used:[],common_trap:`Series: R_total = R₁ + R₂ + ... (ADDS). Parallel: 1/R_total = 1/R₁ + 1/R₂ + ... (RECIPROCALS add). Parallel resistance is always LESS than smallest R. For 2 equal R in parallel: R_total = R/2.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00229`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Parallel Circuits`,subtopic:`Parallel Circuits`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Two 6 Ω resistors are connected in parallel. What is the equivalent resistance?`,options:[`A) 12 Ω`,`B) 6 Ω`,`C) 3 Ω`,`D) 0.33 Ω`,`E) 36 Ω`],correct_index:2,explanation:`Two equal resistors in parallel: R_total = R/2 = 6/2 = 3 Ω. General formula: 1/R_total = 1/6 + 1/6 = 2/6 = 1/3, so R_total = 3 Ω. In parallel: voltage is the same across each branch; total current = sum of branch currents. Adding more parallel paths gives electrons more routes → reduces total resistance → increases total current drawn.`,concepts_tested:[`parallel circuit`,`resistance`,`parallel resistors`,`equivalent resistance`],formulas_used:[],common_trap:`Two identical R in parallel = R/2. Three identical R in parallel = R/3. For different R: use 1/R_total formula. Parallel always REDUCES total resistance.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00230`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Electric Power`,subtopic:`Electric Power`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A 60 W light bulb operates at 120 V. What current does it draw?`,options:[`A) 7200 A`,`B) 2 A`,`C) 0.5 A`,`D) 60 A`,`E) 0.25 A`],correct_index:2,explanation:`P = IV, so I = P/V = 60/120 = 0.5 A. Other power formulae: P = I²R = V²/R. Also, R = V/I = 120/0.5 = 240 Ω. Energy = P × t (in joules if P in watts and t in seconds). A 60W bulb running for 1 hour uses: E = 60 W × 3600 s = 216,000 J = 60 Wh = 0.06 kWh.`,concepts_tested:[`electric power`,`P=IV`,`current`,`voltage`,`watts`],formulas_used:[],common_trap:`P = IV = I²R = V²/R. From P = IV: I = P/V. From P = V²/R: R = V²/P. Memorise all three forms and which to use when — depends on what variables are given.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00231`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Kirchhoff's Laws`,subtopic:`Kirchhoff's Laws`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`In a circuit, Kirchhoff's Current Law (KCL) states that:`,options:[`A) The sum of voltages around any closed loop equals zero`,`B) The current entering a junction equals the current leaving that junction`,`C) Resistance equals voltage divided by current`,`D) Power equals current times voltage`,`E) The total resistance in a parallel circuit equals the sum of individual resistances`],correct_index:1,explanation:`Kirchhoff's Current Law (KCL): at any junction (node), the sum of currents entering = sum of currents leaving (conservation of charge). Kirchhoff's Voltage Law (KVL): around any closed loop, the sum of all EMFs = sum of all voltage drops (conservation of energy). KCL and KVL are used to solve complex circuit problems that cannot be reduced to simple series/parallel combinations.`,concepts_tested:[`Kirchhoff's Current Law`,`KCL`,`junction`,`conservation of charge`,`circuit analysis`],formulas_used:[],common_trap:`KCL = junction rule = conservation of CHARGE (currents at a node). KVL = loop rule = conservation of ENERGY (voltages around a loop). These are Kirchhoff's two laws — don't confuse them.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00232`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Capacitors`,subtopic:`Capacitors`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A capacitor in a DC circuit, once fully charged:`,options:[`A) Continues to allow large current to flow`,`B) Acts as an open circuit (no steady-state current flows)`,`C) Discharges immediately`,`D) Has zero voltage across its plates`,`E) Acts as a short circuit`],correct_index:1,explanation:`A capacitor stores charge on its plates (Q = CV). In a DC circuit, once fully charged (voltage across capacitor = source voltage), NO more current flows — it acts as an OPEN circuit in steady state. However, during charging and discharging, current does flow transiently. In AC circuits, capacitors continuously charge and discharge with the alternating current → they allow AC to 'pass' (capacitive reactance Xc = 1/2πfC).`,concepts_tested:[`capacitor`,`DC circuit`,`open circuit`,`charge storage`,`Q=CV`],formulas_used:[],common_trap:`Capacitor: blocks DC in steady state (open circuit). Allows AC to pass. During transient charging/discharging, current flows. Charge Q = CV. Energy stored = ½CV² = Q²/2C.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00233`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Electric Field`,subtopic:`Electric Field`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The electric field between two parallel plates separated by 0.02 m with a potential difference of 100 V is:`,options:[`A) 2 V/m`,`B) 0.0002 V/m`,`C) 5000 V/m`,`D) 50 V/m`,`E) 2000 V/m`],correct_index:2,explanation:`For uniform electric field between parallel plates: E = V/d = 100/0.02 = 5000 V/m (or N/C). The field is uniform (same magnitude and direction at every point between the plates, ignoring edge effects). E = V/d is only valid for uniform fields. For a point charge: E = kQ/r² (radial field, varies with distance).`,concepts_tested:[`electric field`,`parallel plates`,`E=V/d`,`uniform field`,`potential difference`],formulas_used:[],common_trap:`E = V/d applies ONLY to uniform fields (parallel plates). E = kQ/r² for point charges. Units: V/m = N/C (equivalent units). Don't use E=kQ/r² for parallel plate problems.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00234`,subject:`Physics`,chapter:`Ch3: Electricity & Magnetism`,topic:`Charge`,subtopic:`Charge`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly states the elementary charge (charge of one proton or one electron)?`,options:[`A) 1.6 × 10⁻¹⁹ C`,`B) 9.11 × 10⁻³¹ C`,`C) 1.67 × 10⁻²⁷ C`,`D) 6.022 × 10²³ C`,`E) 1.38 × 10⁻²³ C`],correct_index:0,explanation:`Elementary charge: e = 1.6 × 10⁻¹⁹ C (proton = +e, electron = -e). Other key constants: electron mass = 9.11 × 10⁻³¹ kg; proton mass = 1.67 × 10⁻²⁷ kg; Avogadro = 6.022 × 10²³ mol⁻¹; Boltzmann = 1.38 × 10⁻²³ J/K. Total charge Q = n × e (where n = number of elementary charges). Current I = Q/t = charge per second.`,concepts_tested:[`elementary charge`,`proton`,`electron`,`coulomb`,`fundamental constants`],formulas_used:[],common_trap:`e = 1.6 × 10⁻¹⁹ C. Q = ne. I = Q/t. These three relations connect charge, current, and time. Don't confuse electron MASS (9.11×10⁻³¹ kg) with electron CHARGE (1.6×10⁻¹⁹ C).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00235`,subject:`Physics`,chapter:`Ch4: Waves & Thermodynamics`,topic:`Wave Equation`,subtopic:`Wave Equation`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A wave has frequency 50 Hz and wavelength 2 m. What is its speed?`,options:[`A) 25 m/s`,`B) 100 m/s`,`C) 0.04 m/s`,`D) 52 m/s`,`E) 0.4 m/s`],correct_index:1,explanation:`Wave speed equation: v = fλ, where v = speed (m/s), f = frequency (Hz), λ = wavelength (m). v = 50 × 2 = 100 m/s. Period T = 1/f = 1/50 = 0.02 s. Speed of sound in air ≈ 340 m/s. Speed of light in vacuum = 3 × 10⁸ m/s. All electromagnetic waves travel at c in vacuum, but slow down in materials.`,concepts_tested:[`wave equation`,`v=f lambda`,`frequency`,`wavelength`,`wave speed`],formulas_used:[],common_trap:`v = fλ. Frequency and wavelength are INVERSELY proportional at constant speed: higher frequency → shorter wavelength. Speed of sound ≈ 340 m/s. Speed of light = 3×10⁸ m/s.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00236`,subject:`Physics`,chapter:`Ch4: Waves & Thermodynamics`,topic:`Specific Heat Capacity`,subtopic:`Specific Heat Capacity`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`How much energy is needed to raise the temperature of 2 kg of water by 5°C? (Specific heat capacity of water = 4200 J/kg°C)`,options:[`A) 2100 J`,`B) 420 J`,`C) 42,000 J`,`D) 21,000 J`,`E) 8400 J`],correct_index:2,explanation:`Q = mcΔT, where m = mass (kg), c = specific heat capacity (J/kg°C), ΔT = temperature change (°C). Q = 2 × 4200 × 5 = 42,000 J = 42 kJ. Water's high specific heat capacity (4200 J/kg°C, highest of common substances) means it requires a lot of energy to change temperature — important for climate regulation and biological temperature homeostasis.`,concepts_tested:[`specific heat capacity`,`Q=mcΔT`,`thermal energy`,`water`,`temperature change`],formulas_used:[],common_trap:`Q = mcΔT. Units: J = kg × (J/kg°C) × °C. Water has the highest specific heat capacity of common substances (4200 J/kg°C) — oceans act as thermal buffers because of this.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00237`,subject:`Physics`,chapter:`Ch4: Waves & Thermodynamics`,topic:`Thermodynamics Laws`,subtopic:`Thermodynamics Laws`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following best states the First Law of Thermodynamics?`,options:[`A) Heat flows from hot to cold objects spontaneously`,`B) The entropy of a closed system always increases`,`C) The internal energy of a system changes by the amount of heat added minus the work done by the system (ΔU = Q - W)`,`D) It is impossible to reach absolute zero temperature`,`E) A heat engine cannot be 100% efficient`],correct_index:2,explanation:`First Law of Thermodynamics (conservation of energy): ΔU = Q - W, where ΔU = change in internal energy, Q = heat added TO the system, W = work done BY the system. Energy cannot be created or destroyed. Second Law: entropy of an isolated system always increases (heat flows hot→cold spontaneously). Third Law: entropy approaches zero as temperature approaches absolute zero.`,concepts_tested:[`First Law of Thermodynamics`,`internal energy`,`heat`,`work`,`energy conservation`],formulas_used:[],common_trap:`1st Law: ΔU = Q - W (energy conservation). 2nd Law: entropy increases / heat flows hot to cold (option A and E are consequences of 2nd Law). 3rd Law: absolute zero is unattainable.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00238`,subject:`Physics`,chapter:`Ch4: Waves & Thermodynamics`,topic:`Latent Heat`,subtopic:`Latent Heat`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Ice at 0°C requires energy to melt into water at 0°C. This energy is called:`,options:[`A) Specific heat capacity`,`B) Latent heat of fusion`,`C) Specific heat of fusion`,`D) Thermal conductivity`,`E) Latent heat of vaporisation`],correct_index:1,explanation:`Latent heat of FUSION (L_f) is the energy required to convert a solid to liquid (or vice versa) at constant temperature (the melting/freezing point). Q = mL_f. For water: L_f = 334,000 J/kg = 334 kJ/kg. Latent heat of VAPORISATION (L_v) is the energy for liquid→gas at constant temperature. Q = mL_v. For water: L_v = 2,260,000 J/kg = 2260 kJ/kg — much larger than L_f, because breaking all intermolecular forces requires more energy than just loosening them.`,concepts_tested:[`latent heat`,`latent heat of fusion`,`melting`,`Q=mL`,`phase change`],formulas_used:[],common_trap:`Latent heat of FUSION: solid↔liquid (melting/freezing). Latent heat of VAPORISATION: liquid↔gas (boiling/condensing). L_vaporisation >> L_fusion for water (2260 vs 334 kJ/kg).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00239`,subject:`Physics`,chapter:`Ch4: Waves & Thermodynamics`,topic:`Sound Waves`,subtopic:`Sound Waves`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Sound is a longitudinal wave. This means that the particles of the medium vibrate:`,options:[`A) Perpendicular to the direction of wave travel`,`B) In circular motion around the equilibrium position`,`C) Parallel to the direction of wave travel`,`D) Stationary while energy travels through them`,`E) At right angles to both the wave direction and particle motion`],correct_index:2,explanation:`Longitudinal waves: particle oscillation is PARALLEL to the direction of wave propagation. Sound creates compressions (regions of high pressure/density) and rarefactions (low pressure/density) along the direction of travel. Transverse waves (e.g. light, electromagnetic waves, waves on a string): particle oscillation is PERPENDICULAR to wave direction. Sound requires a medium (cannot travel in vacuum); light does not.`,concepts_tested:[`longitudinal wave`,`sound`,`transverse wave`,`compression`,`rarefaction`],formulas_used:[],common_trap:`Longitudinal (sound): vibration PARALLEL to wave direction. Transverse (light, string waves): vibration PERPENDICULAR to wave direction. Sound CANNOT travel in vacuum; EM waves CAN.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00240`,subject:`Physics`,chapter:`Ch5: Fluid Mechanics`,topic:`Archimedes' Principle`,subtopic:`Archimedes' Principle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A 5 kg object is fully submerged in water and experiences an upthrust of 20 N. Taking g = 10 m/s², what is the apparent weight of the object?`,options:[`A) 50 N`,`B) 70 N`,`C) 30 N`,`D) 20 N`,`E) 10 N`],correct_index:2,explanation:`Actual weight = mg = 5 × 10 = 50 N (downward). Upthrust (buoyancy) = 20 N (upward). Apparent weight = actual weight - upthrust = 50 - 20 = 30 N. Archimedes' Principle: upthrust = weight of fluid displaced = ρ_fluid × V_submerged × g. An object floats when upthrust = weight (fully or partially submerged).`,concepts_tested:[`Archimedes' principle`,`upthrust`,`buoyancy`,`apparent weight`,`displacement`],formulas_used:[],common_trap:`Apparent weight = actual weight - upthrust. If upthrust > weight, the object accelerates upward (like a bubble). If upthrust = weight, the object is neutrally buoyant. Upthrust = weight of DISPLACED fluid.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00241`,subject:`Physics`,chapter:`Ch5: Fluid Mechanics`,topic:`Pascal's Principle`,subtopic:`Pascal's Principle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a hydraulic system, a force of 10 N is applied to a piston of area 0.002 m². What pressure is transmitted through the fluid?`,options:[`A) 0.0002 Pa`,`B) 5000 Pa`,`C) 50 Pa`,`D) 20,000 Pa`,`E) 2 Pa`],correct_index:1,explanation:`Pressure P = F/A = 10/0.002 = 5000 Pa. Pascal's Principle: pressure applied to a confined fluid is transmitted equally throughout the fluid. In a hydraulic system: P₁ = P₂, so F₁/A₁ = F₂/A₂. If piston 2 has 10× larger area, it exerts 10× larger force (hydraulic multiplication). Applications: car brakes, hydraulic lifts, syringes.`,concepts_tested:[`Pascal's principle`,`pressure`,`hydraulic system`,`P=F/A`,`fluid mechanics`],formulas_used:[],common_trap:`P = F/A. Pascal's principle: same pressure throughout enclosed fluid. Hydraulic multiplier: F₂/F₁ = A₂/A₁. Large area piston → large force output from small force input.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00242`,subject:`Physics`,chapter:`Ch5: Fluid Mechanics`,topic:`Bernoulli's Principle`,subtopic:`Bernoulli's Principle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Bernoulli's Principle states that in a fluid flowing through a horizontal pipe, regions of faster flow have:`,options:[`A) Higher pressure`,`B) Lower pressure`,`C) Equal pressure to slow-flow regions`,`D) Higher temperature`,`E) Greater density`],correct_index:1,explanation:`Bernoulli's equation for horizontal flow: P + ½ρv² = constant. Where flow is FASTER (higher v), pressure is LOWER (the ½ρv² term is larger, so P must be smaller to keep the sum constant). Applications: aircraft wings (faster airflow over curved top surface → lower pressure → lift), carburettors, Venturi meters, curveball in sport, atomisers.`,concepts_tested:[`Bernoulli's principle`,`fluid dynamics`,`pressure`,`flow velocity`,`lift`],formulas_used:[],common_trap:`Bernoulli: faster flow → LOWER pressure. This is counter-intuitive. Think of it as energy conservation: kinetic energy (fast flow) increases at the expense of pressure energy.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00243`,subject:`Physics`,chapter:`Ch5: Fluid Mechanics`,topic:`Density and Pressure`,subtopic:`Density and Pressure`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The pressure at a depth h in a fluid of density ρ is given by:`,options:[`A) P = ρgh²`,`B) P = ρg/h`,`C) P = ρgh (plus atmospheric pressure at the surface)`,`D) P = mg/h`,`E) P = ρ/gh`],correct_index:2,explanation:`Hydrostatic pressure: P = P_atm + ρgh, where ρ = fluid density (kg/m³), g = gravitational acceleration (≈10 m/s²), h = depth below surface. The ρgh term is the ADDITIONAL pressure due to the fluid column above. At the surface (h=0): P = P_atm = 101,325 Pa ≈ 100 kPa = 1 atm. Every 10 m depth in water adds approximately 100 kPa (≈1 atm) of additional pressure.`,concepts_tested:[`hydrostatic pressure`,`P=rho gh`,`depth`,`fluid density`,`atmospheric pressure`],formulas_used:[],common_trap:`Gauge pressure = ρgh (additional pressure due to fluid depth). Absolute pressure = P_atm + ρgh. At 10 m depth in water: pressure ≈ 2 atm total (1 atm atmosphere + 1 atm from 10 m of water).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00244`,subject:`Physics`,chapter:`Ch5: Fluid Mechanics`,topic:`Viscosity`,subtopic:`Viscosity`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A more viscous fluid:`,options:[`A) Flows more easily and has lower resistance to flow`,`B) Has lower density than a less viscous fluid`,`C) Flows less easily and has higher resistance to deformation`,`D) Is always a gas rather than a liquid`,`E) Has lower boiling point than a less viscous fluid`],correct_index:2,explanation:`Viscosity is a measure of a fluid's resistance to flow/deformation — its 'thickness'. Higher viscosity → flows more slowly (honey > water > air). Viscosity of liquids DECREASES with increasing temperature (molecules gain energy, intermolecular forces are overcome more easily). Viscosity of gases INCREASES with temperature (more momentum transfer between layers). Viscosity is NOT directly related to density or boiling point.`,concepts_tested:[`viscosity`,`fluid flow`,`resistance`,`temperature`,`shear stress`],formulas_used:[],common_trap:`Viscosity: resistance to FLOW. Viscosity of liquids DECREASES with temperature (honey flows faster when warm). Viscosity of gases INCREASES with temperature. Opposite trends!`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00245`,subject:`Physics`,chapter:`Ch6: Modern Physics`,topic:`Photoelectric Effect`,subtopic:`Photoelectric Effect`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The photoelectric effect showed that li
