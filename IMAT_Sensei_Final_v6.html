 walls with: abundant elastic tissue (to stretch and recoil with each heartbeat, maintaining pressure — Windkessel effect), smooth muscle (to regulate diameter and blood pressure), and collagen (structural support). Veins have thinner walls, larger lumen, and valves (to prevent backflow of low-pressure blood). Capillaries are one cell thick for exchange.`,concepts_tested:[`arteries`,`blood vessel structure`,`elastic tissue`,`smooth muscle`,`blood pressure`],formulas_used:[],common_trap:`Arteries = high pressure → thick walls, lots of elastic tissue. Veins = low pressure → thinner walls, have valves. Capillaries = exchange vessels → one endothelial cell thick.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00124`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Cardiac Cycle`,subtopic:`Cardiac Cycle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`During ventricular systole:`,options:[`A) The atrioventricular valves open and semilunar valves close`,`B) The atrioventricular valves close and semilunar valves open`,`C) Both AV and semilunar valves are open`,`D) Both AV and semilunar valves are closed`,`E) The heart relaxes and fills with blood`],correct_index:1,explanation:`Ventricular SYSTOLE = ventricular contraction. As ventricles contract: (1) Rising pressure closes the AV valves (mitral/tricuspid) — preventing backflow into atria — producing the first heart sound (S1, 'lub'). (2) When ventricular pressure exceeds aortic/pulmonary pressure, semilunar valves (aortic/pulmonary) open — blood is ejected. During diastole (relaxation), semilunar valves close (S2, 'dub'), AV valves open, ventricles fill.`,concepts_tested:[`cardiac cycle`,`ventricular systole`,`heart valves`,`atrioventricular`,`semilunar`],formulas_used:[],common_trap:`When the ventricle contracts: AV valves CLOSE (prevent backflow to atria). Semilunar valves OPEN (blood leaves). Heart sounds: S1='lub' (AV valves close). S2='dub' (semilunar valves close).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00125`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`ABO Blood Group`,subtopic:`ABO Blood Group`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A patient with blood group O Rh- (O negative) can SAFELY receive blood from which donor?`,options:[`A) A positive`,`B) B negative`,`C) AB negative`,`D) O negative only`,`E) Any blood group`],correct_index:3,explanation:`O negative (O-) is the universal donor blood because red blood cells lack A, B antigens AND the Rh factor — so no immune reaction occurs. However, O- individuals are NOT universal recipients. As a recipient, O- persons can ONLY receive O- blood (as they have anti-A, anti-B, AND anti-Rh antibodies). O+ has Rh factor so O- patients would react to it. The question asks what O- can RECEIVE — answer: only O- (D).`,concepts_tested:[`ABO blood group`,`blood transfusion`,`universal donor`,`universal recipient`,`Rh factor`],formulas_used:[],common_trap:`O- = universal DONOR (no antigens on RBCs). O- as RECIPIENT = can only receive O- (has antibodies against everything else including Rh). Universal RECIPIENT = AB+ (no antibodies against A, B, or Rh).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00126`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Gas Exchange`,subtopic:`Gas Exchange`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the alveoli, gas exchange occurs by simple diffusion. Which factor would INCREASE the rate of O₂ diffusion from alveolar air into the blood?`,options:[`A) Thicker alveolar membrane`,`B) Reduced surface area of alveoli`,`C) Steeper O₂ partial pressure gradient`,`D) Lower O₂ concentration in alveoli`,`E) Increased diffusion distance`],correct_index:2,explanation:`Gas exchange follows Fick's Law: Rate ∝ (Surface area × Concentration/pressure gradient × Membrane permeability) / Membrane thickness. A steeper O₂ partial pressure gradient (e.g. high alveolar pO₂ and very low blood pO₂ returning from exercising tissues) increases diffusion rate. In emphysema, alveoli fuse → reduced surface area → impaired gas exchange.`,concepts_tested:[`gas exchange`,`Fick's law`,`alveoli`,`partial pressure`,`diffusion`,`oxygen`],formulas_used:[],common_trap:`Fick's Law for gas exchange: MORE surface area, STEEPER gradient, THINNER membrane, HIGHER solubility = faster diffusion. Emphysema reduces surface area. Pulmonary fibrosis increases thickness.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00127`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Lymphatic System`,subtopic:`Lymphatic System`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`What is the primary function of the lymphatic system?`,options:[`A) Transport oxygenated blood to tissues`,`B) Return excess interstitial fluid to the bloodstream and transport dietary lipids`,`C) Produce red blood cells`,`D) Filter blood and remove waste products`,`E) Regulate blood pressure via hormones`],correct_index:1,explanation:`The lymphatic system: (1) drains excess interstitial fluid (tissue fluid) that leaks from capillaries back into the blood — preventing oedema; (2) transports dietary fats (chylomicrons absorbed from intestine) via lacteals → lymph vessels → thoracic duct → bloodstream; (3) immune function — lymph nodes filter lymph and contain lymphocytes; (4) transports immune cells. Lymph is eventually returned to the blood at the subclavian veins.`,concepts_tested:[`lymphatic system`,`interstitial fluid`,`lymph`,`lacteals`,`oedema`],formulas_used:[],common_trap:`Lymphatics return FLUID to the blood — not blood itself. Lymph nodes = immune surveillance. Lacteals = fat transport. These three functions are all tested.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00128`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Blood Pressure`,subtopic:`Blood Pressure`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In which vessels is blood pressure LOWEST?`,options:[`A) Aorta`,`B) Arteries`,`C) Arterioles`,`D) Capillaries`,`E) Veins`],correct_index:4,explanation:`Blood pressure decreases progressively as blood moves further from the heart: Aorta (~100 mmHg mean) > Arteries > Arterioles (greatest resistance, largest pressure drop) > Capillaries (~30-10 mmHg) > Veins (~15-5 mmHg) > Right atrium (~0 mmHg). Veins have the lowest blood pressure. They rely on skeletal muscle compression, respiratory pressure changes, and venous valves to return blood to the heart.`,concepts_tested:[`blood pressure`,`veins`,`arteries`,`capillaries`,`pressure gradient`],formulas_used:[],common_trap:`Arterioles have the GREATEST resistance and LARGEST pressure drop. Veins have the LOWEST pressure. Capillaries have the LOWEST velocity (largest total cross-sectional area).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00129`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Electrocardiogram`,subtopic:`Electrocardiogram`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which component of the ECG represents ventricular depolarisation (which triggers ventricular contraction)?`,options:[`A) P wave`,`B) QRS complex`,`C) T wave`,`D) PR interval`,`E) ST segment`],correct_index:1,explanation:`P wave = atrial depolarisation (atria contract). QRS complex = ventricular depolarisation (ventricles contract — systole). T wave = ventricular repolarisation (ventricles relax — diastole). PR interval = time for impulse to travel from SA node through AV node (AV conduction time). Atrial repolarisation is hidden within the QRS complex. The ECG sequence: SA node fires → P wave → AV node delay (PR interval) → Bundle of His → QRS → ventricular contraction.`,concepts_tested:[`ECG`,`QRS complex`,`depolarisation`,`cardiac conduction`,`P wave`,`T wave`],formulas_used:[],common_trap:`P = atria contract. QRS = ventricles contract. T = ventricles relax. Atrial repolarisation is hidden by the QRS complex (too small to see).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00130`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Red Blood Cells`,subtopic:`Red Blood Cells`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is NOT a characteristic of mature human red blood cells?`,options:[`A) Biconcave disc shape`,`B) Presence of haemoglobin`,`C) No nucleus`,`D) Presence of mitochondria`,`E) Flexible membrane`],correct_index:3,explanation:`Mature human red blood cells (erythrocytes) are unusual: they LACK a nucleus AND mitochondria (and most other organelles). This creates more space for haemoglobin (~280 million Hb molecules per RBC). They generate ATP via anaerobic glycolysis (no mitochondria needed). Their biconcave disc shape maximises surface area to volume ratio for O₂ exchange and allows flexibility to squeeze through narrow capillaries.`,concepts_tested:[`red blood cells`,`erythrocytes`,`haemoglobin`,`no nucleus`,`no mitochondria`],formulas_used:[],common_trap:`RBCs have NO nucleus AND NO mitochondria in humans. They use only anaerobic respiration. This makes them unable to undergo mitosis or repair themselves — hence their 120-day lifespan before destruction by the spleen.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00131`,subject:`Biology`,chapter:`Ch14: Human Anatomy III - Endocrine System`,topic:`Insulin vs Glucagon`,subtopic:`Insulin vs Glucagon`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`When blood glucose levels rise after a meal, which hormone is released to lower blood glucose?`,options:[`A) Glucagon from alpha cells of the islets of Langerhans`,`B) Insulin from beta cells of the islets of Langerhans`,`C) Adrenaline from the adrenal medulla`,`D) Cortisol from the adrenal cortex`,`E) Thyroxine from the thyroid gland`],correct_index:1,explanation:`After a meal, rising blood glucose stimulates beta (β) cells of the islets of Langerhans (in the pancreas) to secrete INSULIN. Insulin promotes: glucose uptake by cells (especially muscle and fat) via GLUT4 transporters, glycogen synthesis (glycogenesis) in liver and muscle, and protein/fat synthesis. Glucagon (from alpha/α cells) has the OPPOSITE effect — raises blood glucose when levels drop between meals.`,concepts_tested:[`insulin`,`glucagon`,`blood glucose`,`pancreas`,`islets of Langerhans`],formulas_used:[],common_trap:`Insulin = LOWERS blood glucose (released when glucose is HIGH). Glucagon = RAISES blood glucose (released when glucose is LOW). Alpha cells = glucagon. Beta cells = insulin.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00132`,subject:`Biology`,chapter:`Ch14: Human Anatomy III - Endocrine System`,topic:`Negative Feedback`,subtopic:`Negative Feedback`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The hypothalamus-pituitary-thyroid (HPT) axis operates via negative feedback. If a patient has low thyroid hormone (T3/T4) levels, what would you expect?`,options:[`A) High TSH and low TRH`,`B) High TSH and high TRH`,`C) Low TSH and low TRH`,`D) Low TSH and high TRH`,`E) Normal TSH and high TRH`],correct_index:1,explanation:`The HPT axis: Hypothalamus releases TRH (thyrotropin-releasing hormone) → Anterior pituitary releases TSH (thyroid-stimulating hormone) → Thyroid gland releases T3/T4. NEGATIVE FEEDBACK: T3/T4 normally inhibit both TRH and TSH release. If T3/T4 are LOW, negative feedback is removed → both TRH AND TSH rise as the body tries to stimulate more thyroid hormone production. This is primary hypothyroidism: high TSH + high TRH + low T3/T4.`,concepts_tested:[`negative feedback`,`hypothalamus`,`pituitary`,`thyroid`,`TSH`,`TRH`,`HPT axis`],formulas_used:[],common_trap:`In primary hypothyroidism (thyroid fails): low T3/T4 → feedback removed → HIGH TSH. In secondary hypothyroidism (pituitary fails): low TSH causes low T3/T4. TSH is the key clinical test — it's highly sensitive.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00133`,subject:`Biology`,chapter:`Ch14: Human Anatomy III - Endocrine System`,topic:`Adrenal Glands`,subtopic:`Adrenal Glands`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Adrenaline (epinephrine) is produced by which part of the adrenal gland?`,options:[`A) Adrenal cortex — zona glomerulosa`,`B) Adrenal cortex — zona fasciculata`,`C) Adrenal medulla`,`D) Adrenal cortex — zona reticularis`,`E) Hypothalamus`],correct_index:2,explanation:`The adrenal gland has two distinct regions: CORTEX (outer) — produces steroid hormones: aldosterone (zona glomerulosa), cortisol (zona fasciculata), androgens (zona reticularis). MEDULLA (inner) — derived from neural crest cells, acts as a modified sympathetic ganglion, produces catecholamines: ADRENALINE (epinephrine, ~80%) and noradrenaline (~20%). Released in the 'fight or flight' response.`,concepts_tested:[`adrenal gland`,`adrenaline`,`adrenal medulla`,`catecholamines`,`fight or flight`],formulas_used:[],common_trap:`Cortex = steroid hormones (aldosterone, cortisol, androgens). Medulla = adrenaline/noradrenaline (catecholamines). 'GFR' mnemonic for cortex layers: Glomerulosa (aldosterone), Fasciculata (cortisol), Reticularis (androgens).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00134`,subject:`Biology`,chapter:`Ch14: Human Anatomy III - Endocrine System`,topic:`Steroid Hormones`,subtopic:`Steroid Hormones`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Steroid hormones exert their effects PRIMARILY by:`,options:[`A) Binding to cell surface receptors and activating second messenger systems`,`B) Crossing the cell membrane and binding to intracellular receptors to regulate gene transcription`,`C) Binding to ion channels and directly changing membrane potential`,`D) Being incorporated into the cell membrane to change its fluidity`,`E) Activating enzyme cascades on the outer surface of the plasma membrane`],correct_index:1,explanation:`Steroid hormones (cortisol, testosterone, oestrogen, aldosterone, vitamin D) are LIPID-SOLUBLE and can cross the phospholipid bilayer. They bind to INTRACELLULAR receptors (in cytoplasm or nucleus), and the hormone-receptor complex acts as a transcription factor — binding to hormone response elements (HREs) in DNA to directly regulate gene expression. This mechanism is slower but longer-lasting than peptide hormone signalling.`,concepts_tested:[`steroid hormones`,`intracellular receptors`,`gene transcription`,`lipid soluble`,`second messenger`],formulas_used:[],common_trap:`Steroid hormones = lipid soluble = cross membrane = intracellular receptors = direct gene regulation (slow, lasting). Peptide hormones (insulin, glucagon) = water soluble = cannot cross membrane = surface receptors = second messengers (fast, short).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00135`,subject:`Biology`,chapter:`Ch14: Human Anatomy III - Endocrine System`,topic:`Growth Hormone`,subtopic:`Growth Hormone`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Growth hormone (GH) is secreted by which gland?`,options:[`A) Thyroid`,`B) Adrenal cortex`,`C) Anterior pituitary`,`D) Posterior pituitary`,`E) Pancreas`],correct_index:2,explanation:`Growth hormone (somatotropin) is secreted by somatotroph cells in the ANTERIOR pituitary gland, stimulated by GHRH (growth hormone releasing hormone) from the hypothalamus and inhibited by somatostatin. GH acts directly on tissues (lipolysis, protein synthesis) and indirectly via IGF-1 (insulin-like growth factor-1) produced mainly by the liver. Deficiency in childhood = dwarfism; excess = gigantism/acromegaly.`,concepts_tested:[`growth hormone`,`anterior pituitary`,`somatotroph`,`GH`,`IGF-1`],formulas_used:[],common_trap:`Anterior pituitary: GH, TSH, ACTH, FSH, LH, prolactin (mnemonic: 'FLAT PiG'). Posterior pituitary: ADH (vasopressin) and oxytocin (made in hypothalamus, stored/released by posterior pituitary).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00136`,subject:`Biology`,chapter:`Ch15: Human Anatomy IV - Digestive System`,topic:`Digestion`,subtopic:`Digestion`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which enzyme begins the digestion of starch in the mouth?`,options:[`A) Pepsin`,`B) Lipase`,`C) Amylase`,`D) Trypsin`,`E) Lactase`],correct_index:2,explanation:`Salivary AMYLASE (ptyalin) is secreted by salivary glands and begins starch digestion in the mouth, breaking α-1,4 glycosidic bonds to produce maltose and dextrins. Digestion of starch continues in the small intestine by pancreatic amylase. Pepsin digests proteins in the stomach (activated from pepsinogen by HCl). Lipase (pancreatic) digests fats. Trypsin digests proteins in the small intestine.`,concepts_tested:[`amylase`,`starch digestion`,`saliva`,`mouth`,`enzyme`],formulas_used:[],common_trap:`Salivary amylase starts CARBOHYDRATE digestion. Pepsin starts PROTEIN digestion (in stomach). Pancreatic lipase digests FATS. Each enzyme is specific to its substrate and works in the correct location.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00137`,subject:`Biology`,chapter:`Ch15: Human Anatomy IV - Digestive System`,topic:`Small Intestine`,subtopic:`Small Intestine`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which structural adaptations of the small intestine INCREASE its surface area for absorption?

1. Plicae circulares (circular folds)
2. Villi
3. Microvilli (brush border)
4. Haustra`,options:[`A) 1, 2 and 3 only`,`B) 2 and 3 only`,`C) 1 and 2 only`,`D) 1, 2, 3 and 4`,`E) 3 and 4 only`],correct_index:0,explanation:`The small intestine increases surface area through three layers of folding: (1) Plicae circulares (circular folds, ~3×), (2) Villi (finger-like projections, ~10×), (3) Microvilli/brush border on enterocytes (~20×). Together they increase SA by ~600× compared to a simple tube. This allows the ~7m small intestine to absorb efficiently. Haustra are the pouches/sacculations found in the LARGE intestine (colon), not the small intestine.`,concepts_tested:[`small intestine`,`villi`,`microvilli`,`surface area`,`absorption`,`plicae circulares`],formulas_used:[],common_trap:`Haustra are in the LARGE intestine (colon). The three SA adaptations of the SMALL intestine are: plicae circulares → villi → microvilli (each increasing SA at a smaller scale).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00138`,subject:`Biology`,chapter:`Ch15: Human Anatomy IV - Digestive System`,topic:`Stomach`,subtopic:`Stomach`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which cells of the stomach secrete hydrochloric acid (HCl)?`,options:[`A) Chief cells`,`B) Goblet cells`,`C) G cells`,`D) Parietal cells`,`E) Mucous neck cells`],correct_index:3,explanation:`Parietal cells (oxyntic cells) in the gastric glands secrete: HCl (via H⁺/K⁺ ATPase proton pump — blocked by proton pump inhibitors like omeprazole) and intrinsic factor (essential for vitamin B12 absorption in the terminal ileum). Chief cells secrete pepsinogen (converted to pepsin by HCl). G cells secrete gastrin (stimulates acid secretion). Mucous cells secrete mucus (protects stomach lining from HCl).`,concepts_tested:[`parietal cells`,`HCl`,`stomach`,`gastric acid`,`pepsinogen`,`chief cells`],formulas_used:[],common_trap:`Parietal cells: HCl + intrinsic factor. Chief cells: pepsinogen. G cells: gastrin. Mucous cells: mucus. Proton pump inhibitors (PPIs) like omeprazole block the H⁺/K⁺ ATPase in parietal cells.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00139`,subject:`Biology`,chapter:`Ch15: Human Anatomy IV - Digestive System`,topic:`Liver Functions`,subtopic:`Liver Functions`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is NOT a function of the liver?`,options:[`A) Production of bile salts for fat emulsification`,`B) Detoxification of drugs and alcohol`,`C) Synthesis of most plasma proteins including albumin`,`D) Storage of glycogen`,`E) Production of insulin`],correct_index:4,explanation:`The liver performs hundreds of functions including: bile production (bile salts emulsify fats), detoxification (cytochrome P450 enzymes), synthesis of plasma proteins (albumin, clotting factors, complement), glycogen storage and release, gluconeogenesis, cholesterol synthesis, urea production (from amino acid deamination), and vitamin storage. INSULIN is produced by the PANCREAS (beta cells) — NOT the liver.`,concepts_tested:[`liver functions`,`bile`,`detoxification`,`albumin`,`glycogen`,`insulin`],formulas_used:[],common_trap:`The pancreas makes insulin. The liver responds to insulin (promotes glycogen storage). The liver and pancreas are distinct glands with different functions — they work together in glucose homeostasis.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00140`,subject:`Biology`,chapter:`Ch16: Ecology & Classification`,topic:`Classification`,subtopic:`Classification`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which taxonomic ranks, in order from BROADEST to MOST specific, are used in the Linnaean system?`,options:[`A) Species → Genus → Family → Order → Class → Phylum → Kingdom → Domain`,`B) Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species`,`C) Kingdom → Domain → Phylum → Class → Order → Family → Genus → Species`,`D) Domain → Phylum → Kingdom → Class → Family → Order → Genus → Species`,`E) Species → Family → Genus → Order → Class → Phylum → Kingdom → Domain`],correct_index:1,explanation:`The correct hierarchical order (broadest → most specific): Domain → Kingdom → Phylum → Class → Order → Family → Genus → Species. Mnemonic: 'Dear King Philip Came Over For Good Soup'. Humans: Eukarya → Animalia → Chordata → Mammalia → Primates → Hominidae → Homo → sapiens.`,concepts_tested:[`classification`,`taxonomy`,`Linnaean system`,`binomial nomenclature`,`Domain to Species`],formulas_used:[],common_trap:`Species is the MOST specific rank. Domain is the BROADEST. Genus + species = binomial nomenclature (e.g. Homo sapiens — always italicised, genus capitalised, species lowercase).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00141`,subject:`Biology`,chapter:`Ch16: Ecology & Classification`,topic:`Food Chains`,subtopic:`Food Chains`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a food chain, only approximately what percentage of energy is transferred from one trophic level to the next?`,options:[`A) 1%`,`B) 5%`,`C) 10%`,`D) 50%`,`E) 90%`],correct_index:2,explanation:`The 10% rule (Lindemann's efficiency): approximately 10% of energy from one trophic level is available to the next. The remaining ~90% is lost as: heat (respiration), waste (faeces/urine), and unconsumed biomass. This explains why food chains rarely exceed 4-5 links — by that point, insufficient energy remains. It also explains why eating lower in the food chain (e.g. plants rather than meat) is more energy-efficient.`,concepts_tested:[`energy transfer`,`food chain`,`trophic levels`,`10% rule`,`ecological efficiency`],formulas_used:[],common_trap:`10% energy transfer means only 1/10th is available at each level. Producer has 1000 kJ → Herbivore gets 100 kJ → Carnivore gets 10 kJ → Top predator gets 1 kJ. This is why there are few top predators.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00142`,subject:`Biology`,chapter:`Ch16: Ecology & Classification`,topic:`Nitrogen Cycle`,subtopic:`Nitrogen Cycle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Nitrogen fixation — the conversion of atmospheric N₂ to ammonia (NH₃) — is carried out by:`,options:[`A) All plants through their roots`,`B) Nitrogen-fixing bacteria (e.g. Rhizobium) in root nodules of legumes`,`C) Lightning strikes and plants only`,`D) Decomposers (fungi and bacteria) breaking down organic material`,`E) Animals excreting urea`],correct_index:1,explanation:`Biological nitrogen fixation is performed by nitrogen-fixing bacteria containing the enzyme nitrogenase: Rhizobium (symbiotic, in legume root nodules, e.g. peas, beans, clover), Azotobacter and Cyanobacteria (free-living in soil/water). They reduce N₂ → NH₃ (ammonia). Other cycle processes: nitrification (NH₃ → NO₂⁻ → NO₃⁻, by nitrifying bacteria), denitrification (NO₃⁻ → N₂, by denitrifying bacteria), decomposition (organic N → NH₃).`,concepts_tested:[`nitrogen fixation`,`Rhizobium`,`nitrogen cycle`,`nitrification`,`denitrification`],formulas_used:[],common_trap:`Plants CANNOT fix nitrogen themselves — they depend on the symbiosis with Rhizobium. The mutualism: plant provides carbohydrates, bacteria provide fixed nitrogen (ammonia).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00143`,subject:`Biology`,chapter:`Ch16: Ecology & Classification`,topic:`Population Growth`,subtopic:`Population Growth`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly describes logistic population growth?`,options:[`A) Exponential growth that continues indefinitely`,`B) Population growth that slows as it approaches the carrying capacity (K)`,`C) Population growth that only occurs in prokaryotes`,`D) Linear population growth at a constant rate`,`E) Population decline when resources are abundant`],correct_index:1,explanation:`Logistic growth: population initially grows rapidly (J-shaped exponential growth phase), but as resources become limiting, growth SLOWS and the population size levels off at the carrying capacity (K) — the maximum population the environment can sustain. This produces an S-shaped (sigmoid) curve. Limiting factors: food, space, predation, disease. Exponential growth (unlimited) produces a J-curve — only possible when resources are unlimited.`,concepts_tested:[`logistic growth`,`carrying capacity`,`S-curve`,`population ecology`,`limiting factors`],formulas_used:[],common_trap:`J-curve = exponential (unlimited resources). S-curve = logistic (resources become limiting). Carrying capacity K = the plateau. As population → K, growth rate → 0.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00144`,subject:`Biology`,chapter:`Ch16: Ecology & Classification`,topic:`Biodiversity`,subtopic:`Biodiversity`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following definitions correctly describes a SPECIES?`,options:[`A) A group of organisms with similar morphology living in the same habitat`,`B) A group of organisms that can interbreed to produce fertile offspring`,`C) A group of organisms with identical DNA sequences`,`D) A group of organisms at the same trophic level`,`E) Any group of organisms classified under the same genus`],correct_index:1,explanation:`The biological species concept (Mayr): a species = a group of organisms that CAN interbreed naturally in the wild AND produce FERTILE offspring. Reproductive isolation = unable to interbreed or produce fertile offspring → different species. Example: horses and donkeys can mate but produce mules (infertile) → different species. Limitations: doesn't apply well to asexual organisms, bacteria, or extinct species.`,concepts_tested:[`species`,`biological species concept`,`reproductive isolation`,`fertile offspring`,`Mayr`],formulas_used:[],common_trap:`FERTILE offspring = same species (dogs). INFERTILE offspring = different species (horse + donkey = mule). The KEY word is FERTILE, not just able to reproduce.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00145`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Atomic Structure`,subtopic:`Atomic Structure`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The atomic number of an element is equal to the number of:`,options:[`A) Neutrons in the nucleus`,`B) Protons in the nucleus (= electrons in neutral atom)`,`C) Protons plus neutrons`,`D) Electrons in the outermost shell`,`E) Mass units in the nucleus`],correct_index:1,explanation:`The atomic number (Z) = number of protons in the nucleus. In a neutral (uncharged) atom, number of protons = number of electrons. The mass number (A) = protons + neutrons. Different isotopes of the same element have the same atomic number (same protons) but different mass numbers (different neutrons). Example: Carbon-12 and Carbon-14 both have Z=6 (6 protons) but 6 and 8 neutrons respectively.`,concepts_tested:[`atomic number`,`protons`,`atomic structure`,`isotopes`,`mass number`],formulas_used:[],common_trap:`Atomic number Z = protons (and electrons in neutral atom). Mass number A = protons + neutrons. Isotopes: same Z, different A (different neutron number).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00146`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Electronic Configuration`,subtopic:`Electronic Configuration`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the electronic configuration of chlorine (Z=17)?`,options:[`A) 2, 8, 7`,`B) 2, 7, 8`,`C) 2, 8, 6, 1`,`D) 2, 8, 2, 5`,`E) 2, 9, 6`],correct_index:0,explanation:`Chlorine has 17 electrons. Filling shells: Shell 1 holds max 2e⁻, Shell 2 holds max 8e⁻, Shell 3 holds the remaining 7e⁻. Configuration = 2, 8, 7. Chlorine has 7 valence electrons → it tends to GAIN 1 electron to form Cl⁻ (chloride ion) with a complete outer shell of 8 electrons (like argon).`,concepts_tested:[`electronic configuration`,`chlorine`,`electron shells`,`valence electrons`,`ions`],formulas_used:[],common_trap:`Fill shells in order: 2, 8, 8, 18... Chlorine (17 electrons) = 2 + 8 + 7. Having 7 valence electrons makes it a highly reactive non-metal that gains electrons (oxidising agent).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00147`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Isotopes`,subtopic:`Isotopes`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Two isotopes of the same element must have the same:`,options:[`A) Mass number`,`B) Number of neutrons`,`C) Atomic mass`,`D) Number of protons`,`E) Physical properties`],correct_index:3,explanation:`Isotopes are atoms of the SAME element with the SAME number of protons (and electrons) but DIFFERENT numbers of neutrons — therefore different mass numbers and different atomic masses. Same number of protons = same element = same chemical properties (roughly). Physical properties may differ (e.g. C-12 vs C-14 have different densities, radioactivity). C-14 is radioactive; C-12 is not.`,concepts_tested:[`isotopes`,`protons`,`neutrons`,`mass number`,`atomic number`],formulas_used:[],common_trap:`Isotopes: SAME protons (same element, same atomic number). DIFFERENT neutrons (different mass number). Different atomic masses. Same chemical properties (same electron configuration).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00148`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Quantum Numbers`,subtopic:`Quantum Numbers`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`The maximum number of electrons that can occupy the 3d subshell is:`,options:[`A) 2`,`B) 6`,`C) 10`,`D) 14`,`E) 18`],correct_index:2,explanation:`The 3d subshell has 5 orbitals (ml = -2, -1, 0, +1, +2). Each orbital holds a maximum of 2 electrons (spin up and spin down, by Pauli exclusion principle). Therefore: 5 orbitals × 2 electrons = 10 electrons maximum in the 3d subshell. The d subshell ALWAYS has 5 orbitals regardless of the principal quantum number. Compare: s = 1 orbital (max 2e), p = 3 orbitals (max 6e), d = 5 orbitals (max 10e), f = 7 orbitals (max 14e).`,concepts_tested:[`quantum numbers`,`d subshell`,`orbitals`,`electron configuration`,`Pauli exclusion`],formulas_used:[],common_trap:`s = 1 orbital = 2e max. p = 3 orbitals = 6e max. d = 5 orbitals = 10e max. f = 7 orbitals = 14e max. Always multiply by 2 (Pauli exclusion principle: 2e per orbital).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00149`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Mass Spectrometry`,subtopic:`Mass Spectrometry`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a mass spectrum, the relative atomic mass of an element is calculated as:`,options:[`A) The mass of the most abundant isotope`,`B) The mass number of the heaviest isotope`,`C) The weighted average of isotope masses based on their relative abundances`,`D) The sum of all isotope masses`,`E) The mass of the lightest isotope`],correct_index:2,explanation:`Relative atomic mass (Ar) = weighted average: Ar = Σ(isotope mass × % abundance) / 100. For chlorine: 35Cl (75%) and 37Cl (25%): Ar = (35 × 75 + 37 × 25) / 100 = (2625 + 925)/100 = 35.5. This is why Cl has Ar = 35.5 (not a whole number). Most elements have non-integer Ar values because they exist as mixtures of isotopes.`,concepts_tested:[`relative atomic mass`,`isotope abundance`,`mass spectrometry`,`weighted average`],formulas_used:[],common_trap:`Ar is a WEIGHTED AVERAGE — more abundant isotopes contribute MORE to the average. Chlorine (75% 35Cl + 25% 37Cl) = 35.5. Non-integer Ar always means multiple natural isotopes.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00150`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Ionisation Energy`,subtopic:`Ionisation Energy`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Why does ionisation energy generally INCREASE across a period (left to right) in the periodic table?`,options:[`A) More electron shells are added, increasing shielding`,`B) Increasing nuclear charge (more protons) with same shielding effect pulls electrons closer`,`C) Fewer protons means weaker nuclear attraction`,`D) Larger atomic radius in each successive element`,`E) More electron-electron repulsion in higher groups`],correct_index:1,explanation:`Across a period: nuclear charge (Z) INCREASES (more protons) while electrons are added to the SAME shell — shielding remains roughly constant. The increasing nuclear charge pulls all electrons closer to the nucleus more strongly. Higher ionisation energy = harder to remove an electron. Exceptions: Group 13 has slightly lower IE than Group 2 (removing from p subshell above filled s is easier), and Group 16 slightly lower than Group 15 (paired electrons in p subshell repel each other).`,concepts_tested:[`ionisation energy`,`nuclear charge`,`shielding`,`periodic trends`,`periodicity`],formulas_used:[],common_trap:`Trend: across period → IE increases (more protons, same shielding). Down group → IE decreases (more shielding, larger radius). Watch for exceptions at Group 13 and 16.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00151`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Electron Shells`,subtopic:`Electron Shells`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`How many electrons can the third electron shell (n=3) hold at MAXIMUM?`,options:[`A) 2`,`B) 8`,`C) 18`,`D) 32`,`E) 10`],correct_index:2,explanation:`Maximum electrons per shell = 2n², where n = shell number. For n=3: 2 × 3² = 2 × 9 = 18. Shell 3 contains: 3s (2e), 3p (6e), 3d (10e) = 18 total. In practice, elements fill the 4s before 3d (Aufbau principle), so the 3d orbitals are filled after 4s.`,concepts_tested:[`electron shells`,`principal quantum number`,`maximum electrons`,`subshells`],formulas_used:[],common_trap:`Formula: 2n². n=1: 2×1=2. n=2: 2×4=8. n=3: 2×9=18. n=4: 2×16=32. But in practice, 4s fills before 3d.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00152`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Nuclear Stability`,subtopic:`Nuclear Stability`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What holds the nucleus together against the electrostatic repulsion between protons?`,options:[`A) Electron-electron interactions`,`B) The strong nuclear force`,`C) Gravitational force between nucleons`,`D) Covalent bonds between protons`,`E) Van der Waals forces`],correct_index:1,explanation:`The strong nuclear force (strong interaction) is one of the four fundamental forces. It is a short-range (~10⁻¹⁵ m) but very powerful attractive force that acts between all nucleons (protons AND neutrons), overcoming the electrostatic repulsion between protons. Neutrons contribute to strong force without adding repulsion, which is why heavier nuclei need more neutrons for stability (increasing neutron:proton ratio with atomic number).`,concepts_tested:[`strong nuclear force`,`nuclear stability`,`protons`,`electrostatic repulsion`,`nucleons`],formulas_used:[],common_trap:`The strong nuclear force is ~137 times stronger than electrostatic repulsion at short range — but drops off rapidly beyond nuclear distances. Gravity is far too weak at this scale.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00153`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Radioactivity`,subtopic:`Radioactivity`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`During alpha decay, an atom of radium-226 (Ra, Z=88) emits an alpha particle. What is the daughter nuclide?`,options:[`A) Radon-222, Z=86`,`B) Radium-224, Z=88`,`C) Francium-222, Z=87`,`D) Thorium-230, Z=90`,`E) Polonium-226, Z=84`],correct_index:0,explanation:`An alpha particle = ⁴₂He (2 protons + 2 neutrons). In alpha decay: mass number decreases by 4 (226-4=222), atomic number decreases by 2 (88-2=86). Z=86 = Radon (Rn). Daughter nuclide = ²²²Rn. Beta-minus decay: n→p+e⁻, Z increases by 1, A unchanged. Beta-plus decay: p→n+positron, Z decreases by 1, A unchanged. Gamma decay: no change in A or Z.`,concepts_tested:[`alpha decay`,`radioactivity`,`nuclear equations`,`radium`,`radon`],formulas_used:[],common_trap:`Alpha: A-4, Z-2. Beta-minus: A unchanged, Z+1. Beta-plus: A unchanged, Z-1. Gamma: no change. Use the periodic table to identify the element from Z.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00154`,subject:`Chemistry`,chapter:`Ch1: Atomic Structure`,topic:`Bohr Model`,subtopic:`Bohr Model`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`In the Bohr model, an electron emits a photon when it:`,options:[`A) Absorbs energy and jumps to a higher energy level`,`B) Falls from a higher to a lower energy level`,`C) Is ionised from the atom`,`D) Collides with another electron`,`E) Spins in its orbital`],correct_index:1,explanation:`In the Bohr model, electrons occupy discrete energy levels (orbits) around the nucleus. When an electron ABSORBS energy (e.g. from heat or light), it jumps to a higher energy level (excited state). When it falls BACK to a lower level, it RELEASES the energy difference as a photon of light with specific frequency: E = hν. This explains atomic emission spectra — each element has a unique spectral 'fingerprint'.`,concepts_tested:[`Bohr model`,`electron transitions`,`photon emission`,`atomic spectra`,`energy levels`],formulas_used:[],common_trap:`Absorption: electron jumps UP (gains energy). Emission: electron falls DOWN (releases photon). The energy of the photon = energy difference between the two levels. E = hν = hc/λ.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00155`,subject:`Chemistry`,chapter:`Ch2: Periodic Table`,topic:`Periodic Trends`,subtopic:`Periodic Trends`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following trends is correct when moving DOWN a group in the periodic table?`,options:[`A) Ionisation energy increases`,`B) Atomic radius decreases`,`C) Electronegativity increases`,`D) Atomic radius increases`,`E) Metallic character decreases`],correct_index:3,explanation:`Down a group: more electron shells are added → larger atomic radius (more shielding, valence electrons further from nucleus). This also means: lower ionisation energy (easier to remove outer electrons), lower electronegativity (weaker pull on bonding electrons), and greater metallic character. Across a period (left→right): atomic radius DECREASES (more protons pulling electrons in, same shell).`,concepts_tested:[`periodic table`,`atomic radius`,`ionisation energy`,`electronegativity`,`periodic trends`],formulas_used:[],common_trap:`Down a group: radius INCREASES, IE DECREASES, electronegativity DECREASES. Across a period: radius DECREASES, IE INCREASES, electronegativity INCREASES. These two trends are opposite.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00156`,subject:`Chemistry`,chapter:`Ch2: Periodic Table`,topic:`Group Properties`,subtopic:`Group Properties`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Elements in Group 1 (alkali metals) are characterised by:`,options:[`A) High melting points and being poor conductors`,`B) Having 1 valence electron, being highly reactive, and forming +1 ions`,`C) Being noble gases with full outer shells`,`D) Having 7 valence electrons and forming -1 ions`,`E) Being transition metals with variable oxidation states`],correct_index:1,explanation:`Group 1 (Li, Na, K, Rb, Cs, Fr) — alkali metals: all have 1 valence electron in the s subshell. They readily LOSE this electron to form stable +1 cations with a full outer shell. They are: very reactive (especially with water), low melting points (decrease down the group), low density, and soft. Reactivity INCREASES down the group (outer electron is further from nucleus and easier to remove). They react vigorously with water: 2Na + 2H₂O → 2NaOH + H₂.`,concepts_tested:[`Group 1`,`alkali metals`,`valence electrons`,`reactivity`,`periodic table`],formulas_used:[],common_trap:`Group 1 reactivity INCREASES down the group (Li < Na < K < Rb < Cs). Group 17 (halogens) reactivity DECREASES down the group (F > Cl > Br > I). Both trends relate to ease of electron transfer.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00157`,subject:`Chemistry`,chapter:`Ch2: Periodic Table`,topic:`Halogens`,subtopic:`Halogens`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which halogen is the strongest oxidising agent?`,options:[`A) Iodine (I₂)`,`B) Bromine (Br₂)`,`C) Chlorine (Cl₂)`,`D) Fluorine (F₂)`,`E) Astatine (At₂)`],correct_index:3,explanation:`Oxidising ability of halogens DECREASES down Group 17: F₂ > Cl₂ > Br₂ > I₂. Fluorine is the strongest oxidising agent of ALL elements — it has the highest electronegativity (3.98), smallest atomic radius, and greatest tendency to gain an electron. Each halogen can displace the halides below it from solution (displacement reactions): Cl₂ displaces Br⁻ and I⁻; Br₂ displaces I⁻ only; I₂ cannot displace Cl⁻ or Br⁻.`,concepts_tested:[`halogens`,`oxidising agent`,`fluorine`,`electronegativity`,`Group 17`],formulas_used:[],common_trap:`Halogen oxidising power DECREASES down the group (F₂ most powerful, I₂ least). A more reactive halogen displaces a less reactive halide from solution.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00158`,subject:`Chemistry`,chapter:`Ch2: Periodic Table`,topic:`Transition Metals`,subtopic:`Transition Metals`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is a characteristic property of transition metals?`,options:[`A) They only form ions with a single oxidation state`,`B) They have variable oxidation states and form coloured ions`,`C) They are all non-conductors of electricity`,`D) They react explosively with water`,`E) They have very low melting points`],correct_index:1,explanation:`Transition metals (d-block, periods 4-6) are characterised by: (1) variable oxidation states (e.g. Fe can be +2 or +3; Mn can be +2 to +7) — due to similar energies of 3d and 4s electrons; (2) formation of coloured ions (d-d electron transitions absorb visible light); (3) catalytic activity (e.g. Fe in Haber process, Pt in catalytic converters); (4) high melting points and densities; (5) forming complex ions. They are good conductors.`,concepts_tested:[`transition metals`,`oxidation states`,`coloured ions`,`d-block`,`catalysis`],formulas_used:[],common_trap:`Transition metals: variable oxidation states, coloured ions, catalytic properties, high melting points. Main group metals typically have fixed oxidation states (e.g. Na always +1, Ca always +2).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00159`,subject:`Chemistry`,chapter:`Ch2: Periodic Table`,topic:`Noble Gases`,subtopic:`Noble Gases`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Noble gases are chemically inert primarily because:`,options:[`A) They are gaseous at room temperature`,`B) They have a complete outer shell of electrons (8 valence electrons, except He with 2)`,`C) They have very low atomic masses`,`D) They are found in very small quantities in the atmosphere`,`E) Their electrons are too heavy to be transferred`],correct_index:1,explanation:`Noble gases (Group 18: He, Ne, Ar, Kr, Xe, Rn) have full outer electron shells: He = 2e⁻ (1s²), all others = 8 valence electrons (ns²np⁶). This 'octet' configuration is extremely stable — they have very high first ionisation energies and essentially zero tendency to gain or lose electrons. Xe and Kr can form some compounds (e.g. XeF₂, XeF₄) under extreme conditions.`,concepts_tested:[`noble gases`,`Group 18`,`full outer shell`,`octet`,`chemical inertness`],formulas_used:[],common_trap:`He is inert with just 2 electrons (full 1s² shell). All other noble gases have 8 valence electrons. Chemical inertness comes from full outer shells, NOT from their gaseous state or rarity.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00160`,subject:`Chemistry`,chapter:`Ch2: Ideal Gas Laws`,topic:`Boyle's Law`,subtopic:`Boyle's Law`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Boyle's Law states that, at constant temperature, the pressure of a gas is:`,options:[`A) Directly proportional to volume`,`B) Inversely proportional to volume (P ∝ 1/V)`,`C) Directly proportional to temperature`,`D) Independent of volume`,`E) Proportional to the square of volume`],correct_index:1,explanation:`Boyle's Law (1662): at constant temperature (isothermal), P × V = constant, so P ∝ 1/V. Double the pressure → halve the volume. This reflects the fact that in a smaller volume, gas molecules collide more frequently with the container walls → higher pressure. Units: P in Pa or atm; V in m³ or L. Combined with Charles's Law and Gay-Lussac's Law: PV/T = constant.`,concepts_tested:[`Boyle's Law`,`pressure`,`volume`,`inverse proportion`,`gas laws`],formulas_used:[],common_trap:`Boyle's Law: P × V = k (constant T). Charles's Law: V/T = k (constant P). Gay-Lussac's: P/T = k (constant V). Combined: PV/T = constant → P₁V₁/T₁ = P₂V₂/T₂.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00161`,subject:`Chemistry`,chapter:`Ch2: Ideal Gas Laws`,topic:`Ideal Gas Equation`,subtopic:`Ideal Gas Equation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is the ideal gas equation?`,options:[`A) PV = nRT`,`B) PV = RT`,`C) P = nRT/V²`,`D) PV = nR/T`,`E) P²V = nRT`],correct_index:0,explanation:`The ideal gas equation: PV = nRT where P = pressure (Pa), V = volume (m³), n = moles of gas, R = universal gas constant (8.314 J mol⁻¹ K⁻¹), T = temperature in KELVIN (not Celsius — always convert: K = °C + 273). At STP (0°C, 1 atm), 1 mole of ideal gas occupies 22.4 L. At RTP (25°C, 100 kPa), 1 mole occupies 24.0 L.`,concepts_tested:[`ideal gas equation`,`PV=nRT`,`gas laws`,`moles`,`Kelvin`],formulas_used:[],common_trap:`T must always be in KELVIN in gas law calculations. K = °C + 273. At 0°C: 273 K. Room temperature 25°C = 298 K. Forgetting to convert is the most common error.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00162`,subject:`Chemistry`,chapter:`Ch2: Ideal Gas Laws`,topic:`Dalton's Law`,subtopic:`Dalton's Law`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Dalton's Law of partial pressures states that:`,options:[`A) The total pressure of a gas mixture equals the pressure of the most abundant gas`,`B) The total pressure equals the sum of the partial pressures of each gas in the mixture`,`C) Each gas in a mixture occupies the same partial pressure`,`D) Partial pressure is proportional to the square of mole fraction`,`E) Total pressure is inversely proportional to the number of gases present`],correct_index:1,explanation:`Dalton's Law: P_total = P₁ + P₂ + P₃ + ... where each partial pressure = mole fraction × total pressure. Example: dry air at 1 atm: P(N₂) ≈ 0.78 atm + P(O₂) ≈ 0.21 atm + P(Ar) ≈ 0.01 atm = 1 atm. This is important in respiratory physiology — O₂ partial pressure (pO₂) drives gas exchange in alveoli, not total atmospheric pressure.`,concepts_tested:[`Dalton's Law`,`partial pressure`,`gas mixtures`,`mole fraction`],formulas_used:[],common_trap:`Partial pressure of a gas = mole fraction × total pressure. P₁ = (n₁/n_total) × P_total. Dalton's Law assumes ideal gas behaviour — no interactions between gas molecules.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00163`,subject:`Chemistry`,chapter:`Ch2: Ideal Gas Laws`,topic:`Charles's Law`,subtopic:`Charles's Law`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Charles's Law states that, at constant pressure, the volume of a gas is:`,options:[`A) Inversely proportional to temperature`,`B) Directly proportional to temperature in Kelvin (V ∝ T)`,`C) Independent of temperature`,`D) Proportional to the square root of temperature`,`E) Inversely proportional to the square of temperature`],correct_index:1,explanation:`Charles's Law (1787): at constant pressure (isobaric), V/T = constant, so V ∝ T (where T is in Kelvin). Double the absolute temperature → double the volume. At absolute zero (0 K = -273°C), the volume theoretically = 0 (gas molecules have no kinetic energy). This is why temperature MUST be in Kelvin for gas law calculations.`,concepts_tested:[`Charles's Law`,`volume`,`temperature`,`Kelvin`,`gas laws`],formulas_used:[],common_trap:`Must use KELVIN: V/T = constant only in Kelvin scale. Using Celsius gives wrong answers because Celsius has an arbitrary zero point. 0 K = -273.15°C = absolute zero.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00164`,subject:`Chemistry`,chapter:`Ch2: Ideal Gas Laws`,topic:`Graham's Law`,subtopic:`Graham's Law`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`Graham's Law of effusion states that the rate of effusion of a gas is inversely proportional to the square root of its molar mass. If gas A (M=4 g/mol) and gas B (M=64 g/mol) are in the same container, what is the ratio of their effusion rates (rate_A/rate_B)?`,options:[`A) 1/4`,`B) 4`,`C) 16`,`D) 1/16`,`E) 2`],correct_index:1,explanation:`Graham's Law: rate ∝ 1/√M. rate_A/rate_B = √(M_B/M_A) = √(64/4) = √16 = 4. Gas A (M=4, like He) effuses 4 times faster than gas B (M=64, like SO₂ or S). Lighter gases effuse and diffuse faster. This principle is used in gas separation (e.g. uranium enrichment using UF₆ isotopes).`,concepts_tested:[`Graham's Law`,`effusion`,`molar mass`,`gas speed`,`rate`],formulas_used:[],common_trap:`rate_A/rate_B = √(M_B/M_A) — note: it's the SQUARE ROOT of the RATIO OF MOLAR MASSES, with the HEAVIER gas in the numerator. Light gas = faster effusion.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00165`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Ionic Bonding`,subtopic:`Ionic Bonding`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Ionic bonds form between atoms when:`,options:[`A) Two non-metals share electrons equally`,`B) A metal transfers electrons to a non-metal, forming oppositely charged ions`,`C) Atoms share electrons unequally in a polar covalent bond`,`D) Noble gas atoms are attracted by dispersion forces`,`E) Protons are shared between adjacent nuclei`],correct_index:1,explanation:`Ionic bonds: a METAL (low ionisation energy) transfers one or more electrons to a NON-METAL (high electron affinity). The metal becomes a positive cation; the non-metal becomes a negative anion. Electrostatic attraction between opposite charges = ionic bond. Example: Na (2,8,1) → Na⁺ (2,8) + e⁻; Cl (2,8,7) + e⁻ → Cl⁻ (2,8,8). NaCl ionic lattice results. Ionic compounds: high melting points, conduct electricity when molten/dissolved.`,concepts_tested:[`ionic bonding`,`electron transfer`,`metal`,`non-metal`,`lattice`],formulas_used:[],common_trap:`Ionic: metal → non-metal, electron TRANSFER. Covalent: non-metal → non-metal, electron SHARING. Polar covalent: unequal sharing (electronegativity difference 0.4-1.7). Ionic: electronegativity difference >1.7.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00166`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Covalent Bonding`,subtopic:`Covalent Bonding`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A double bond between two carbon atoms consists of:`,options:[`A) Two sigma bonds`,`B) One sigma bond and one pi bond`,`C) Two pi bonds`,`D) One sigma bond and two pi bonds`,`E) Three sigma bonds`],correct_index:1,explanation:`A double bond = 1 σ (sigma) bond + 1 π (pi) bond. A sigma bond is formed by HEAD-ON overlap of orbitals (stronger, forms first, allows rotation). A pi bond is formed by SIDE-ON overlap of p orbitals (weaker, formed second, PREVENTS rotation → geometric isomers possible). A triple bond = 1 σ + 2 π. Single bond = 1 σ only. Bond order: single (1), double (2), triple (3). Higher bond order = shorter, stronger bond.`,concepts_tested:[`covalent bonding`,`sigma bond`,`pi bond`,`double bond`,`molecular orbital`],formulas_used:[],common_trap:`Single bond = 1 sigma. Double = 1 sigma + 1 pi. Triple = 1 sigma + 2 pi. ALWAYS one sigma bond per bond. Pi bonds are ADDITIONAL. Pi bonds prevent rotation → cis/trans isomerism in alkenes.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00167`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`VSEPR`,subtopic:`VSEPR`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`According to VSEPR theory, what is the molecular geometry of water (H₂O)?`,options:[`A) Linear`,`B) Trigonal planar`,`C) Tetrahedral`,`D) Bent (V-shaped)`,`E) Trigonal pyramidal`],correct_index:3,explanation:`VSEPR: electron pairs (both bonding and lone pairs) repel each other and arrange to be as far apart as possible. H₂O: central O has 2 bonding pairs (to H) + 2 lone pairs = 4 electron pairs → tetrahedral ELECTRON geometry. But MOLECULAR geometry considers only the ATOM positions: bent/V-shaped with bond angle ~104.5° (less than tetrahedral 109.5° because lone pairs exert greater repulsion than bonding pairs).`,concepts_tested:[`VSEPR`,`molecular geometry`,`water`,`lone pairs`,`bond angle`],formulas_used:[],common_trap:`Electron geometry vs molecular geometry: BF₃ = trigonal planar (no lone pairs). NH₃ = trigonal pyramidal (1 lone pair, 3 bonding). H₂O = bent (2 lone pairs, 2 bonding). CO₂ = linear (no lone pairs, double bonds).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00168`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Electronegativity`,subtopic:`Electronegativity`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following molecules is polar?`,options:[`A) CO₂`,`B) BF₃`,`C) CH₄`,`D) HCl`,`E) CCl₄`],correct_index:3,explanation:`A polar molecule has a net dipole moment — polar bonds that do NOT cancel each other out. HCl: H-Cl bond is polar (Cl is more electronegative); the molecule is linear with no cancellation → net dipole → polar. CO₂: two polar C=O bonds point in OPPOSITE directions (linear) → cancel out → non-polar. BF₃: trigonal planar → bond dipoles cancel. CH₄ and CCl₄: tetrahedral symmetry → bond dipoles cancel → non-polar.`,concepts_tested:[`polarity`,`dipole moment`,`HCl`,`molecular geometry`,`electronegativity`],formulas_used:[],common_trap:`Polar molecule ≠ polar bonds. A molecule can have polar bonds but be non-polar overall if the geometry is SYMMETRIC (dipoles cancel). CO₂, BF₃, CH₄, CCl₄ are all non-polar despite having polar bonds.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00169`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Intermolecular Forces`,subtopic:`Intermolecular Forces`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly ranks intermolecular forces from WEAKEST to STRONGEST?`,options:[`A) Dipole-dipole < London dispersion < Hydrogen bonding`,`B) London dispersion < Dipole-dipole < Hydrogen bonding`,`C) Hydrogen bonding < Dipole-dipole < London dispersion`,`D) Dipole-dipole < Hydrogen bonding < London dispersion`,`E) London dispersion < Hydrogen bonding < Dipole-dipole`],correct_index:1,explanation:`Intermolecular forces, weakest to strongest: London dispersion forces (instantaneous dipole-induced dipole, present in ALL molecules, weakest per molecule but dominant in large non-polar molecules) < Dipole-dipole interactions (permanent dipoles in polar molecules) < Hydrogen bonds (special case of dipole-dipole: H bonded to F, O, or N → strong, directional). Note: for large molecules, London forces can be stronger than H-bonds (e.g. I₂ has higher melting point than HF in some comparisons).`,concepts_tested:[`intermolecular forces`,`London dispersion`,`dipole-dipole`,`hydrogen bonding`,`van der Waals`],formulas_used:[],common_trap:`London forces: weakest, but ALL molecules have them (increases with molecular size). Hydrogen bonds: strongest — require H bonded to F, O, or N. The 'F, O, N' rule for H-bonding is essential.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00170`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Metallic Bonding`,subtopic:`Metallic Bonding`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Metallic bonding is best described as:`,options:[`A) Covalent sharing of electrons between adjacent metal atoms`,`B) Transfer of electrons from metal to non-metal ions`,`C) A 'sea of delocalised electrons' surrounding positive metal ions`,`D) Ionic attraction between metal cations and anions`,`E) Hydrogen bonding between metallic elements`],correct_index:2,explanation:`Metallic bonding: metal atoms release their valence electrons into a 'sea' (or 'cloud') of DELOCALISED electrons that are free to move throughout the metallic lattice. The positive metal ions (cations) are held together by electrostatic attraction to this electron sea. This explains: high electrical conductivity (mobile electrons), high thermal conductivity (same reason), malleability/ductility (layers can slide without breaking bonds), and metallic lustre (electrons reflect light).`,concepts_tested:[`metallic bonding`,`delocalised electrons`,`electrical conductivity`,`malleability`,`lattice`],formulas_used:[],common_trap:`'Sea of delocalised electrons' is the key phrase. These mobile electrons explain ALL physical properties of metals: conductivity, malleability, high melting points, lustre.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00171`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Hydrogen Bonding`,subtopic:`Hydrogen Bonding`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Hydrogen bonding can form between molecules when hydrogen is bonded to which elements?`,options:[`A) Carbon, nitrogen, or oxygen`,`B) Fluorine, oxygen, or nitrogen (N, O, F)`,`C) Any electronegative element`,`D) Chlorine, bromine, or fluorine`,`E) Only oxygen in water molecules`],correct_index:1,explanation:`Hydrogen bonds form when H is covalently bonded to a highly electronegative, small atom with lone pairs: F, O, or N. The H becomes partially positive (δ+) and attracted to the lone pair of an adjacent F, O, or N atom. Mnemonic: 'FON' or 'Funny Old Nitrogen'. H-bonds explain: high boiling point of water (100°C vs expected -80°C), DNA double helix stability, protein secondary structure (alpha helices, beta sheets).`,concepts_tested:[`hydrogen bonding`,`F O N`,`electronegative`,`intermolecular forces`,`water`],formulas_used:[],common_trap:`H-bond donors: H-F, H-O, H-N only. NOT H-Cl (Cl too large, less electronegative). NOT H-C (C not electronegative enough). The FON rule is absolute for IMAT.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00172`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Bond Strength`,subtopic:`Bond Strength`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following bonds has the GREATEST bond energy (strongest bond)?`,options:[`A) C-C single bond`,`B) C=C double bond`,`C) C≡C triple bond`,`D) C-H bond`,`E) C-O single bond`],correct_index:2,explanation:`Bond energy increases with bond order: C-C (346 kJ/mol) < C=C (614 kJ/mol) < C≡C (839 kJ/mol). Higher bond order = more electrons shared = stronger, shorter bond. Triple bonds are the strongest and shortest; single bonds are weakest and longest. Breaking bonds requires energy (endothermic); forming bonds releases energy (exothermic). Overall ΔH_reaction = bonds broken − bonds formed.`,concepts_tested:[`bond energy`,`bond order`,`triple bond`,`C=C`,`bond strength`],formulas_used:[],common_trap:`Triple > double > single bond strength AND triple < double < single bond LENGTH. Stronger bonds are also shorter. Bond dissociation energy = energy to break 1 mol of bonds in gaseous molecules.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00173`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Lewis Structures`,subtopic:`Lewis Structures`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`How many lone pairs does the nitrogen atom have in ammonia (NH₃)?`,options:[`A) 0`,`B) 1`,`C) 2`,`D) 3`,`E) 4`],correct_index:1,explanation:`Nitrogen has 5 valence electrons. In NH₃, it forms 3 covalent bonds with H (using 3 electrons). The remaining 2 electrons form 1 lone pair on N. Lewis structure: N has 3 bonding pairs + 1 lone pair = 4 pairs total → trigonal pyramidal geometry (not flat, because the lone pair occupies space). This lone pair makes NH₃ a Lewis base (electron pair donor) and is responsible for its basic properties.`,concepts_tested:[`Lewis structures`,`lone pairs`,`ammonia`,`nitrogen`,`valence electrons`],formulas_used:[],common_trap:`Count valence electrons: N has 5. Uses 3 for bonds with H. 5-3=2 electrons left = 1 lone pair. H has 1 valence electron each, uses all 1 in bonding → no lone pairs on H.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00174`,subject:`Chemistry`,chapter:`Ch3: Chemical Bonds`,topic:`Giant Structures`,subtopic:`Giant Structures`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Why does diamond have an extremely high melting point?`,options:[`A) It contains ionic bonds that are very strong`,`B) It has a giant covalent lattice with strong C-C covalent bonds throughout`,`C) It contains metallic bonds with a sea of delocalised electrons`,`D) It has very strong van der Waals forces between carbon layers`,`E) Carbon atoms in diamond form quadruple bonds`],correct_index:1,explanation:`Diamond has a giant covalent lattice structure: each carbon atom forms 4 strong covalent bonds (sp³ hybridised) to 4 other carbons in a tetrahedral arrangement, extending throughout the entire crystal. To melt diamond, COVALENT BONDS must be broken — requiring enormous energy (melting point ~3550°C). It is also extremely hard (hardest natural substance) for the same reason. Graphite (another carbon allotrope) has layered structure with delocalised electrons → conducts electricity; diamond does NOT.`,concepts_tested:[`diamond`,`giant covalent lattice`,`melting point`,`covalent bonds`,`carbon allotropes`],formulas_used:[],common_trap:`Diamond: giant covalent lattice → very high mp, very hard, non-conductor. Graphite: layered structure → conducts electricity, soft (layers slide), lubricant. Both are pure carbon but different structures → completely different properties.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00175`,subject:`Chemistry`,chapter:`Ch4: Inorganic Chemistry & Nomenclature`,topic:`Acid-Base`,subtopic:`Acid-Base`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`According to the Brønsted-Lowry definition, an acid is:`,options:[`A) A substance that produces OH⁻ ions in water`,`B) A proton (H⁺) donor`,`C) An electron pair acceptor`,`D) A substance that tastes sour`,`E) A molecule with a positive charge`],correct_index:1,explanation:`Brønsted-Lowry definition: an ACID is a proton (H⁺) donor; a BASE is a proton acceptor. This is broader than the Arrhenius definition (acid produces H⁺ in water; base produces OH⁻). Lewis definition (broader still): acid = electron pair acceptor; base = electron pair donor. For IMAT, Brønsted-Lowry is the standard: HCl donates H⁺ (acid); NH₃ accepts H⁺ (base, forms NH₄⁺).`,concepts_tested:[`Brønsted-Lowry`,`acid`,`proton donor`,`base`,`acid-base theory`],formulas_used:[],common_trap:`Arrhenius: acids make H⁺ in water. Brønsted-Lowry: acids DONATE protons (H⁺). Lewis: acids ACCEPT electron pairs. Each definition is broader than the previous. IMAT uses Brønsted-Lowry most often.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00176`,subject:`Chemistry`,chapter:`Ch4: Inorganic Chemistry & Nomenclature`,topic:`pH Calculation`,subtopic:`pH Calculation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the pH of a 0.001 mol/L (10⁻³ M) HCl solution?`,options:[`A) 1`,`B) 2`,`C) 3`,`D) 11`,`E) -3`],correct_index:2,explanation:`HCl is a strong acid — it fully dissociates: HCl → H⁺ + Cl⁻. [H⁺] = [HCl] = 10⁻³ mol/L. pH = -log₁₀[H⁺] = -log₁₀(10⁻³) = -(-3) = 3. Rule: pH = -log[H⁺]. At 25°C: pH + pOH = 14. pH < 7 = acidic; pH = 7 = neutral; pH > 7 = basic. [H⁺][OH⁻] = 10⁻¹⁴ (Kw at 25°C).`,concepts_tested:[`pH`,`hydrochloric acid`,`strong acid`,`logarithm`,`dissociation`],formulas_used:[],common_trap:`pH = -log[H⁺]. For 10⁻³: pH = 3. For 0.1 M: pH = 1. For 0.01 M: pH = 2. Strong acids fully dissociate — [H⁺] = concentration of acid. Weak acids partially dissociate — need Ka to calculate pH.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00177`,subject:`Chemistry`,chapter:`Ch4: Inorganic Chemistry & Nomenclature`,topic:`Naming Acids`,subtopic:`Naming Acids`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`What is the IUPAC name for H₂SO₄?`,options:[`A) Hydrosulfuric acid`,`B) Sulfurous acid`,`C) Sulfuric acid`,`D) Persulfuric acid`,`E) Disulfuric acid`],correct_index:2,explanation:`H₂SO₄ is sulfuric acid — one of the six strong acids memorised for IMAT. Strong acids (fully dissociate): HCl (hydrochloric), HBr (hydrobromic), HI (hydroiodic), HNO₃ (nitric), H₂SO₄ (sulfuric), HClO₄ (perchloric). Sulfurous acid = H₂SO₃ (with S in +4 state). Hydrosulfuric acid = H₂S (hydrogen sulfide dissolved in water). The '-ic' suffix = higher oxidation state; '-ous' = lower oxidation state.`,concepts_tested:[`acid nomenclature`,`sulfuric acid`,`H2SO4`,`strong acids`,`IUPAC naming`],formulas_used:[],common_trap:`H₂SO₄ (S = +6) = sulfuric acid. H₂SO₃ (S = +4) = sulfurous acid. HNO₃ (N = +5) = nitric acid. HNO₂ (N = +3) = nitrous acid. '-ic' acid has MORE oxygen than '-ous' acid.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00178`,subject:`Chemistry`,chapter:`Ch4: Inorganic Chemistry & Nomenclature`,topic:`Bases`,subtopic:`Bases`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is a strong base (fully dissociates in water)?`,options:[`A) NH₃`,`B) Ca(OH)₂`,`C) NaOH`,`D) Mg(OH)₂`,`E) Al(OH)₃`],correct_index:2,explanation:`Strong bases fully dissociate in aqueous solution: NaOH → Na⁺ + OH⁻ (100%). The strong bases are: NaOH, KOH, LiOH, RbOH, CsOH (Group 1 hydroxides), and Ca(OH)₂, Sr(OH)₂, Ba(OH)₂ (Group 2 hydroxides — slightly less soluble but still strong). NH₃ is a WEAK base (partially accepts protons). Mg(OH)₂ and Al(OH)₃ are weak bases (poorly soluble, don't fully dissociate).`,concepts_tested:[`strong base`,`NaOH`,`hydroxide`,`weak base`,`NH3`],formulas_used:[],common_trap:`Group 1 hydroxides (NaOH, KOH) = STRONG bases. Group 2 hydroxides: Ca(OH)₂, Sr(OH)₂, Ba(OH)₂ = strong but less soluble. NH₃ = WEAK base. Mg(OH)₂ = weak base (antacid).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00179`,subject:`Chemistry`,chapter:`Ch4: Inorganic Chemistry & Nomenclature`,topic:`Neutralisation`,subtopic:`Neutralisation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`When 25.0 mL of 0.100 mol/L NaOH is exactly neutralised by HCl, how many moles of NaOH were used?`,options:[`A) 0.250 mol`,`B) 0.0100 mol`,`C) 0.00250 mol`,`D) 2.50 mol`,`E) 25.0 mol`],correct_index:2,explanation:`Moles = concentration × volume (in litres). Volume = 25.0 mL = 0.0250 L. Moles of NaOH = 0.100 mol/L × 0.0250 L = 0.00250 mol. The neutralisation reaction: NaOH + HCl → NaCl + H₂O (1:1 ratio). So moles of HCl = 0.00250 mol also. If HCl concentration were required: c = n/V = 0.00250/V(HCl).`,concepts_tested:[`moles`,`concentration`,`titration`,`neutralisation`,`calculation`],formulas_used:[],common_trap:`n = c × V. Remember to convert mL to L (divide by 1000). This is the fundamental titration calculation — practise until it's automatic.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00180`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Mole Concept`,subtopic:`Mole Concept`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The molar mass of water (H₂O) is:`,options:[`A) 16 g/mol`,`B) 18 g/mol`,`C) 20 g/mol`,`D) 34 g/mol`,`E) 10 g/mol`],correct_index:1,explanation:`Molar mass of H₂O: H = 1 g/mol (×2) + O = 16 g/mol = 18 g/mol. One mole of water weighs 18 g and contains 6.022 × 10²³ (Avogadro's number) water molecules. The molar mass is numerically equal to the relative formula mass (Mr). Key molar masses to memorise: H₂O=18, CO₂=44, NaCl=58.5, HCl=36.5, H₂SO₄=98, NaOH=40, CaCO₃=100.`,concepts_tested:[`molar mass`,`water`,`stoichiometry`,`Avogadro's number`,`relative formula mass`],formulas_used:[],common_trap:`Calculate molar mass: add up atomic masses × number of atoms. H₂O: (1×2) + (16×1) = 18 g/mol. CO₂: 12 + (16×2) = 44 g/mol. H₂SO₄: (1×2) + 32 + (16×4) = 98 g/mol.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00181`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Limiting Reagent`,subtopic:`Limiting Reagent`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the reaction N₂ + 3H₂ → 2NH₃, if 2 mol N₂ and 4 mol H₂ are mixed, which is the limiting reagent?`,options:[`A) N₂`,`B) H₂`,`C) NH₃`,`D) Neither — they are in stoichiometric ratio`,`E) Both are limiting`],correct_index:1,explanation:`From the equation, N₂ : H₂ = 1 : 3. To react 2 mol N₂, we need 2 × 3 = 6 mol H₂. But only 4 mol H₂ is available. H₂ is the LIMITING reagent (runs out first). Amount of NH₃ produced: 4 mol H₂ × (2 mol NH₃ / 3 mol H₂) = 8/3 = 2.67 mol NH₃. Excess N₂ = 2 - (4/3) = 2 - 1.33 = 0.67 mol N₂ unreacted.`,concepts_tested:[`limiting reagent`,`stoichiometry`,`mole ratio`,`Haber process`,`ammonia`],formulas_used:[],common_trap:`To find limiting reagent: calculate how much of the other reactant is NEEDED to react all of each reactant. The one that needs MORE than is available = not limiting; the one that runs out = LIMITING.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00182`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Percentage Yield`,subtopic:`Percentage Yield`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`If the theoretical yield of a reaction is 25.0 g and the actual yield obtained is 18.5 g, what is the percentage yield?`,options:[`A) 25.0%`,`B) 74.0%`,`C) 135%`,`D) 18.5%`,`E) 43.5%`],correct_index:1,explanation:`Percentage yield = (actual yield / theoretical yield) × 100 = (18.5 / 25.0) × 100 = 74.0%. Percentage yield is always ≤ 100% (actual ≤ theoretical). Theoretical yield assumes 100% conversion of limiting reagent. Actual yield is always less due to: incomplete reaction, side reactions, product lost during purification, equilibrium limitations.`,concepts_tested:[`percentage yield`,`actual yield`,`theoretical yield`,`stoichiometry`],formulas_used:[],common_trap:`% yield = (actual/theoretical) × 100. Always ≤ 100%. If you get >100%, you made an error in the theoretical yield calculation or the actual yield is contaminated.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00183`,subject:`Chemistry`,chapter:`Ch5: Reactions & Stoichiometry`,topic:`Empirical Formula`,subtopic:`Empirical Formula`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Compound X contains 40% carbon, 6.67% hydrogen, and 53.33% oxygen by mass. What is its empirical formula?`,options:[`A) C₂H₄O₂`,`B) CH₂O`,`C) CHO`,`D) C₂H₂O`,`E) C₃H₆O₃`],correct_index:1,explanation:`Assume 100 g sample: C = 40 g / 12 = 3.33 mol; H = 6.67 g / 1 = 6.
