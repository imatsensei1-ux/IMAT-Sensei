easoning`,topic:`Arguments`,subtopic:`Arguments`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A study found that people who drink coffee have lower rates of type 2 diabetes. The researcher concludes 'coffee prevents diabetes.' Which flaw is in this reasoning?`,options:[`A) The sample size was too small`,`B) Correlation does not imply causation`,`C) Diabetes cannot be measured accurately`,`D) The study should have used tea instead`,`E) The conclusion is logically valid`],correct_index:1,explanation:`Correlation ≠ causation. People who drink coffee may differ from non-coffee drinkers in many other ways (diet, lifestyle, socioeconomic status) that actually reduce diabetes risk. To establish causation, you need a randomised controlled trial. This is one of the most important critical thinking concepts in science and medicine.`,concepts_tested:[`correlation vs causation`,`critical thinking`,`research methods`,`logical fallacy`],formulas_used:[],common_trap:`Observational studies show correlations. Only randomised controlled trials (RCTs) can establish causation. This distinction is fundamental to medical research.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00322`,subject:`Logical Reasoning`,chapter:`Ch1: Verbal Reasoning`,topic:`Conclusions`,subtopic:`Conclusions`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`No reptiles are mammals. Some animals with scales are reptiles. Which statement is definitely true?`,options:[`A) Some animals with scales are not mammals`,`B) No animals have both scales and are mammals`,`C) All reptiles have scales`,`D) Some mammals have scales`,`E) No mammals have scales`],correct_index:0,explanation:`From 'some animals with scales are reptiles' AND 'no reptiles are mammals': those specific scale-animals that ARE reptiles cannot be mammals (since no reptiles are mammals). Therefore some scale-animals are definitely not mammals. We cannot conclude ALL scale-animals lack mammal status (some scale-animals might not be reptiles and could be mammals, though rare). Answer A is the conservative valid conclusion.`,concepts_tested:[`logical reasoning`,`valid conclusion`,`syllogism`,`deduction`],formulas_used:[],common_trap:`Be careful with 'some' — it means 'at least one, possibly all'. Valid deduction: some scale animals are reptiles → those particular ones are not mammals → some scale animals are not mammals.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00323`,subject:`Logical Reasoning`,chapter:`Ch1: Verbal Reasoning`,topic:`Word Analogy`,subtopic:`Word Analogy`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Hot is to Cold as Light is to:`,options:[`A) Lamp`,`B) Sun`,`C) Dark`,`D) Bright`,`E) Energy`],correct_index:2,explanation:`Hot:Cold is an antonym (opposite) relationship. Light:Dark follows the same antonym pattern. Lamp and Sun are sources of light (not opposites). Bright is a synonym/related term (not an opposite). Dark is the opposite of light.`,concepts_tested:[`word analogies`,`antonyms`,`relationships`,`verbal reasoning`],formulas_used:[],common_trap:`Identify the relationship type first: synonyms, antonyms, part-whole, cause-effect, function, etc. Then apply the same relationship to the second pair.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00324`,subject:`Logical Reasoning`,chapter:`Ch1: Verbal Reasoning`,topic:`Logical Sequence`,subtopic:`Logical Sequence`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a row, Amy is 3rd from the left and 5th from the right. How many people are in the row?`,options:[`A) 6`,`B) 7`,`C) 8`,`D) 9`,`E) 5`],correct_index:1,explanation:`If Amy is 3rd from left and 5th from right: people to her left = 2, people to her right = 4, plus Amy herself = 2+1+4 = 7 people total. Formula: position from left + position from right - 1 = total. 3 + 5 - 1 = 7.`,concepts_tested:[`sequence`,`position`,`logical reasoning`,`counting`],formulas_used:[],common_trap:`Formula: total = (position from left) + (position from right) - 1. The -1 avoids counting the person twice.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00325`,subject:`Logical Reasoning`,chapter:`Ch2: Numerical Patterns`,topic:`Mixed Sequence`,subtopic:`Mixed Sequence`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What comes next? 2, 3, 5, 8, 13, 21, ?`,options:[`A) 29`,`B) 32`,`C) 34`,`D) 35`,`E) 31`],correct_index:2,explanation:`This is the Fibonacci sequence: each term = sum of two previous terms. 2+3=5, 3+5=8, 5+8=13, 8+13=21, 13+21=34.`,concepts_tested:[`Fibonacci`,`sequences`,`number patterns`,`logical reasoning`],formulas_used:[],common_trap:`Fibonacci: F(n) = F(n-1) + F(n-2). Check if consecutive differences themselves form a pattern: 1,2,3,5,8,13 — yes, the differences are also Fibonacci!`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00326`,subject:`Logical Reasoning`,chapter:`Ch2: Numerical Patterns`,topic:`Ratio Pattern`,subtopic:`Ratio Pattern`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the missing number? 4, 12, 36, ?, 324`,options:[`A) 72`,`B) 100`,`C) 108`,`D) 96`,`E) 144`],correct_index:2,explanation:`Each term is multiplied by 3: 4×3=12, 12×3=36, 36×3=108, 108×3=324. Missing number = 108. This is a geometric sequence with ratio 3.`,concepts_tested:[`geometric sequence`,`ratio`,`number pattern`,`multiplication`],formulas_used:[],common_trap:`Test ratio: 12/4=3, 36/12=3, confirm pattern, apply to get 36×3=108.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00327`,subject:`Logical Reasoning`,chapter:`Ch2: Numerical Patterns`,topic:`Arithmetic Differences`,subtopic:`Arithmetic Differences`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Find the next: 1, 3, 7, 13, 21, 31, ?`,options:[`A) 41`,`B) 43`,`C) 44`,`D) 42`,`E) 45`],correct_index:1,explanation:`Differences: 3-1=2, 7-3=4, 13-7=6, 21-13=8, 31-21=10. Differences increase by 2 each time. Next difference = 12. Next term = 31+12 = 43.`,concepts_tested:[`arithmetic differences`,`second differences`,`number pattern`,`sequences`],formulas_used:[],common_trap:`First differences: 2,4,6,8,10,12 (arithmetic, +2 each time). Second differences are constant (=2), confirming quadratic pattern.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00328`,subject:`Logical Reasoning`,chapter:`Ch2: Numerical Patterns`,topic:`Number Grid`,subtopic:`Number Grid`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`In the series: 1, 1, 2, 6, 24, 120, ? — what is the rule and next term?`,options:[`A) 480`,`B) 600`,`C) 720`,`D) 240`,`E) 360`],correct_index:2,explanation:`These are factorials: 0!=1, 1!=1, 2!=2, 3!=6, 4!=24, 5!=120, 6!=720. Each term = previous term × position. 1×1=1, 1×2=2, 2×3=6, 6×4=24, 24×5=120, 120×6=720.`,concepts_tested:[`factorials`,`sequences`,`n factorial`,`pattern recognition`],formulas_used:[],common_trap:`Factorials: n! = n × (n-1)! The sequence 1,1,2,6,24,120,720,... appears in probability (permutations), combinatorics, and mathematics.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00329`,subject:`Logical Reasoning`,chapter:`Ch3: Spatial Reasoning`,topic:`3D Shapes`,subtopic:`3D Shapes`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`How many edges does a cube have?`,options:[`A) 6`,`B) 8`,`C) 10`,`D) 12`,`E) 16`],correct_index:3,explanation:`A cube has 12 edges: 4 on the top face, 4 on the bottom face, and 4 vertical edges connecting them. It also has 8 vertices (corners) and 6 faces. Euler's formula for polyhedra: V - E + F = 2. For cube: 8 - 12 + 6 = 2 ✓.`,concepts_tested:[`cube`,`3D geometry`,`edges`,`Euler's formula`],formulas_used:[],common_trap:`Cube: 6 faces, 8 vertices, 12 edges. Euler's formula V-E+F=2 always works for convex polyhedra.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00330`,subject:`Logical Reasoning`,chapter:`Ch3: Spatial Reasoning`,topic:`Paper Folding`,subtopic:`Paper Folding`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A square piece of paper is folded in half (left to right), then in half again (top to bottom), then a hole is punched through all layers. When unfolded, how many holes are there?`,options:[`A) 1`,`B) 2`,`C) 3`,`D) 4`,`E) 8`],correct_index:3,explanation:`Each fold doubles the layers and creates a symmetric hole pattern. After fold 1 (left-right): 2 layers → 1 punch creates 2 holes (symmetric left-right). After fold 2 (top-bottom): 4 layers → the 2 holes become 4 holes (each mirrored top-bottom). Total = 4 holes arranged in a 2×2 grid.`,concepts_tested:[`paper folding`,`spatial reasoning`,`symmetry`,`reflection`],formulas_used:[],common_trap:`Count layers = 2^(number of folds). Each punch makes that many holes. But also consider symmetry — holes appear in mirror positions.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00331`,subject:`Logical Reasoning`,chapter:`Ch3: Spatial Reasoning`,topic:`Rotation`,subtopic:`Rotation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A clock shows 3:00. If the minute hand moves 270° clockwise, what time does the clock show?`,options:[`A) 6:00`,`B) 12:00`,`C) 9:00`,`D) 3:45`,`E) 6:30`],correct_index:2,explanation:`At 3:00, the minute hand points to 12 (top). Moving 270° clockwise: 360° = full circle = 60 minutes = back to 12. 270° = 3/4 of 360° = 45 minutes clockwise. From 12, 45 minutes clockwise goes to: 12→15min=3, 3→30min=6, 6→45min=9. So the minute hand points to 9, which means 45 minutes → time is 3:45. Wait: 270° from 12 o'clock position = 9 on the clock face. Minute hand at 9 = 45 minutes. Time = 3:45. Answer D.`,concepts_tested:[`clock`,`rotation`,`spatial reasoning`,`angles`],formulas_used:[],common_trap:`Actually: 270° clockwise from 12 (top) → points to 9 (left side of clock). Minute hand at 9 = 45 minutes past. Time = 3:45. So answer is D.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00332`,subject:`Logical Reasoning`,chapter:`Ch3: Spatial Reasoning`,topic:`Cubes`,subtopic:`Cubes`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A 3×3×3 cube is painted red on all faces, then cut into 27 small cubes. How many small cubes have exactly 2 red faces?`,options:[`A) 6`,`B) 8`,`C) 12`,`D) 4`,`E) 16`],correct_index:2,explanation:`In a 3×3×3 cube cut into 27 pieces: corner cubes (3 red faces) = 8 (one at each corner). Edge cubes (2 red faces) = 12 (one along each of the 12 edges, middle position). Face cubes (1 red face) = 6 (centre of each face). Centre cube (0 red faces) = 1. Check: 8+12+6+1=27 ✓.`,concepts_tested:[`painted cube`,`spatial reasoning`,`counting`,`3D geometry`],formulas_used:[],common_trap:`Painting cubes: corners=3 faces painted; edges=2 faces; faces=1 face; centre=0. For n×n×n cube: corners always 8, edges=12(n-2), faces=6(n-2)², centre=(n-2)³.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00333`,subject:`Logical Reasoning`,chapter:`Ch3: Spatial Reasoning`,topic:`Mental Rotation`,subtopic:`Mental Rotation`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which letter has rotational symmetry of order 2 (looks the same when rotated 180°)?`,options:[`A) A`,`B) F`,`C) S`,`D) K`,`E) B`],correct_index:2,explanation:`Rotational symmetry of order 2 means the shape looks identical after 180° rotation. The letter S, when rotated 180°, still looks like S. Also: Z, N, H, I, O, X have this property. A has vertical mirror symmetry but NOT 180° rotational symmetry (the A upside down ∀ doesn't look like A). F has neither.`,concepts_tested:[`rotational symmetry`,`letters`,`spatial reasoning`,`geometry`],formulas_used:[],common_trap:`Rotational symmetry: S, Z, N, H, I, O, X look the same upside down. Mirror symmetry: A, H, I, M, O, T, V, W, X, Y (vertical axis).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00334`,subject:`Logical Reasoning`,chapter:`Ch4: Data Interpretation`,topic:`Table Reading`,subtopic:`Table Reading`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A frequency table shows test scores: 50-59: 5 students, 60-69: 12 students, 70-79: 18 students, 80-89: 10 students, 90-100: 5 students. What percentage of students scored 70 or above?`,options:[`A) 33%`,`B) 50%`,`C) 55%`,`D) 66%`,`E) 33.3%`],correct_index:2,explanation:`Students scoring 70+: 18+10+5 = 33. Total students: 5+12+18+10+5 = 50. Percentage = (33/50)×100 = 66%.`,concepts_tested:[`frequency table`,`percentage`,`data interpretation`,`statistics`],formulas_used:[],common_trap:`Calculate: first find the total, then identify the relevant group, then percentage = (group/total)×100. Always check your total adds up correctly.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00335`,subject:`Logical Reasoning`,chapter:`Ch4: Data Interpretation`,topic:`Rate of Change`,subtopic:`Rate of Change`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A company's revenue was £80,000 in 2022 and £96,000 in 2023. What was the percentage increase?`,options:[`A) 16%`,`B) 20%`,`C) 24%`,`D) 83%`,`E) 120%`],correct_index:1,explanation:`% increase = (new - old)/old × 100 = (96,000 - 80,000)/80,000 × 100 = 16,000/80,000 × 100 = 0.2 × 100 = 20%.`,concepts_tested:[`percentage change`,`rate of change`,`data interpretation`,`calculation`],formulas_used:[],common_trap:`% change = (new-old)/old × 100. Use OLD value as denominator. Increase: positive %. Decrease: negative %.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00336`,subject:`Logical Reasoning`,chapter:`Ch4: Data Interpretation`,topic:`Ratio`,subtopic:`Ratio`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A solution contains salt and water in the ratio 1:4. If you have 500 mL of solution, how much salt is there?`,options:[`A) 125 mL`,`B) 100 mL`,`C) 80 mL`,`D) 400 mL`,`E) 250 mL`],correct_index:1,explanation:`Ratio 1:4 means for every 1 part salt, 4 parts water → 5 parts total. Salt = (1/5) × 500 mL = 100 mL.`,concepts_tested:[`ratio`,`proportion`,`data interpretation`,`solution`],formulas_used:[],common_trap:`Total parts = sum of ratio parts (1+4=5). Each part = total/5 = 100 mL. Salt = 1 part = 100 mL. Water = 4 parts = 400 mL.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00337`,subject:`Logical Reasoning`,chapter:`Ch4: Data Interpretation`,topic:`Inference`,subtopic:`Inference`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A bar chart shows that Region A had 200 hospital admissions in January and 150 in February. Region B had 120 in January and 180 in February. Which statement is best supported?`,options:[`A) Region A has a higher overall admission rate than B`,`B) Region B's admissions increased while A's decreased from Jan to Feb`,`C) Region A has better healthcare than Region B`,`D) Hospital admissions are always lower in February`,`E) Region B will always have more admissions than Region A`],correct_index:1,explanation:`From the data: Region A: 200→150 (decreased by 50). Region B: 120→180 (increased by 60). Statement B directly describes what the data shows. A cannot be concluded (only 2 months shown). C involves a value judgment not supported by admission numbers. D makes a general claim from just one year's data. E over-generalises.`,concepts_tested:[`data interpretation`,`inference`,`bar chart`,`critical thinking`],formulas_used:[],common_trap:`Data supports specific observations, not generalisations or value judgments. Only state what the data actually shows — no more, no less.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00338`,subject:`General Knowledge`,chapter:`Ch1: History & Culture`,topic:`Scientific Revolution`,subtopic:`Scientific Revolution`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which scientist first proposed that the Earth orbits the Sun (heliocentric model) in modern times?`,options:[`A) Galileo Galilei`,`B) Isaac Newton`,`C) Nicolaus Copernicus`,`D) Johannes Kepler`,`E) Tycho Brahe`],correct_index:2,explanation:`Nicolaus Copernicus (1473-1543) proposed the heliocentric model in 'De revolutionibus orbium coelestium' (1543). Galileo later provided observational evidence using the telescope. Kepler described planetary orbits as ellipses (Kepler's Laws). Newton explained WHY planets orbit (gravity). Previously, the geocentric (Ptolemaic) model dominated for 1400 years.`,concepts_tested:[`Copernicus`,`heliocentric`,`history of science`,`scientific revolution`],formulas_used:[],common_trap:`Copernicus: proposed heliocentric theory (1543). Galileo: observational evidence, moons of Jupiter. Kepler: elliptical orbits. Newton: gravity explains it all. Timeline: Copernicus→Galileo→Kepler→Newton.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00339`,subject:`General Knowledge`,chapter:`Ch1: History & Culture`,topic:`Renaissance`,subtopic:`Renaissance`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The Renaissance (meaning 'rebirth') began in which country?`,options:[`A) France`,`B) Germany`,`C) England`,`D) Italy`,`E) Spain`],correct_index:3,explanation:`The Renaissance began in Italy, particularly in Florence (14th-15th century), driven by wealthy patrons like the Medici family. Italian city-states had preserved Classical knowledge, thriving trade brought wealth, and proximity to ancient Roman ruins inspired artists and thinkers. Key figures: Leonardo da Vinci, Michelangelo, Raphael (art), Dante, Petrarch (literature). It then spread across Europe.`,concepts_tested:[`Renaissance`,`Italy`,`Florence`,`Medici`,`history`],formulas_used:[],common_trap:`The Renaissance started in Italian city-states (Florence, Venice, Rome) in the 14th century. As a medical student in Italy, knowing Italian cultural history is relevant!`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00340`,subject:`General Knowledge`,chapter:`Ch1: History & Culture`,topic:`Enlightenment`,subtopic:`Enlightenment`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which 18th-century intellectual movement emphasised reason, individualism, and scientific inquiry as the basis for social progress?`,options:[`A) The Reformation`,`B) The Enlightenment`,`C) The Renaissance`,`D) Romanticism`,`E) Humanism`],correct_index:1,explanation:`The Enlightenment (18th century, 'Age of Reason'): key thinkers — Voltaire, Rousseau, Locke, Montesquieu, Kant — promoted reason over tradition, individual rights, separation of church and state, scientific method, and democratic governance. It influenced the American Declaration of Independence (1776) and the French Revolution (1789). The Reformation (16th century) was religious. The Renaissance (14th-16th century) preceded it.`,concepts_tested:[`Enlightenment`,`Age of Reason`,`intellectual history`,`philosophy`],formulas_used:[],common_trap:`Enlightenment = 18th century = reason + science + individual rights. Reformation = 16th century = religious reform. Renaissance = 14th-16th century = rebirth of classical learning.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00341`,subject:`General Knowledge`,chapter:`Ch1: History & Culture`,topic:`Medicine History`,subtopic:`Medicine History`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which ancient physician is known as the 'Father of Medicine'?`,options:[`A) Galen`,`B) Avicenna`,`C) Hippocrates`,`D) Aristotle`,`E) Vesalius`],correct_index:2,explanation:`Hippocrates of Cos (~460-370 BC) is called the Father of Medicine. He established medicine as a rational discipline separate from religion/superstition, systematically observed patients, and described many diseases clinically. The Hippocratic Oath (though modified today) still forms the ethical basis of medical practice. Galen: Roman physician who dominated medical thinking for 1400 years. Avicenna: Islamic Golden Age physician. Vesalius: 16th century anatomist.`,concepts_tested:[`Medicine History`],formulas_used:[],common_trap:`['Hippocrates', 'Father of Medicine', 'medical history', 'ancient Greece', 'Hippocratic Oath']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00342`,subject:`General Knowledge`,chapter:`Ch2: Geography`,topic:`Italian Regions`,subtopic:`Italian Regions`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which Italian city is located in the Po Valley (Pianura Padana)?`,options:[`A) Rome`,`B) Naples`,`C) Palermo`,`D) Milan`,`E) Florence`],correct_index:3,explanation:`Milan (Milano) is located in the Po Valley (Pianura Padana) in northern Italy — Italy's largest plain and most economically productive region. The Po Valley contains the cities of Milan, Turin, Bologna, Verona, Padova, and Venice. Rome is in central Italy (Lazio). Naples is in southern Italy (Campania). Palermo is in Sicily. Florence is in Tuscany.`,concepts_tested:[`Italian Regions`],formulas_used:[],common_trap:`['Milan', 'Po Valley', 'Italian geography', 'Pianura Padana', 'northern Italy']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00343`,subject:`General Knowledge`,chapter:`Ch2: Geography`,topic:`Mountains`,subtopic:`Mountains`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which mountain range separates Italy from the rest of Europe to the north?`,options:[`A) Apennines`,`B) Alps`,`C) Dolomites`,`D) Pyrenees`,`E) Carpathians`],correct_index:1,explanation:`The Alps form Italy's northern border with France, Switzerland, Austria, and Slovenia. The Apennines run down the spine of the Italian peninsula from north to south. The Dolomites are part of the eastern Alps in northeastern Italy. The Pyrenees separate France from Spain. The Carpathians are in Eastern Europe.`,concepts_tested:[`Alps`,`Apennines`,`Italian geography`,`mountains`,`border`],formulas_used:[],common_trap:`Alps: northern Italy (border). Apennines: central spine of Italy. Dolomites: northeastern Alps. These are the three main Italian mountain ranges to know.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00344`,subject:`General Knowledge`,chapter:`Ch2: Geography`,topic:`Italian Seas`,subtopic:`Italian Seas`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Italy is surrounded by which seas?`,options:[`A) Mediterranean only`,`B) Adriatic Sea, Tyrrhenian Sea, and Ionian Sea (all part of the Mediterranean)`,`C) Atlantic Ocean and Mediterranean Sea`,`D) Black Sea and Mediterranean Sea`,`E) Adriatic Sea only`],correct_index:1,explanation:`Italy is a peninsula surrounded by: the Adriatic Sea (east, between Italy and the Balkans), the Tyrrhenian Sea (west, between Italy and Sardinia/Corsica), and the Ionian Sea (south). All are subdivisions of the Mediterranean Sea. The Ligurian Sea is in the northwest. Sicily separates the Tyrrhenian from the Ionian. The Strait of Messina separates Sicily from mainland Italy.`,concepts_tested:[`Italian seas`,`Adriatic`,`Tyrrhenian`,`Ionian`,`Mediterranean`],formulas_used:[],common_trap:`Italian seas: Adriatic (east), Tyrrhenian (west), Ionian (south), Ligurian (northwest). All part of the Mediterranean. Key for IMAT students living/studying in Italy!`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00345`,subject:`General Knowledge`,chapter:`Ch2: Geography`,topic:`Population`,subtopic:`Population`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the approximate population of Italy?`,options:[`A) 20 million`,`B) 40 million`,`C) 60 million`,`D) 80 million`,`E) 100 million`],correct_index:2,explanation:`Italy's population is approximately 60 million people (as of 2024). Italy is the 4th most populous country in the EU after Germany (~84M), France (~68M), and Spain (~47M). Italy has been experiencing demographic decline (low birth rate, ageing population). The capital Rome has ~2.8M inhabitants; Milan ~1.4M (3.2M metro area).`,concepts_tested:[`Italy`,`population`,`demographics`,`EU`,`geography`],formulas_used:[],common_trap:`EU population order: Germany ~84M > France ~68M > Spain ~47M > Italy ~60M. Italy is 4th largest EU country by population.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00346`,subject:`General Knowledge`,chapter:`Ch3: Politics & International Organizations`,topic:`UN Security Council`,subtopic:`UN Security Council`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following countries are permanent members (P5) of the UN Security Council?`,options:[`A) USA, UK, France, Germany, China`,`B) USA, UK, France, Russia, China`,`C) USA, UK, Germany, Japan, China`,`D) USA, Russia, France, Italy, China`,`E) USA, UK, Brazil, Russia, China`],correct_index:1,explanation:`The five permanent members (P5) of the UN Security Council: USA, UK, France, Russia (formerly USSR), China. They have VETO power over any resolution. Each P5 member can block any resolution by voting against it. There are also 10 non-permanent members elected for 2-year terms. The Security Council is responsible for international peace and security.`,concepts_tested:[`UN Security Council`,`P5 permanent members`,`veto`,`United Nations`],formulas_used:[],common_trap:`P5 = USA, UK, France, Russia, China. Mnemonic: the five main WWII Allied powers. Permanent since 1945. Each has veto power.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00347`,subject:`General Knowledge`,chapter:`Ch3: Politics & International Organizations`,topic:`Italian Parliament`,subtopic:`Italian Parliament`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The Italian Parliament is bicameral. What are its two chambers?`,options:[`A) The Senate and the House of Commons`,`B) The Senate of the Republic and the Chamber of Deputies`,`C) The Senate and the National Assembly`,`D) The House of Representatives and the Senate`,`E) The Chamber of Deputies and the Council of State`],correct_index:1,explanation:`Italy has a bicameral parliament: (1) Senate of the Republic (Senato della Repubblica) — 200 elected senators + life senators (appointed by the President for distinguished citizens); (2) Chamber of Deputies (Camera dei Deputati) — 400 elected deputies. Both chambers have equal legislative powers (unlike UK/USA where upper chamber is weaker). Prime Minister must have confidence of BOTH chambers.`,concepts_tested:[`Italian Parliament`],formulas_used:[],common_trap:`['Italian Parliament', 'Senate', 'Chamber of Deputies', 'bicameral', 'Italian politics']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00348`,subject:`General Knowledge`,chapter:`Ch3: Politics & International Organizations`,topic:`European Parliament`,subtopic:`European Parliament`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Members of the European Parliament (MEPs) are:`,options:[`A) Appointed by national governments`,`B) Directly elected by EU citizens every 5 years`,`C) Selected from national parliaments`,`D) Chosen by the European Commission`,`E) Appointed for life by the Council of Europe`],correct_index:1,explanation:`MEPs are DIRECTLY elected by EU citizens every 5 years (since 1979). The European Parliament has 705 MEPs (as of 2024, number adjusts with population). It shares legislative power with the Council of the EU. The European Commission (executive) is NOT directly elected — Commissioners are appointed. The Council of Europe is separate from the EU (includes non-EU countries like UK, Turkey).`,concepts_tested:[`European Parliament`],formulas_used:[],common_trap:`['European Parliament', 'MEPs', 'EU elections', 'direct democracy', 'European Union']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00349`,subject:`General Knowledge`,chapter:`Ch3: Politics & International Organizations`,topic:`NATO`,subtopic:`NATO`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`NATO is a military alliance. What does NATO stand for?`,options:[`A) North Atlantic Treaty Organization`,`B) National Alliance for Treaty Operations`,`C) North American Treaty Organization`,`D) Northern Atlantic Trade Organization`,`E) National Atlantic Treaty Operations`],correct_index:0,explanation:`NATO = North Atlantic Treaty Organization, founded in 1949 (Washington Treaty). It is a military alliance of 32 member countries (as of 2024, including Finland which joined in 2023 and Sweden in 2024). Article 5: an attack on one member is considered an attack on all. Headquarters: Brussels, Belgium. Italy is a founding member of NATO.`,concepts_tested:[`NATO`],formulas_used:[],common_trap:`['NATO', 'North Atlantic Treaty Organization', 'military alliance', 'Article 5', 'collective defense']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00350`,subject:`General Knowledge`,chapter:`Ch4: Science & Technology`,topic:`Internet`,subtopic:`Internet`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The World Wide Web was invented by:`,options:[`A) Bill Gates`,`B) Steve Jobs`,`C) Tim Berners-Lee`,`D) Elon Musk`,`E) Mark Zuckerberg`],correct_index:2,explanation:`Sir Tim Berners-Lee invented the World Wide Web in 1989 while working at CERN (the European physics laboratory in Geneva). He proposed a hypertext system to share information among scientists. The first website went live on 6 August 1991. Note: the Web ≠ Internet. The Internet (network of networks) predates the Web; Berners-Lee invented the Web as a way to use the internet.`,concepts_tested:[`Internet`],formulas_used:[],common_trap:`['Tim Berners-Lee', 'World Wide Web', 'CERN', 'internet', 'technology']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00351`,subject:`General Knowledge`,chapter:`Ch4: Science & Technology`,topic:`Climate Change`,subtopic:`Climate Change`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The 'greenhouse effect' refers to:`,options:[`A) The warming of greenhouses using artificial lighting`,`B) The trapping of heat in Earth's atmosphere by greenhouse gases`,`C) The cooling of Earth due to ozone depletion`,`D) The effect of UV radiation on plant growth`,`E) The warming caused by nuclear power plants`],correct_index:1,explanation:`The greenhouse effect: solar radiation passes through the atmosphere and warms Earth's surface. Earth re-emits infrared (heat) radiation. Greenhouse gases (CO₂, CH₄, H₂O vapour, N₂O, O₃) absorb and re-emit this infrared radiation, trapping heat. Without any greenhouse effect, Earth's average temperature would be -18°C instead of +15°C. Enhanced greenhouse effect (from human CO₂ emissions) causes global warming.`,concepts_tested:[`Climate Change`],formulas_used:[],common_trap:`['greenhouse effect', 'climate change', 'CO2', 'infrared radiation', 'global warming']`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00352`,subject:`General Knowledge`,chapter:`Ch4: Science & Technology`,topic:`Vaccines`,subtopic:`Vaccines`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the principle behind vaccines?`,options:[`A) They kill pathogens directly in the bloodstream`,`B) They expose the immune system to antigens, stimulating memory cell formation without causing disease`,`C) They replace damaged immune cells with healthy ones`,`D) They permanently block pathogen entry into the body`,`E) They increase body temperature to kill pathogens`],correct_index:1,explanation:`Vaccines introduce antigens (or instructions to make them — mRNA vaccines) without causing disease. The immune system mounts a response and creates MEMORY B and T cells. On future exposure to the real pathogen, memory cells allow a rapid, strong secondary immune response that eliminates the pathogen before disease develops. Types: live-attenuated, inactivated, subunit, mRNA (e.g. COVID-19 vaccines).`,concepts_tested:[`vaccines`,`immunology`,`memory cells`,`antigens`,`immune response`],formulas_used:[],common_trap:`Vaccines work through IMMUNOLOGICAL MEMORY. Primary response (first exposure): slow and weak. Secondary response (memory cells): fast and strong. Vaccines safely create memory cells.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00353`,subject:`General Knowledge`,chapter:`Ch4: Science & Technology`,topic:`Antibiotics`,subtopic:`Antibiotics`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Why do antibiotics NOT work against viral infections?`,options:[`A) Viruses are too small for antibiotics to reach`,`B) Antibiotics target bacterial structures (e.g. cell wall, ribosomes) that viruses lack`,`C) Viruses are resistant to all known antibiotics`,`D) Antibiotics only work in the digestive system`,`E) Viruses can destroy antibiotics chemically`],correct_index:1,explanation:`Antibiotics work by targeting structures specific to BACTERIA: cell walls (penicillin inhibits peptidoglycan synthesis), bacterial ribosomes (70S — different from human 80S), bacterial DNA gyrase, etc. VIRUSES have none of these structures — they are non-living particles consisting of nucleic acid and protein (no cell wall, no ribosomes, no independent metabolism). Antivirals (different drugs) target virus-specific replication mechanisms.`,concepts_tested:[`antibiotics`,`viruses`,`bacteria`,`antimicrobial`,`antibiotic resistance`],formulas_used:[],common_trap:`Bacteria = living cells with cell walls, ribosomes, metabolism → targeted by antibiotics. Viruses = non-living, no cell wall, no ribosomes → antibiotics useless. Using antibiotics for viral infections: useless AND promotes antibiotic resistance.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0}],Na=({d:e,size:t=16})=>(0,R.jsx)(`svg`,{width:t,height:t,viewBox:`0 0 24 24`,fill:`none`,stroke:`currentColor`,strokeWidth:`1.8`,strokeLinecap:`round`,strokeLinejoin:`round`,children:(0,R.jsx)(`path`,{d:e})}),Pa=[{id:`dashboard`,label:`Dashboard`,d:`M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10`},{id:`question-bank`,label:`Question Bank`,d:`M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z`},{id:`mock-select`,label:`Mock Exams`,d:`M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11`},{id:`predictor`,label:`Score Predictor`,d:`M18 20V10 M12 20V4 M6 20v-6`},{id:`progress`,label:`Analytics`,d:`M22 12h-4l-3 9L9 3l-3 9H2`},{id:`settings`,label:`Settings`,d:`M12 20h9 M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z`}];function Fa({children:e}){let{currentView:t,setCurrentView:n,quizAttempts:r,mockExams:i}=Sa(),{profile:a,signOut:o}=fa(),s=r.reduce((e,t)=>e+t.totalQuestions,0),c=r.length>0?Math.round(r.reduce((e,t)=>e+t.correctAnswers/t.totalQuestions*100,0)/r.length):0;return(0,R.jsxs)(`div`,{className:`shell`,children:[(0,R.jsxs)(`aside`,{className:`sidebar`,children:[(0,R.jsx)(`div`,{style:{padding:
