6`,bgColor:`rgba(20,184,166,0.1)`,borderColor:`rgba(20,184,166,0.25)`,chapters:[`Ch1: Verbal Reasoning`,`Ch2: Numerical Patterns`,`Ch3: Spatial Reasoning`,`Ch4: Data Interpretation`]},{name:`General Knowledge`,icon:`🌍`,color:`#6366F1`,bgColor:`rgba(99,102,241,0.1)`,borderColor:`rgba(99,102,241,0.25)`,chapters:[`Ch1: History & Culture`,`Ch2: Geography`,`Ch3: Politics & International Organizations`,`Ch4: Science & Technology`]}],Ma=[{id:`Q00001`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Water Properties`,subtopic:`Water Properties`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following properties of water is due to hydrogen bonding?

1. High specific heat capacity
2. Universal solvent ability
3. High surface tension
4. Expansion upon freezing`,options:[`A) 1 and 3 only`,`B) 1, 2 and 3 only`,`C) 1, 3 and 4 only`,`D) 1, 2, 3 and 4`,`E) 2 and 4 only`],correct_index:3,explanation:`All four properties result from hydrogen bonding between water molecules. (1) High specific heat: H-bonds absorb energy before temperature rises. (2) Universal solvent: polar H₂O dissolves polar/ionic substances via H-bonds. (3) High surface tension: H-bonds between surface molecules resist breaking. (4) Expansion on freezing: ice forms a hexagonal H-bond lattice less dense than liquid water. All four = D.`,concepts_tested:[`hydrogen bonding`,`water properties`,`specific heat`,`surface tension`],formulas_used:[],common_trap:`Many students forget that the universal solvent property also comes from H-bonding (polar interactions). Expansion on freezing is often overlooked.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00002`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Carbohydrates`,subtopic:`Carbohydrates`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly describes the bond formed when two monosaccharides join to form a disaccharide?`,options:[`A) Peptide bond, with release of water`,`B) Glycosidic bond, with release of water`,`C) Ester bond, with release of water`,`D) Glycosidic bond, with uptake of water`,`E) Hydrogen bond, with no change in water`],correct_index:1,explanation:`Two monosaccharides join via a condensation reaction (dehydration synthesis) forming a glycosidic bond and releasing one water molecule. For example, glucose + fructose → sucrose + H₂O. The glycosidic bond is a covalent bond between the anomeric carbon of one sugar and a hydroxyl group of another. Peptide bonds join amino acids; ester bonds join fatty acids and glycerol.`,concepts_tested:[`glycosidic bond`,`condensation reaction`,`disaccharide`,`monosaccharide`],formulas_used:[],common_trap:`Peptide bonds join amino acids, not sugars. Hydrolysis (uptake of water) breaks glycosidic bonds — don't confuse formation with breakdown.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00003`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Proteins`,subtopic:`Proteins`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which level of protein structure is maintained ONLY by hydrogen bonds?`,options:[`A) Primary structure`,`B) Secondary structure`,`C) Tertiary structure`,`D) Quaternary structure`,`E) Secondary and tertiary structure`],correct_index:1,explanation:`Secondary structure (α-helices and β-pleated sheets) is maintained exclusively by hydrogen bonds between the NH and C=O groups of the peptide backbone — not between R groups. Primary structure is maintained by covalent peptide bonds. Tertiary structure involves multiple bond types: H-bonds, disulfide bridges, ionic bonds, van der Waals, and hydrophobic interactions. Quaternary structure holds polypeptide chains together with similar forces to tertiary.`,concepts_tested:[`protein structure`,`hydrogen bonds`,`secondary structure`,`alpha helix`],formulas_used:[],common_trap:`Tertiary structure also involves H-bonds, so students sometimes pick E. The key word is 'ONLY' — tertiary has multiple bond types, secondary has ONLY H-bonds.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00004`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Lipids`,subtopic:`Lipids`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following statements about phospholipids is correct?`,options:[`A) They are formed from three fatty acids and glycerol`,`B) They contain a hydrophilic glycerol-phosphate head and hydrophobic fatty acid tails`,`C) They are non-polar molecules that cannot interact with water`,`D) Saturated fatty acid tails contain one or more double bonds`,`E) They are the primary energy storage molecules in animals`],correct_index:1,explanation:`Phospholipids consist of a glycerol backbone, a phosphate group (making the head hydrophilic/polar), and two fatty acid chains (hydrophobic tails). This amphipathic nature drives bilayer formation in cell membranes. Option A describes triglycerides. Option C is wrong — they have a hydrophilic head. Option D reverses the definition (saturated = NO double bonds; unsaturated = double bonds). Option E describes triglycerides/glycogen.`,concepts_tested:[`phospholipids`,`hydrophilic`,`hydrophobic`,`amphipathic`,`cell membrane`],formulas_used:[],common_trap:`Saturated fatty acids have NO double bonds (they are 'saturated' with hydrogen). Unsaturated have one or more C=C double bonds.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00005`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`DNA vs RNA`,subtopic:`DNA vs RNA`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following differences between DNA and RNA is correct?`,options:[`A) DNA contains uracil; RNA contains thymine`,`B) DNA is single-stranded; RNA is double-stranded`,`C) DNA contains deoxyribose; RNA contains ribose`,`D) DNA is found only in the nucleus; RNA is found only in the cytoplasm`,`E) DNA bases pair A-U and G-C; RNA bases pair A-T and G-C`],correct_index:2,explanation:`The key structural difference is the sugar: DNA has deoxyribose (missing the 2'-OH group), while RNA has ribose (with 2'-OH). This makes RNA more reactive and less stable. Option A reverses uracil/thymine. Option B reverses the stranded nature (DNA is double-stranded, most RNA is single-stranded). Option D is incorrect — RNA is made in the nucleus (transcription) and then moves to cytoplasm. Option E reverses the base pairs.`,concepts_tested:[`DNA`,`RNA`,`deoxyribose`,`ribose`,`nucleic acids`],formulas_used:[],common_trap:`DNA is in both nucleus AND mitochondria. RNA is made in the nucleus and functions in the cytoplasm — but it is NOT exclusively in the cytoplasm.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00006`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Enzyme Classification`,subtopic:`Enzyme Classification`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A student measures the absorption of a food sample with iodine solution and gets a dark blue-black colour. Which macromolecule is present?`,options:[`A) Glucose`,`B) Starch`,`C) Protein`,`D) Lipid`,`E) Maltose`],correct_index:1,explanation:`The iodine test (Lugol's solution) is specific for starch. Iodine molecules (I₂/I₃⁻) become trapped inside the helical structure of amylose (a component of starch), producing the characteristic dark blue-black colour. Simple sugars like glucose and maltose give NO colour change with iodine. Proteins are detected with Biuret reagent (purple). Lipids are detected with Sudan III/IV (red/orange) or ethanol emulsion test.`,concepts_tested:[`starch`,`iodine test`,`amylose`,`carbohydrate tests`,`biochemical tests`],formulas_used:[],common_trap:`Glucose and other simple sugars do NOT turn iodine blue-black — only starch (specifically amylose). This is a very common exam error.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00007`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Amino Acids`,subtopic:`Amino Acids`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly describes the general structure of an amino acid?`,options:[`A) A central carbon bonded to: NH₂, COOH, H, and a variable R group`,`B) A central carbon bonded to: OH, COOH, H, and a variable R group`,`C) A nitrogen bonded to: NH₂, COOH, H, and a variable R group`,`D) A central carbon bonded to: NH₂, COOH, OH, and a variable R group`,`E) A central carbon bonded to: NH₂, CHO, H, and a variable R group`],correct_index:0,explanation:`Every amino acid has the same backbone: a central alpha carbon (Cα) bonded to four groups: (1) an amino group –NH₂, (2) a carboxyl group –COOH, (3) a hydrogen atom –H, and (4) a variable side chain –R. The R group determines the identity and properties of the amino acid. The amino group is basic; the carboxyl group is acidic, making amino acids amphoteric.`,concepts_tested:[`amino acid structure`,`R group`,`alpha carbon`,`amphoteric`],formulas_used:[],common_trap:`Option D includes an extra –OH which is wrong. The central atom is carbon not nitrogen (option C). The formula is H₂N-CH(R)-COOH.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00008`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Nucleotides`,subtopic:`Nucleotides`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A nucleotide consists of which THREE components?`,options:[`A) A sugar, a phosphate group, and a nitrogenous base`,`B) A sugar, a fatty acid, and a nitrogenous base`,`C) An amino acid, a phosphate group, and a nitrogenous base`,`D) A sugar, a phosphate group, and an amino acid`,`E) Two sugars, a phosphate group, and a nitrogenous base`],correct_index:0,explanation:`A nucleotide = pentose sugar (ribose or deoxyribose) + phosphate group + nitrogenous base. The phosphate group is attached to the 5' carbon of the sugar. The nitrogenous base is attached to the 1' carbon. Nucleotides link via phosphodiester bonds (between 3' of one sugar and 5' of next) to form DNA or RNA strands. ATP is a modified nucleotide (adenosine triphosphate — adenine + ribose + 3 phosphates).`,concepts_tested:[`nucleotide`,`phosphate group`,`nitrogenous base`,`pentose sugar`],formulas_used:[],common_trap:`Students confuse nucleotides with nucleosides. A nucleoside = sugar + base only (no phosphate). Add phosphate to get a nucleotide.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00009`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Polysaccharides`,subtopic:`Polysaccharides`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly pairs a polysaccharide with its monomer AND its function?`,options:[`A) Cellulose — galactose — structural support in plant walls`,`B) Glycogen — glucose — energy storage in animal liver and muscle`,`C) Starch — fructose — energy storage in plants`,`D) Chitin — glucose — structural support in fungi and insect exoskeletons`,`E) Cellulose — glucose — energy storage in plants`],correct_index:1,explanation:`Glycogen is the animal energy storage polysaccharide, made entirely of glucose units joined by α-1,4 and α-1,6 glycosidic bonds (heavily branched). It is stored in the liver and skeletal muscle. Cellulose is made of glucose (β-1,4 linkages) but is structural, not for energy storage — so A and E are both wrong. Starch is also made of glucose (not fructose). Chitin is made of N-acetylglucosamine, not plain glucose.`,concepts_tested:[`polysaccharides`,`glycogen`,`cellulose`,`starch`,`glucose`],formulas_used:[],common_trap:`Both cellulose AND glycogen AND starch are made of glucose — the difference is the type of glycosidic bond (α vs β) and the degree of branching.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00010`,subject:`Biology`,chapter:`Ch1: Chemistry of Life`,topic:`Lipid Types`,subtopic:`Lipid Types`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following statements about triglycerides is/are correct?

1. They are formed by esterification of glycerol with three fatty acids
2. Saturated triglycerides are typically solid at room temperature
3. They yield more energy per gram than carbohydrates
4. They are soluble in water`,options:[`A) 1 and 2 only`,`B) 1, 2 and 3 only`,`C) 2 and 3 only`,`D) 1, 2, 3 and 4`,`E) 3 and 4 only`],correct_index:1,explanation:`Statement 1: True — ester bonds form between the –OH of glycerol and the –COOH of each fatty acid (condensation reaction releasing water). Statement 2: True — saturated fatty acids pack tightly (no kinks from double bonds), so they are solid at room temperature (e.g. butter, lard). Statement 3: True — lipids yield ~9 kcal/g versus ~4 kcal/g for carbohydrates, due to the high proportion of C–H bonds. Statement 4: FALSE — triglycerides are non-polar and hydrophobic (insoluble in water). Correct answer = B (1, 2 and 3 only).`,concepts_tested:[`triglycerides`,`ester bond`,`saturated fatty acids`,`energy storage`],formulas_used:[],common_trap:`Statement 4 is the trap — fats are hydrophobic and do NOT dissolve in water. Phospholipids are amphipathic (partly soluble), but triglycerides are not.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00011`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Organelles`,subtopic:`Organelles`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which organelle is responsible for producing ATP via oxidative phosphorylation?`,options:[`A) Ribosome`,`B) Golgi apparatus`,`C) Mitochondrion`,`D) Endoplasmic reticulum`,`E) Lysosome`],correct_index:2,explanation:`The mitochondrion is the site of aerobic respiration and oxidative phosphorylation. ATP synthase in the inner membrane (cristae) uses the proton gradient to synthesise ATP from ADP + Pi. Ribosomes make proteins; Golgi packages proteins; ER handles protein folding and lipid synthesis; lysosomes digest waste.`,concepts_tested:[`mitochondria`,`ATP`,`oxidative phosphorylation`,`cristae`],formulas_used:[],common_trap:`The smooth ER plays some roles in metabolism but does NOT perform oxidative phosphorylation.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00012`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Cell Types`,subtopic:`Cell Types`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which feature is found in prokaryotic cells but NOT in eukaryotic cells?`,options:[`A) DNA`,`B) Ribosomes`,`C) Cell membrane`,`D) Circular chromosome`,`E) Cytoplasm`],correct_index:3,explanation:`Prokaryotes have a single circular chromosome NOT enclosed in a membrane-bound nucleus. Eukaryotes have linear chromosomes inside a nucleus. Both have DNA, ribosomes, a cell membrane, and cytoplasm. Prokaryotes also have plasmids, no membrane-bound organelles, and 70S ribosomes.`,concepts_tested:[`prokaryotes`,`eukaryotes`,`circular chromosome`],formulas_used:[],common_trap:`Both cells have ribosomes — but prokaryotes have 70S and eukaryotes have 80S cytoplasmic ribosomes.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00013`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Nucleus`,subtopic:`Nucleus`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The nuclear envelope consists of:`,options:[`A) One phospholipid bilayer without pores`,`B) Two phospholipid bilayers with nuclear pores`,`C) One phospholipid bilayer with nuclear pores`,`D) Two phospholipid bilayers without pores`,`E) A protein-only membrane with nuclear pores`],correct_index:1,explanation:`The nuclear envelope = TWO phospholipid bilayers (4 phospholipid layers total) perforated by nuclear pore complexes that control molecular transport. The outer membrane is continuous with the rough ER.`,concepts_tested:[`nuclear envelope`,`nuclear pores`,`double membrane`],formulas_used:[],common_trap:`2 bilayers = 4 phospholipid layers. The outer membrane connects to the rough ER — a common exam fact.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00014`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Ribosomes`,subtopic:`Ribosomes`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A drug inhibits 70S ribosomes. Which cells are MOST directly affected?`,options:[`A) Human liver cells`,`B) Bacteria`,`C) Human nerve cells`,`D) Human muscle cells`,`E) Yeast cells`],correct_index:1,explanation:`70S ribosomes are found in prokaryotes (bacteria) and in mitochondria/chloroplasts. Eukaryotic cytoplasmic ribosomes are 80S. Drugs targeting 70S ribosomes (e.g. streptomycin, erythromycin) inhibit bacterial protein synthesis without harming human cytoplasmic ribosomes.`,concepts_tested:[`ribosomes`,`70S`,`80S`,`antibiotics`],formulas_used:[],common_trap:`Yeast are eukaryotes with 80S ribosomes. Mitochondria in human cells also have 70S ribosomes, but bacteria is the primary/standard answer.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00015`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Mitochondria`,subtopic:`Mitochondria`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following about mitochondria is/are correct?

1. They have their own circular DNA
2. They are surrounded by a double membrane
3. The matrix is where the Krebs cycle occurs
4. The inner membrane is smooth and unfolds during high activity`,options:[`A) 1, 2 and 3 only`,`B) 1 and 3 only`,`C) 2 and 4 only`,`D) 1, 2, 3 and 4`,`E) 3 and 4 only`],correct_index:0,explanation:`1: TRUE — mitochondrial DNA supports the endosymbiotic theory. 2: TRUE — outer and inner (cristae) membranes. 3: TRUE — Krebs cycle enzymes are in the aqueous matrix. 4: FALSE — the inner membrane is ALREADY highly folded into cristae. More cristae = more active cell, not 'unfolding'.`,concepts_tested:[`mitochondria`,`Krebs cycle`,`matrix`,`cristae`,`mitochondrial DNA`],formulas_used:[],common_trap:`Statement 4 is the trap. Cristae are permanent folds — MORE folds mean MORE metabolic activity. They do not unfold.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00016`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Chloroplasts`,subtopic:`Chloroplasts`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The Calvin cycle (light-independent reactions) takes place in the:`,options:[`A) Thylakoid membrane`,`B) Thylakoid lumen`,`C) Stroma`,`D) Outer chloroplast membrane`,`E) Granum`],correct_index:2,explanation:`The Calvin cycle occurs in the stroma — the aqueous fluid surrounding the thylakoids. The stroma contains RuBisCO and other enzymes for carbon fixation and glucose synthesis. The light-dependent reactions occur on the thylakoid membranes.`,concepts_tested:[`chloroplast`,`Calvin cycle`,`stroma`,`light-independent`],formulas_used:[],common_trap:`Parallel with mitochondria: ETC = inner membrane / Krebs = matrix. In chloroplasts: light reactions = thylakoid membrane / Calvin = stroma.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00017`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Golgi Apparatus`,subtopic:`Golgi Apparatus`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the MAIN function of the Golgi apparatus?`,options:[`A) Protein synthesis from mRNA`,`B) Modification, sorting and packaging of proteins`,`C) ATP generation`,`D) Lipid synthesis for membranes`,`E) Breakdown of cellular waste`],correct_index:1,explanation:`The Golgi receives vesicles from the rough ER, modifies proteins (e.g. adds sugar chains — glycosylation), sorts them, and packages them into vesicles for secretion, membrane insertion, or lysosome delivery. Protein synthesis = ribosomes. ATP = mitochondria. Lipid synthesis = smooth ER. Waste = lysosomes.`,concepts_tested:[`Golgi apparatus`,`glycosylation`,`vesicle`,`secretion`],formulas_used:[],common_trap:`The Golgi does NOT make proteins — it only modifies them. Think of it as the cell's 'post office'.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00018`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Lysosomes`,subtopic:`Lysosomes`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Lysosomes function by:`,options:[`A) Synthesising lipids`,`B) Containing hydrolytic enzymes for intracellular digestion`,`C) Packaging proteins for exocytosis`,`D) Producing ATP`,`E) Storing calcium ions`],correct_index:1,explanation:`Lysosomes contain ~60+ hydrolytic enzymes at pH ~5 (acidic). They digest: worn-out organelles (autophagy), phagocytosed foreign particles, and cellular debris. Their membrane prevents enzyme leakage into the cytoplasm.`,concepts_tested:[`lysosomes`,`hydrolytic enzymes`,`autophagy`,`acidic pH`],formulas_used:[],common_trap:`Lysosomes maintain pH ~5 using proton pumps. Their enzymes don't function at cytoplasmic pH (~7.2) — this protects the cell if a lysosome ruptures.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00019`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`ER`,subtopic:`ER`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Rough ER differs from smooth ER in that rough ER:`,options:[`A) Has no membrane`,`B) Has ribosomes on its cytoplasmic surface`,`C) Synthesises lipids`,`D) Is found only in prokaryotes`,`E) Is the site of cellular respiration`],correct_index:1,explanation:`Rough ER is studded with ribosomes that synthesise proteins which enter the RER lumen for folding and modification. Smooth ER lacks ribosomes and synthesises lipids/steroids, detoxifies drugs (liver), and stores Ca²⁺ (muscle cells).`,concepts_tested:[`rough ER`,`smooth ER`,`ribosomes`,`protein synthesis`],formulas_used:[],common_trap:`Rough ER = PROTEINS. Smooth ER = LIPIDS. Students frequently reverse these.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00020`,subject:`Biology`,chapter:`Ch2: Cell Structure & Organelles`,topic:`Cytoskeleton`,subtopic:`Cytoskeleton`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which structure forms spindle fibres during cell division AND tracks for organelle transport?`,options:[`A) Microfilaments (actin)`,`B) Intermediate filaments`,`C) Microtubules`,`D) Centrioles`,`E) Cell wall`],correct_index:2,explanation:`Microtubules (α+β tubulin polymers) form: (1) the mitotic spindle for chromosome separation, (2) tracks for motor proteins (kinesins/dyneins) transporting vesicles, (3) cilia and flagella (9+2 axoneme). Microfilaments (actin) mediate cell movement. Centrioles organise spindle formation but ARE NOT themselves the spindle fibres.`,concepts_tested:[`microtubules`,`spindle fibres`,`cytoskeleton`,`organelle transport`],formulas_used:[],common_trap:`Centrioles organise microtubule formation — they are NOT the spindle fibres. The spindle fibres ARE microtubules.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00021`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Fluid Mosaic Model`,subtopic:`Fluid Mosaic Model`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`In the fluid mosaic model of the cell membrane, what does 'fluid' refer to?`,options:[`A) The membrane is surrounded by water`,`B) Phospholipids can move laterally within the bilayer`,`C) The membrane can be dissolved in water`,`D) Proteins float above the membrane surface`,`E) The membrane changes thickness constantly`],correct_index:1,explanation:`'Fluid' refers to the lateral (sideways) movement of phospholipids within each leaflet of the bilayer at body temperature — they can move past each other like molecules in a liquid. 'Mosaic' refers to the proteins embedded within or on the surface of the bilayer. This model (Singer & Nicolson, 1972) replaced the earlier Davson-Danielli sandwich model.`,concepts_tested:[`fluid mosaic model`,`phospholipid bilayer`,`membrane fluidity`],formulas_used:[],common_trap:`The membrane is NOT dissolved by water — it is hydrophobic in its interior and will not dissolve. 'Fluid' = lateral phospholipid movement.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00022`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Osmosis`,subtopic:`Osmosis`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A red blood cell is placed in a solution more dilute than its cytoplasm. What happens?`,options:[`A) The cell shrinks (crenation) as water leaves by osmosis`,`B) The cell swells and may burst (haemolysis) as water enters by osmosis`,`C) The cell remains unchanged because the membrane is impermeable`,`D) The cell shrinks because glucose leaves the cell`,`E) The cell swells because ions enter the cell`],correct_index:1,explanation:`The external solution is hypotonic (lower solute concentration = higher water potential). Water moves by osmosis from high water potential (outside) to low water potential (inside the cell). The red blood cell takes in water, swells, and may lyse (burst — haemolysis). In hypertonic solution, the opposite occurs: water leaves and the cell crenates (shrivels).`,concepts_tested:[`osmosis`,`water potential`,`hypotonic`,`haemolysis`],formulas_used:[],common_trap:`Osmosis moves water from LOW solute concentration (HIGH water potential) to HIGH solute concentration (LOW water potential). Always think about WATER movement, not solute.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00023`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Active Transport`,subtopic:`Active Transport`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is the BEST example of primary active transport?`,options:[`A) Movement of glucose from high to low concentration`,`B) Na⁺/K⁺ ATPase pumping Na⁺ out and K⁺ into the cell against concentration gradients`,`C) Movement of water across aquaporins`,`D) Glucose entering cells via GLUT transporters`,`E) CO₂ diffusing out of a respiring cell`],correct_index:1,explanation:`Primary active transport uses ATP directly to move substances against their concentration gradient. The Na⁺/K⁺ ATPase pump hydrolyses ATP to move 3 Na⁺ out and 2 K⁺ in — both against their gradients. This maintains membrane potential and cell volume. GLUT transporters are facilitated diffusion (no ATP). Aquaporins are channel proteins for osmosis. CO₂ moves by simple diffusion.`,concepts_tested:[`active transport`,`Na-K ATPase`,`ATP`,`concentration gradient`],formulas_used:[],common_trap:`Secondary active transport uses the gradient established by primary transport (e.g. Na⁺ gradient drives glucose cotransport in the gut). This is different from primary active transport.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00024`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Diffusion`,subtopic:`Diffusion`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which factor would INCREASE the rate of diffusion across a membrane?`,options:[`A) Increasing the membrane thickness`,`B) Decreasing the surface area`,`C) Increasing the concentration gradient`,`D) Decreasing the temperature`,`E) Increasing the size of the diffusing molecule`],correct_index:2,explanation:`Fick's Law: Rate of diffusion ∝ (Surface area × Concentration gradient) / (Membrane thickness). A larger concentration gradient increases the driving force for diffusion. Thicker membranes, smaller surface area, lower temperature, and larger molecules all DECREASE diffusion rate.`,concepts_tested:[`diffusion`,`Fick's law`,`concentration gradient`,`membrane permeability`],formulas_used:[],common_trap:`Remember Fick's Law: more surface area, bigger gradient, thinner membrane, smaller molecule, higher temperature — ALL increase diffusion rate.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00025`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Membrane Proteins`,subtopic:`Membrane Proteins`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the function of carrier proteins in the cell membrane?`,options:[`A) They form pores that allow any molecule to pass freely`,`B) They bind specific molecules and change shape to transport them across the membrane`,`C) They catalyse chemical reactions at the membrane surface`,`D) They provide structural support to the lipid bilayer`,`E) They detect hormones only — no transport function`],correct_index:1,explanation:`Carrier proteins (transporters) are integral membrane proteins that bind specific molecules, undergo conformational change (shape change), and release the molecule on the other side. They can operate by facilitated diffusion (no ATP, down gradient) or active transport (ATP required, against gradient). Channel proteins form pores — different from carriers. Enzymes catalyse reactions. Receptors detect signals.`,concepts_tested:[`carrier proteins`,`facilitated diffusion`,`conformational change`,`membrane transport`],formulas_used:[],common_trap:`Channel proteins form open pores — passive, selective. Carrier proteins change shape — can be active or passive. Don't confuse them.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00026`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Endocytosis`,subtopic:`Endocytosis`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which process involves the cell membrane engulfing a large particle to form an intracellular vesicle?`,options:[`A) Exocytosis`,`B) Pinocytosis`,`C) Phagocytosis`,`D) Osmosis`,`E) Active transport`],correct_index:2,explanation:`Phagocytosis ('cell eating') involves the cell membrane extending pseudopodia around a large solid particle (e.g. bacteria, dead cells) to engulf it into a phagosome (large vesicle). This is performed by phagocytes (neutrophils, macrophages). Pinocytosis ('cell drinking') engulfs extracellular fluid in small vesicles. Exocytosis exports material. Osmosis moves only water. Active transport uses protein pumps.`,concepts_tested:[`phagocytosis`,`endocytosis`,`pinocytosis`,`vesicle`,`immune system`],formulas_used:[],common_trap:`Pinocytosis = small vesicles of fluid. Phagocytosis = large solid particles. Both are types of endocytosis.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00027`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Water Potential`,subtopic:`Water Potential`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A plant cell is placed in a concentrated sugar solution. Which of the following correctly describes what happens?`,options:[`A) Water enters the cell by osmosis; the cell becomes turgid`,`B) Water leaves the cell by osmosis; the cell becomes plasmolysed`,`C) Sugar enters the cell by active transport; the cell swells`,`D) The cell is unaffected because plant cells have rigid walls`,`E) Water enters by active transport; the cell bursts`],correct_index:1,explanation:`The concentrated sugar solution is hypertonic (higher solute concentration than the cell). Water moves by osmosis from the higher water potential inside the cell to the lower water potential outside. The vacuole shrinks, the cytoplasm pulls away from the cell wall — this is plasmolysis. (Plant cells do NOT burst in hypotonic solutions because the cell wall provides pressure — they become turgid instead.)`,concepts_tested:[`plasmolysis`,`osmosis`,`water potential`,`plant cells`,`hypertonic`],formulas_used:[],common_trap:`Plants don't burst in hypotonic solution (cell wall prevents it). In hypertonic solution, they plasmolyse. Animal cells have no wall — they lyse or crenate.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00028`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Membrane Composition`,subtopic:`Membrane Composition`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which component of the cell membrane helps to maintain membrane fluidity at low temperatures?`,options:[`A) Saturated fatty acids`,`B) Cholesterol`,`C) Integral proteins`,`D) Carbohydrate chains`,`E) Peripheral proteins`],correct_index:1,explanation:`Cholesterol molecules are inserted between phospholipids in animal cell membranes. At LOW temperatures, cholesterol prevents fatty acid tails from packing too closely (preventing solidification), maintaining fluidity. At HIGH temperatures, cholesterol restrains excessive phospholipid movement, preventing the membrane from becoming too fluid. Plants use unsaturated fatty acids instead of cholesterol for similar regulation.`,concepts_tested:[`cholesterol`,`membrane fluidity`,`temperature`,`phospholipid`],formulas_used:[],common_trap:`Saturated fatty acids make membranes LESS fluid (they pack tightly). Unsaturated fatty acids and cholesterol help MAINTAIN fluidity.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00029`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Tonicity`,subtopic:`Tonicity`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which term describes a solution with the SAME solute concentration as the cytoplasm of a cell?`,options:[`A) Hypertonic`,`B) Hypotonic`,`C) Isotonic`,`D) Turgid`,`E) Plasmolysed`],correct_index:2,explanation:`Isotonic = same solute concentration as the cell's cytoplasm. No net movement of water occurs by osmosis. Hypertonic = higher solute concentration than the cell (water leaves). Hypotonic = lower solute concentration than the cell (water enters). Normal saline (0.9% NaCl) is isotonic to human red blood cells — that's why it's used in IV drips.`,concepts_tested:[`isotonic`,`tonicity`,`osmosis`,`concentration`],formulas_used:[],common_trap:`0.9% NaCl (normal saline) is isotonic to human cells. 5% glucose is also approximately isotonic. These are clinically important values.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00030`,subject:`Biology`,chapter:`Ch3: Cell Membrane & Transport`,topic:`Co-transport`,subtopic:`Co-transport`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Glucose is absorbed from the gut lumen into intestinal epithelial cells via a sodium-glucose co-transporter (SGLT1). Which statement about this process is correct?`,options:[`A) This is primary active transport because glucose moves against its gradient`,`B) This is secondary active transport because it uses the Na⁺ gradient established by the Na⁺/K⁺ ATPase`,`C) This is facilitated diffusion because no ATP is directly used by SGLT1`,`D) This is simple diffusion because glucose is a small molecule`,`E) This is endocytosis because glucose enters a vesicle`],correct_index:1,explanation:`SGLT1 is a sodium-glucose cotransporter: it uses the Na⁺ electrochemical gradient (low Na⁺ inside the cell, established by the Na⁺/K⁺ ATPase) to co-transport one Na⁺ and one glucose into the cell — both moving down (Na⁺) and against (glucose) their gradients. ATP is not directly used by SGLT1, but it is ultimately needed to maintain the Na⁺ gradient. This is secondary active transport.`,concepts_tested:[`co-transport`,`SGLT1`,`secondary active transport`,`Na gradient`,`gut absorption`],formulas_used:[],common_trap:`SGLT1 does not use ATP directly — but it still counts as SECONDARY active transport because it depends on a gradient maintained by primary active transport (Na⁺/K⁺ ATPase).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00031`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Enzyme Kinetics`,subtopic:`Enzyme Kinetics`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following best describes how an enzyme increases the rate of a reaction?`,options:[`A) It provides energy to start the reaction`,`B) It lowers the activation energy required for the reaction`,`C) It raises the activation energy to make reactants more reactive`,`D) It changes the overall free energy change (ΔG) of the reaction`,`E) It increases the temperature of the reaction`],correct_index:1,explanation:`Enzymes are biological catalysts that lower the activation energy (Ea) of a reaction by stabilising the transition state. This allows more substrate molecules to have enough energy to react, increasing reaction rate. Enzymes do NOT: add energy, change the overall ΔG of the reaction, or get consumed. They provide an alternative reaction pathway with a lower energy barrier.`,concepts_tested:[`enzyme`,`activation energy`,`catalyst`,`transition state`],formulas_used:[],common_trap:`Enzymes do NOT change ΔG (the thermodynamic favourability of a reaction). They only lower Ea (kinetic barrier). A thermodynamically unfavourable reaction remains so with or without an enzyme.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00032`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Active Site`,subtopic:`Active Site`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The 'induced fit' model of enzyme action states that:`,options:[`A) The active site is perfectly complementary to the substrate before binding`,`B) The active site changes shape to better fit the substrate upon binding`,`C) The substrate changes shape to fit the rigid active site`,`D) Enzymes only work with one specific substrate forever`,`E) The active site becomes irreversibly changed after each reaction`],correct_index:1,explanation:`The induced fit model (Koshland, 1958) proposes that the active site is NOT a perfect pre-formed fit. When the substrate approaches, it induces a conformational change in the enzyme so the active site moulds around the substrate more precisely. This contrasts with the older lock-and-key model (Emil Fischer), which assumed a rigid, perfectly complementary active site.`,concepts_tested:[`induced fit`,`active site`,`lock and key`,`enzyme-substrate complex`],formulas_used:[],common_trap:`Lock-and-key = rigid active site, perfect fit. Induced fit = active site CHANGES SHAPE on substrate binding. Modern evidence supports induced fit.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00033`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Inhibition`,subtopic:`Inhibition`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A competitive inhibitor:`,options:[`A) Binds to the allosteric site and permanently blocks the enzyme`,`B) Binds to the active site and its effect CANNOT be overcome by more substrate`,`C) Binds to the active site and its effect CAN be overcome by increasing substrate concentration`,`D) Binds to the allosteric site and its effect can be overcome by more substrate`,`E) Destroys the enzyme irreversibly`],correct_index:2,explanation:`Competitive inhibitors have a similar shape to the substrate and COMPETE for the active site. Because the inhibitor and substrate compete for the same site, increasing substrate concentration outcompetes the inhibitor, restoring enzyme activity. This increases the apparent Km (more substrate needed for half-max activity) but Vmax remains unchanged. Non-competitive inhibitors bind to allosteric sites and CANNOT be overcome by more substrate.`,concepts_tested:[`competitive inhibition`,`active site`,`Km`,`Vmax`,`substrate concentration`],formulas_used:[],common_trap:`Key: competitive = active site, reversible by more substrate, Km increases, Vmax unchanged. Non-competitive = allosteric site, cannot overcome with more substrate, Vmax decreases.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00034`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`pH Effects`,subtopic:`pH Effects`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`At which pH does pepsin (a stomach protease) work BEST?`,options:[`A) pH 7.4`,`B) pH 8.0`,`C) pH 2.0`,`D) pH 6.5`,`E) pH 11.0`],correct_index:2,explanation:`Pepsin is a protease secreted by the stomach. It has an optimal pH of approximately 2 (strongly acidic), matching the acidic environment of the stomach (pH 1.5–3.5). At this pH, the ionisation state of amino acid residues in the active site creates the optimal shape for catalysis. Enzymes in the small intestine (e.g. trypsin) have optimal pH ~8. Blood enzymes work at pH ~7.4. Extreme pH values denature enzymes.`,concepts_tested:[`pepsin`,`optimal pH`,`enzyme denaturation`,`stomach`],formulas_used:[],common_trap:`Different enzymes have different optimal pH values matching their location: pepsin (stomach) ~2, salivary amylase (mouth) ~7, trypsin (small intestine) ~8.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00035`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Temperature Effects`,subtopic:`Temperature Effects`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What happens to enzyme activity as temperature increases ABOVE the optimum?`,options:[`A) Activity increases because molecules move faster`,`B) Activity decreases because the enzyme is denatured`,`C) Activity stays constant because enzymes are stable proteins`,`D) Activity decreases because substrate molecules slow down`,`E) Activity increases then decreases then increases again`],correct_index:1,explanation:`Above the optimal temperature, the increased kinetic energy disrupts the weak bonds (hydrogen bonds, ionic bonds, van der Waals forces) that maintain the enzyme's tertiary structure. This causes denaturation — the active site changes shape so substrate can no longer bind. Denaturation is usually irreversible. Below optimum, activity is low because fewer molecules have sufficient kinetic energy; this is NOT denaturation — cooling slows enzymes but doesn't destroy them.`,concepts_tested:[`enzyme denaturation`,`optimum temperature`,`tertiary structure`,`kinetic energy`],formulas_used:[],common_trap:`Denaturation = irreversible change in shape. Cooling = reversible reduction in activity. Heating above optimum = irreversible denaturation.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00036`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Cofactors`,subtopic:`Cofactors`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Iron (Fe²⁺) is an essential cofactor for haemoglobin. In enzyme biology, a cofactor that is organic (non-protein) and tightly bound to the enzyme is called:`,options:[`A) A substrate`,`B) A coenzyme`,`C) A prosthetic group`,`D) An allosteric activator`,`E) An apoenzyme`],correct_index:2,explanation:`A prosthetic group is an organic cofactor that is permanently and tightly (covalently) bound to the enzyme. Examples include haem (iron-containing porphyrin ring) in catalase and peroxidase. A coenzyme is an organic cofactor that is loosely/temporarily bound (e.g. NAD⁺, FAD). An apoenzyme is the protein part of the enzyme without its cofactor. Holoenzyme = apoenzyme + cofactor.`,concepts_tested:[`cofactor`,`prosthetic group`,`coenzyme`,`apoenzyme`,`holoenzyme`],formulas_used:[],common_trap:`Prosthetic group = permanently bound, organic. Coenzyme = loosely bound, organic (e.g. NAD+). Inorganic cofactors (e.g. Mg²⁺, Zn²⁺) are just called cofactors or activators.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00037`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Enzyme Concentration`,subtopic:`Enzyme Concentration`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`If substrate is in excess and enzyme concentration is doubled, what happens to the initial rate of reaction?`,options:[`A) The rate halves`,`B) The rate stays the same because substrate is limiting`,`C) The rate approximately doubles`,`D) The rate increases by four times`,`E) The rate decreases because enzymes compete with each other`],correct_index:2,explanation:`When substrate is in EXCESS (non-limiting), every enzyme molecule has a substrate to work with. Doubling enzyme concentration doubles the number of active sites available, approximately doubling the rate of reaction. The relationship between enzyme concentration and reaction rate is directly proportional — provided substrate is not limiting.`,concepts_tested:[`enzyme concentration`,`reaction rate`,`limiting factor`,`excess substrate`],formulas_used:[],common_trap:`When substrate is LIMITING: adding more enzyme has NO effect (active sites are empty anyway). Always identify what is the limiting factor before predicting the outcome.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00038`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Allosteric Regulation`,subtopic:`Allosteric Regulation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`End-product (feedback) inhibition is an example of which type of enzyme regulation?`,options:[`A) Competitive inhibition`,`B) Irreversible inhibition`,`C) Allosteric regulation`,`D) Denaturation`,`E) pH-dependent inhibition`],correct_index:2,explanation:`In feedback (end-product) inhibition, the final product of a metabolic pathway binds to an allosteric site on an early enzyme in the pathway, inhibiting it and slowing production of more product. This is allosteric regulation — the inhibitor binds a site OTHER than the active site, causing a conformational change that reduces enzyme activity. This is a key mechanism for controlling metabolic pathways efficiently (e.g. ATP inhibiting phosphofructokinase in glycolysis).`,concepts_tested:[`allosteric regulation`,`feedback inhibition`,`metabolic pathway`,`non-competitive inhibition`],formulas_used:[],common_trap:`Feedback inhibition is NOT competitive — the product does not resemble the substrate and binds to a different (allosteric) site.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00039`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Michaelis-Menten`,subtopic:`Michaelis-Menten`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`In a Michaelis-Menten enzyme kinetics experiment, Km is the substrate concentration at which:`,options:[`A) The reaction rate is at its maximum (Vmax)`,`B) The reaction rate is zero`,`C) The reaction rate is half of Vmax`,`D) The enzyme is fully saturated`,`E) The enzyme is denatured`],correct_index:2,explanation:`Km (Michaelis constant) = the substrate concentration at which reaction rate = ½ Vmax. A LOW Km means the enzyme has HIGH affinity for its substrate (reaches half-max rate at low [S]). A HIGH Km means LOW affinity (needs lots of substrate). Km is also approximately equal to the dissociation constant of the enzyme-substrate complex when k₂ >> k₋₁.`,concepts_tested:[`Michaelis-Menten`,`Km`,`Vmax`,`enzyme affinity`,`substrate concentration`],formulas_used:[],common_trap:`Km is NOT the substrate concentration for Vmax — that requires saturating [S]. Km is specifically at HALF Vmax.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00040`,subject:`Biology`,chapter:`Ch4: Enzymes & Biological Reactions`,topic:`Enzyme Specificity`,subtopic:`Enzyme Specificity`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Why is enzyme specificity important in metabolic pathways?`,options:[`A) It allows enzymes to work at any temperature`,`B) It ensures each enzyme catalyses only specific reactions, preventing unwanted reactions`,`C) It allows multiple substrates to bind simultaneously to one enzyme`,`D) It prevents enzymes from being inhibited by any molecules`,`E) It allows enzymes to work without any cofactors`],correct_index:1,explanation:`Enzyme specificity ensures that each enzyme catalyses only one specific reaction (or a narrow group of related reactions). This prevents metabolic chaos — without specificity, enzymes would catalyse random reactions disrupting carefully regulated pathways. Specificity arises from the precise shape and chemical properties of the active site matching only certain substrates. This is essential for pathway regulation and cell homeostasis.`,concepts_tested:[`enzyme specificity`,`active site`,`metabolic regulation`,`substrate specificity`],formulas_used:[],common_trap:`Absolute specificity = one substrate only (e.g. urease → urea only). Group specificity = acts on similar molecules (e.g. lipases act on any ester bond).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00041`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Glycolysis`,subtopic:`Glycolysis`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Where does glycolysis take place in eukaryotic cells?`,options:[`A) Mitochondrial matrix`,`B) Inner mitochondrial membrane`,`C) Cytoplasm (cytosol)`,`D) Nucleus`,`E) Endoplasmic reticulum`],correct_index:2,explanation:`Glycolysis (splitting of glucose) takes place in the cytoplasm (cytosol) of ALL cells — both prokaryotic and eukaryotic. This is important: it means glycolysis can occur even without mitochondria. Glycolysis converts one glucose (6C) into two pyruvate (3C) molecules, producing a net gain of 2 ATP and 2 NADH. No oxygen is required for glycolysis.`,concepts_tested:[`glycolysis`,`cytoplasm`,`cytosol`,`pyruvate`,`ATP`],formulas_used:[],common_trap:`Glycolysis is the ONLY stage of respiration that occurs in the cytoplasm. All other aerobic stages occur in the mitochondria. Prokaryotes rely on glycolysis because they have no mitochondria.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00042`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`ATP yield`,subtopic:`ATP yield`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The complete aerobic oxidation of one glucose molecule theoretically yields approximately how many ATP molecules?`,options:[`A) 2 ATP`,`B) 4 ATP`,`C) 15 ATP`,`D) 30-32 ATP`,`E) 100 ATP`],correct_index:3,explanation:`The theoretical maximum yield from aerobic respiration of one glucose is approximately 30-32 ATP (updated from the older value of 36-38). This comes from: Glycolysis: 2 ATP (net) + 2 NADH. Pyruvate oxidation: 2 NADH. Krebs cycle: 2 ATP + 6 NADH + 2 FADH₂. Oxidative phosphorylation: ~26 ATP from NADH and FADH₂ via ETC and chemiosmosis. Anaerobic respiration yields only 2 ATP.`,concepts_tested:[`ATP yield`,`aerobic respiration`,`oxidative phosphorylation`,`glucose`],formulas_used:[],common_trap:`The older textbook value is 36-38 ATP. The modern accepted value is 30-32 ATP due to the actual P/O ratio of the mitochondria. IMAT uses ~30-36 range.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00043`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Krebs Cycle`,subtopic:`Krebs Cycle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The Krebs cycle produces which of the following per acetyl-CoA molecule entering?

1. 2 CO₂
2. 3 NADH
3. 1 FADH₂
4. 1 ATP (or GTP)`,options:[`A) 1 and 2 only`,`B) 1, 2 and 4 only`,`C) 1, 2, 3 and 4`,`D) 2 and 3 only`,`E) 1 and 4 only`],correct_index:2,explanation:`Per turn of the Krebs cycle (per acetyl-CoA = 2 carbons): 2 CO₂ released (carbon atoms from acetyl group), 3 NADH produced, 1 FADH₂ produced, 1 ATP or GTP produced (substrate-level phosphorylation). Since one glucose produces 2 pyruvate → 2 acetyl-CoA, the cycle turns TWICE per glucose: total 4 CO₂, 6 NADH, 2 FADH₂, 2 ATP from Krebs.`,concepts_tested:[`Krebs cycle`,`acetyl-CoA`,`NADH`,`FADH2`,`CO2`,`ATP`],formulas_used:[],common_trap:`The Krebs cycle runs TWICE per glucose (once per pyruvate). Always distinguish: per acetyl-CoA (one turn) vs per glucose (two turns).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00044`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`ETC`,subtopic:`ETC`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the electron transport chain (ETC), what is the FINAL electron acceptor?`,options:[`A) NAD⁺`,`B) FAD`,`C) Oxygen (O₂)`,`D) Carbon dioxide`,`E) Water`],correct_index:2,explanation:`In aerobic respiration, oxygen is the final electron acceptor in the electron transport chain. At Complex IV (cytochrome c oxidase), oxygen accepts electrons from the chain and combines with protons (H⁺) to form water: O₂ + 4H⁺ + 4e⁻ → 2H₂O. This is why aerobic respiration requires oxygen — without it, electrons cannot be passed along the chain, the proton gradient collapses, and ATP synthesis stops.`,concepts_tested:[`electron transport chain`,`oxygen`,`final electron acceptor`,`Complex IV`,`water`],formulas_used:[],common_trap:`In anaerobic respiration, alternative final electron acceptors are used (e.g. pyruvate → lactate in humans, or acetaldehyde → ethanol in yeast). These have much lower ATP yields.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00045`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Chemiosmosis`,subtopic:`Chemiosmosis`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`In oxidative phosphorylation, ATP is synthesised by ATP synthase using:`,options:[`A) Electrons directly from NADH`,`B) The proton (H⁺) gradient across the inner mitochondrial membrane`,`C) Substrate-level phosphorylation in the matrix`,`D) The electron gradient across the outer mitochondrial membrane`,`E) CO₂ released from the Krebs cycle`],correct_index:1,explanation:`ATP synthase (Complex V) uses the proton motive force — the electrochemical gradient of H⁺ ions built up across the inner mitochondrial membrane by complexes I, III, and IV. As H⁺ ions flow BACK into the matrix through ATP synthase (down their gradient), the rotation of the F₀ subunit drives ATP synthesis in the F₁ subunit. This process is called chemiosmosis (Mitchell's chemiosmotic theory).`,concepts_tested:[`chemiosmosis`,`ATP synthase`,`proton gradient`,`inner mitochondrial membrane`,`oxidative phosphorylation`],formulas_used:[],common_trap:`Substrate-level phosphorylation (in glycolysis and Krebs) is DIRECT ATP synthesis — not involving the proton gradient. Chemiosmosis (oxidative phosphorylation) is INDIRECT — using the proton gradient.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00046`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Anaerobic Respiration`,subtopic:`Anaerobic Respiration`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`In human muscle cells during intense exercise, anaerobic respiration produces:`,options:[`A) Ethanol and CO₂`,`B) Pyruvate and oxygen`,`C) Lactate (lactic acid)`,`D) Acetyl-CoA and NADH`,`E) Water and CO₂`],correct_index:2,explanation:`In human muscle cells under anaerobic conditions (insufficient O₂), pyruvate is converted to lactate by lactate dehydrogenase. This regenerates NAD⁺ from NADH, allowing glycolysis to continue producing 2 ATP. Lactate is later transported to the liver where it is converted back to glucose (Cori cycle). Ethanol + CO₂ is the product in YEAST (alcoholic fermentation), not in human cells.`,concepts_tested:[`anaerobic respiration`,`lactate`,`fermentation`,`NAD regeneration`,`muscle`],formulas_used:[],common_trap:`Animals = lactate fermentation. Yeast/plants = alcoholic fermentation (ethanol + CO₂). This is a very common confusion.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00047`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Pyruvate Decarboxylation`,subtopic:`Pyruvate Decarboxylation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What happens to pyruvate BEFORE it enters the Krebs cycle?`,options:[`A) It is converted to glucose by gluconeogenesis`,`B) It is converted to acetyl-CoA in the mitochondrial matrix, releasing CO₂`,`C) It is converted to acetyl-CoA in the cytoplasm, releasing O₂`,`D) It enters the ETC directly as an electron donor`,`E) It is broken down to 3 CO₂ in the cytoplasm`],correct_index:1,explanation:`Pyruvate (3C) is transported from the cytoplasm into the mitochondrial matrix. There, the pyruvate dehydrogenase complex converts each pyruvate to: acetyl-CoA (2C) + CO₂ + NADH. This is the 'link reaction' or pyruvate oxidation/decarboxylation step. Since one glucose produces 2 pyruvate, this step releases 2 CO₂ and 2 NADH per glucose.`,concepts_tested:[`pyruvate decarboxylation`,`acetyl-CoA`,`link reaction`,`mitochondrial matrix`,`CO2`],formulas_used:[],common_trap:`This 'link reaction' occurs in the mitochondrial MATRIX — NOT in the cytoplasm. It produces CO₂, not O₂. Acetyl-CoA (2C) then enters the Krebs cycle.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00048`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Respiratory Quotient`,subtopic:`Respiratory Quotient`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`The respiratory quotient (RQ) for glucose is:`,options:[`A) 0.7`,`B) 0.85`,`C) 1.0`,`D) 1.4`,`E) 2.0`],correct_index:2,explanation:`RQ = CO₂ produced / O₂ consumed. For glucose (C₆H₁₂O₆): C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O. RQ = 6CO₂/6O₂ = 1.0. For fats (more C and H, less O per carbon): RQ ≈ 0.7. For proteins: RQ ≈ 0.85. RQ > 1 indicates anaerobic respiration or lipogenesis. RQ = 1 indicates pure carbohydrate use.`,concepts_tested:[`respiratory quotient`,`RQ`,`carbohydrates`,`fats`,`aerobic respiration`],formulas_used:[],common_trap:`RQ for carbs = 1.0. Fats = 0.7 (fats need more O₂ per carbon as they are more reduced). A mixed diet gives RQ ≈ 0.85.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00049`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`NAD and FAD`,subtopic:`NAD and FAD`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the role of NAD⁺ in cellular respiration?`,options:[`A) It directly synthesises ATP`,`B) It acts as an electron carrier, accepting electrons and H⁺ to become NADH`,`C) It is the final electron acceptor in the ETC`,`D) It provides the proton gradient for ATP synthesis`,`E) It splits water during the light reactions`],correct_index:1,explanation:`NAD⁺ (nicotinamide adenine dinucleotide) is an electron carrier. In glycolysis and the Krebs cycle, NAD⁺ accepts 2 electrons and 1 H⁺ to become NADH. NADH then carries these electrons to Complex I of the ETC, where they are passed down the chain. The energy released drives proton pumping. FADH₂ (from FADH reduced at Complex II) carries electrons to Complex II. These carriers are crucial for linking substrate oxidation to ATP synthesis.`,concepts_tested:[`NAD+`,`NADH`,`electron carrier`,`ETC`,`glycolysis`,`Krebs cycle`],formulas_used:[],common_trap:`NAD⁺ does NOT make ATP — it only carries electrons to the ETC where ATP is made. NADH yields ~2.5 ATP; FADH₂ yields ~1.5 ATP via the ETC.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00050`,subject:`Biology`,chapter:`Ch5: Cellular Respiration`,topic:`Substrate Level`,subtopic:`Substrate Level`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Substrate-level phosphorylation occurs in:`,options:[`A) The electron transport chain only`,`B) Glycolysis and the Krebs cycle`,`C) Oxidative phosphorylation only`,`D) The mitochondrial inner membrane only`,`E) The thylakoid membrane`],correct_index:1,explanation:`Substrate-level phosphorylation is the direct transfer of a phosphate group from a phosphorylated substrate to ADP to form ATP — no proton gradient needed. It occurs in: glycolysis (net 2 ATP) and the Krebs cycle (1 GTP/ATP per turn). Oxidative phosphorylation (using the proton gradient and ATP synthase) is the other mechanism, producing the majority of ATP.`,concepts_tested:[`substrate-level phosphorylation`,`glycolysis`,`Krebs cycle`,`ATP synthesis`],formulas_used:[],common_trap:`Substrate-level = direct phosphate transfer, no proton gradient. Oxidative = uses proton gradient (chemiosmosis). Both produce ATP but by completely different mechanisms.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00051`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Light Reactions`,subtopic:`Light Reactions`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following products of the light-dependent reactions are used in the Calvin cycle?`,options:[`A) O₂ and CO₂`,`B) Glucose and water`,`C) ATP and NADPH`,`D) ADP and NADP⁺`,`E) Chlorophyll and water`],correct_index:2,explanation:`The light-dependent reactions produce: ATP (via photophosphorylation), NADPH (reduced NADP⁺), and O₂ (from water splitting). ATP and NADPH are then used in the Calvin cycle (light-independent reactions) to fix CO₂ into G3P (glyceraldehyde-3-phosphate), which is used to make glucose. O₂ is released as a waste product.`,concepts_tested:[`light-dependent reactions`,`ATP`,`NADPH`,`Calvin cycle`,`photosynthesis`],formulas_used:[],common_trap:`ADP and NADP⁺ are the USED forms — they are regenerated after use in Calvin. ATP and NADPH are the products used BY the Calvin cycle.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00052`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Photosystems`,subtopic:`Photosystems`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the Z-scheme of photosynthesis, which photosystem is responsible for splitting water?`,options:[`A) Photosystem I (PSI)`,`B) Photosystem II (PSII)`,`C) Both PSI and PSII equally`,`D) Neither — water is split in the stroma`,`E) The ATP synthase complex`],correct_index:1,explanation:`Photosystem II (PSII) — despite being named 'II', it operates FIRST in the Z-scheme. It absorbs light at ~680nm and uses this energy to split water (photolysis): 2H₂O → 4H⁺ + 4e⁻ + O₂. The electrons replace those lost from the PSII reaction centre. PSI (absorbs at ~700nm) operates second and reduces NADP⁺ to NADPH. The name PSII/PSI refers to the order of discovery, not operation.`,concepts_tested:[`photosystem II`,`water splitting`,`photolysis`,`Z-scheme`,`PSII`],formulas_used:[],common_trap:`PSII splits water and comes FIRST operationally. PSI reduces NADP⁺ and comes second. The naming is confusing but critical.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00053`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Calvin Cycle`,subtopic:`Calvin Cycle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the Calvin cycle, which molecule acts as the primary CO₂ acceptor?`,options:[`A) G3P (glyceraldehyde-3-phosphate)`,`B) RuBP (ribulose bisphosphate)`,`C) PGA (phosphoglycerate)`,`D) Glucose`,`E) NADPH`],correct_index:1,explanation:`RuBP (ribulose-1,5-bisphosphate), a 5-carbon molecule, is the primary CO₂ acceptor. The enzyme RuBisCO (ribulose bisphosphate carboxylase/oxygenase) catalyses the fixation of CO₂ onto RuBP, producing a 6-carbon unstable intermediate that immediately splits into two 3-carbon PGA (3-phosphoglycerate) molecules. G3P is the final product of the reduction stage (using ATP and NADPH).`,concepts_tested:[`Calvin cycle`,`RuBP`,`RuBisCO`,`CO2 fixation`,`carbon fixation`],formulas_used:[],common_trap:`RuBP is the acceptor. RuBisCO is the enzyme. PGA is the immediate product. G3P is the usable end product. These are often confused in exam questions.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00054`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Photosynthesis Equation`,subtopic:`Photosynthesis Equation`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The overall equation for photosynthesis is:`,options:[`A) C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP`,`B) 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂`,`C) 6CO₂ + 12H₂O → C₆H₁₂O₆ + 6O₂ + 6H₂O`,`D) CO₂ + H₂O → glucose + oxygen`,`E) 6CO₂ + 6H₂O + O₂ → C₆H₁₂O₆`],correct_index:2,explanation:`The correct overall equation is: 6CO₂ + 12H₂O → C₆H₁₂O₆ + 6O₂ + 6H₂O (or simplified: 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂). The more complete equation with 12H₂O clarifies that ALL oxygen released comes from WATER splitting (not CO₂), demonstrated by ¹⁸O isotope experiments. Option B is the simplified and most commonly used version.`,concepts_tested:[`photosynthesis equation`,`CO2 fixation`,`oxygen release`,`water splitting`],formulas_used:[],common_trap:`A is the equation for RESPIRATION (reversed). The oxygen released in photosynthesis comes from WATER, not CO₂ — proved by isotope labelling.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00055`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Chlorophyll`,subtopic:`Chlorophyll`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which colour of light is LEAST absorbed by chlorophyll a?`,options:[`A) Red`,`B) Blue-violet`,`C) Green`,`D) Blue`,`E) Orange`],correct_index:2,explanation:`Chlorophyll a absorbs light mainly in the RED (660–700nm) and BLUE-VIOLET (~430nm) regions of the spectrum. Green light (~550nm) is LEAST absorbed and instead REFLECTED — this is why plants appear green to our eyes. Chlorophyll b extends absorption to other wavelengths. Carotenoids absorb blue-green and reflect yellow-orange.`,concepts_tested:[`chlorophyll`,`light absorption`,`green light`,`photosynthesis`,`pigments`],formulas_used:[],common_trap:`Plants are green BECAUSE chlorophyll reflects green light. If chlorophyll absorbed all wavelengths equally, plants would appear black.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00056`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Limiting Factors`,subtopic:`Limiting Factors`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A plant is photosynthesising at maximum rate. Which change would MOST likely increase the rate further?`,options:[`A) Increasing light intensity`,`B) Increasing CO₂ concentration`,`C) Increasing O₂ concentration`,`D) Decreasing temperature`,`E) Decreasing water availability`],correct_index:1,explanation:`At maximum rate, some factor is limiting. If light is already at maximum, increasing light won't help. CO₂ is often the limiting factor even when light is saturating because RuBisCO needs CO₂ for carbon fixation. Increasing CO₂ from atmospheric levels (~0.04%) typically increases photosynthesis rate in C3 plants. Increasing O₂ competes with CO₂ at RuBisCO (photorespiration), reducing efficiency.`,concepts_tested:[`limiting factors`,`photosynthesis rate`,`CO2`,`light intensity`,`temperature`],formulas_used:[],common_trap:`The three main limiting factors of photosynthesis: light intensity, CO₂ concentration, temperature. At any given moment, ONE factor is most limiting.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00057`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Photophosphorylation`,subtopic:`Photophosphorylation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which process generates ATP during the light-dependent reactions of photosynthesis?`,options:[`A) Substrate-level phosphorylation`,`B) Photophosphorylation via ATP synthase using the proton gradient`,`C) The Calvin cycle using NADPH`,`D) Glycolysis in the chloroplast stroma`,`E) Fermentation in the absence of light`],correct_index:1,explanation:`Photophosphorylation is the synthesis of ATP using the proton gradient generated by the ETC in the thylakoid membrane. Light energy drives electron transport through complexes (including plastoquinone, cytochrome b6f, and plastocyanin), pumping H⁺ into the thylakoid lumen. H⁺ flows back through ATP synthase (in thylakoid membrane) → ATP synthesis. This parallels oxidative phosphorylation in mitochondria.`,concepts_tested:[`photophosphorylation`,`ATP synthase`,`proton gradient`,`thylakoid`,`light reactions`],formulas_used:[],common_trap:`Photophosphorylation (in thylakoids) parallels oxidative phosphorylation (in mitochondria). Both use a proton gradient + ATP synthase. Same mechanism, different membranes.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00058`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`C3 vs C4`,subtopic:`C3 vs C4`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`C4 plants (e.g. maize) are more efficient than C3 plants (e.g. wheat) in hot, dry conditions because:`,options:[`A) They do not require CO₂ for photosynthesis`,`B) They have a CO₂ concentrating mechanism that reduces photorespiration`,`C) They perform the Calvin cycle twice for each CO₂ fixed`,`D) Their chloroplasts are located in the root cells`,`E) They produce more ATP per glucose than C3 plants`],correct_index:1,explanation:`C4 plants have a specialised anatomy (bundle sheath + mesophyll cells) and a two-stage carbon fixation: CO₂ is first fixed into oxaloacetate (4C) in mesophyll cells using PEP carboxylase (which has high CO₂ affinity). This 4C molecule is transported to bundle sheath cells where it releases CO₂ at high concentration. This concentrates CO₂ around RuBisCO, suppressing photorespiration (where RuBisCO wastes energy by fixing O₂ instead of CO₂ in hot conditions).`,concepts_tested:[`C4 plants`,`photorespiration`,`PEP carboxylase`,`CO2 concentrating mechanism`],formulas_used:[],common_trap:`In hot, dry conditions, plants close stomata to save water → CO₂ drops → RuBisCO fixes O₂ (photorespiration) → wasted energy. C4 plants avoid this by concentrating CO₂.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00059`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Electron Transport Chain`,subtopic:`Electron Transport Chain`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the light-dependent reactions, electrons to replace those lost from Photosystem II come from:`,options:[`A) CO₂`,`B) NADPH`,`C) Water`,`D) G3P`,`E) Glucose`],correct_index:2,explanation:`PSII is activated by light and loses electrons (which become excited and are passed to the ETC). These lost electrons must be replaced. They come from the photolysis (splitting) of water: 2H₂O → 4H⁺ + 4e⁻ + O₂. The electrons replace those in PSII, the protons contribute to the gradient for ATP synthesis, and O₂ is released. This is why light and water are both required for photosynthesis.`,concepts_tested:[`photolysis`,`water splitting`,`PSII`,`electron donor`,`oxygen`],formulas_used:[],common_trap:`The O₂ we breathe is a byproduct of water splitting — not from CO₂. This was proven with ¹⁸O isotope experiments.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00060`,subject:`Biology`,chapter:`Ch6: Photosynthesis`,topic:`Stroma`,subtopic:`Stroma`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The enzyme RuBisCO, responsible for carbon fixation in the Calvin cycle, is located in the:`,options:[`A) Thylakoid membrane`,`B) Thylakoid lumen`,`C) Stroma of the chloroplast`,`D) Outer chloroplast membrane`,`E) Cytoplasm of the leaf cell`],correct_index:2,explanation:`RuBisCO (ribulose-1,5-bisphosphate carboxylase-oxygenase) is the most abundant enzyme on Earth and is located in the stroma of the chloroplast, where the Calvin cycle occurs. It catalyses the carboxylation of RuBP with CO₂. The stroma is the aqueous compartment surrounding the thylakoids, analogous to the mitochondrial matrix.`,concepts_tested:[`RuBisCO`,`stroma`,`chloroplast`,`carbon fixation`,`Calvin cycle`],formulas_used:[],common_trap:`Thylakoid membrane = light reactions. Stroma = Calvin cycle (and RuBisCO). This location distinction is frequently tested.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00061`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`DNA Structure`,subtopic:`DNA Structure`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`In a DNA double helix, adenine always pairs with:`,options:[`A) Cytosine`,`B) Guanine`,`C) Thymine`,`D) Uracil`,`E) Adenine`],correct_index:2,explanation:`In DNA, base pairing follows Chargaff's rules: Adenine (A) pairs with Thymine (T) via 2 hydrogen bonds; Guanine (G) pairs with Cytosine (C) via 3 hydrogen bonds. This complementary base pairing is the basis of DNA replication, transcription, and all molecular biology. In RNA, Uracil (U) replaces Thymine and pairs with Adenine.`,concepts_tested:[`DNA`,`base pairing`,`Chargaff's rules`,`complementary bases`],formulas_used:[],common_trap:`Uracil replaces Thymine ONLY in RNA — not in DNA. A-T (2 H-bonds), G-C (3 H-bonds). G-C pairs are stronger (more H-bonds).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00062`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`mRNA`,subtopic:`mRNA`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is transcribed from a DNA template and carries genetic information to the ribosome?`,options:[`A) tRNA`,`B) rRNA`,`C) mRNA`,`D) snRNA`,`E) miRNA`],correct_index:2,explanation:`mRNA (messenger RNA) is transcribed from a DNA template by RNA polymerase. It carries the genetic code (codons) from the nucleus to ribosomes in the cytoplasm, where it is translated into protein. tRNA (transfer RNA) brings amino acids to the ribosome. rRNA (ribosomal RNA) is a structural/catalytic component of ribosomes. snRNA functions in pre-mRNA splicing.`,concepts_tested:[`mRNA`,`transcription`,`genetic code`,`RNA types`],formul
