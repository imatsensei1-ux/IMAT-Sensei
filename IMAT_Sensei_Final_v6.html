as_used:[],common_trap:`All three major RNAs — mRNA, tRNA, rRNA — are needed for translation, but only mRNA carries the genetic code for a specific protein.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00063`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`Genetic Code`,subtopic:`Genetic Code`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following statements about the genetic code is correct?`,options:[`A) It is ambiguous — one codon can code for multiple amino acids`,`B) It is non-degenerate — one amino acid has only one codon`,`C) It is degenerate — multiple codons can code for the same amino acid`,`D) It is not universal — every organism uses a different code`,`E) Codons consist of two nucleotides`],correct_index:2,explanation:`The genetic code is: (1) degenerate/redundant — most amino acids are encoded by more than one codon (e.g. leucine has 6 codons); (2) non-ambiguous — each codon codes for ONLY ONE amino acid; (3) nearly universal — the same codons specify the same amino acids in almost all organisms; (4) triplet — each codon = 3 nucleotides. There are 64 codons total (4³) for 20 amino acids + 3 stop codons.`,concepts_tested:[`genetic code`,`codons`,`degenerate`,`triplet code`,`universality`],formulas_used:[],common_trap:`Degenerate ≠ ambiguous. Degenerate: multiple codons → same amino acid (OK). Ambiguous: one codon → multiple amino acids (this does NOT happen).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00064`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`Transcription`,subtopic:`Transcription`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`During transcription, RNA polymerase reads the DNA template strand in which direction?`,options:[`A) 5' to 3'`,`B) 3' to 5'`,`C) Both directions simultaneously`,`D) From the centromere outward`,`E) Direction depends on the organism`],correct_index:1,explanation:`RNA polymerase reads the DNA template strand in the 3' → 5' direction, synthesising the new mRNA strand in the 5' → 3' direction (RNA is always synthesised 5' to 3'). The non-template strand (coding strand/sense strand) has the same sequence as the mRNA (with T replaced by U). In eukaryotes, transcription occurs in the nucleus; the pre-mRNA is then processed (capping, polyadenylation, splicing) before export.`,concepts_tested:[`transcription`,`RNA polymerase`,`template strand`,`5 to 3 direction`,`mRNA synthesis`],formulas_used:[],common_trap:`RNA is always built 5'→3'. So the template is read 3'→5'. The mRNA sequence matches the NON-template (coding) strand, with U instead of T.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00065`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`Translation`,subtopic:`Translation`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the role of tRNA in translation?`,options:[`A) It carries genetic code from nucleus to ribosome`,`B) It forms the structural scaffold of the ribosome`,`C) It carries specific amino acids to the ribosome, matched by anticodon to mRNA codon`,`D) It catalyses peptide bond formation`,`E) It splices introns from pre-mRNA`],correct_index:2,explanation:`tRNA (transfer RNA) has two key regions: (1) the anticodon loop (3 nucleotides complementary to the mRNA codon), and (2) the 3' CCA end where a specific amino acid is attached by aminoacyl-tRNA synthetase. Each tRNA anticodon base-pairs with the complementary mRNA codon in the ribosomal A site, delivering the correct amino acid for peptide bond formation.`,concepts_tested:[`tRNA`,`anticodon`,`translation`,`amino acid delivery`,`codon`],formulas_used:[],common_trap:`Peptide bond formation is catalysed by peptidyl transferase activity of the 23S rRNA (in prokaryotes) — a ribozyme. The ribosome itself is the catalyst, not tRNA.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00066`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`Codons`,subtopic:`Codons`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`How many nucleotides make up one codon?`,options:[`A) 1`,`B) 2`,`C) 3`,`D) 4`,`E) 6`],correct_index:2,explanation:`A codon consists of 3 consecutive nucleotides (a triplet) on the mRNA. With 4 possible nucleotides (A, U, G, C) and 3 positions, there are 4³ = 64 possible codons. 61 codons specify amino acids; 3 are stop codons (UAA, UAG, UGA). The start codon (AUG) codes for methionine and signals the beginning of translation.`,concepts_tested:[`codon`,`triplet code`,`nucleotides`,`genetic code`],formulas_used:[],common_trap:`4¹=4 (too few for 20 amino acids). 4²=16 (still too few). 4³=64 (enough for 20 AAs + stop codons). That's why the triplet code evolved.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00067`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`mRNA Processing`,subtopic:`mRNA Processing`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In eukaryotes, which of the following mRNA modifications occurs in the nucleus BEFORE export to the cytoplasm?

1. Addition of a 5' methylguanosine cap
2. Addition of a poly-A tail at the 3' end
3. Removal of introns by splicing`,options:[`A) 1 only`,`B) 1 and 2 only`,`C) 1 and 3 only`,`D) 1, 2 and 3`,`E) 3 only`],correct_index:3,explanation:`All three modifications are pre-mRNA processing steps in the nucleus: (1) 5' cap (7-methylguanosine) — protects mRNA from degradation and helps ribosome binding; (2) Poly-A tail (~200 adenine nucleotides) — protects from 3' degradation and aids nuclear export; (3) Splicing — spliceosome removes introns (non-coding) and joins exons (coding sequences). The mature mRNA is then exported to the cytoplasm for translation.`,concepts_tested:[`mRNA processing`,`5 cap`,`poly-A tail`,`splicing`,`introns`,`exons`],formulas_used:[],common_trap:`Prokaryotes do NOT process mRNA — they have no introns and translation can start while transcription is still ongoing (coupled transcription-translation).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00068`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`Central Dogma`,subtopic:`Central Dogma`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The central dogma of molecular biology states that information flows:`,options:[`A) Protein → RNA → DNA`,`B) RNA → DNA → Protein`,`C) DNA → RNA → Protein`,`D) Protein → DNA → RNA`,`E) DNA → Protein → RNA`],correct_index:2,explanation:`The central dogma (Crick, 1958): DNA → RNA → Protein. DNA is transcribed into mRNA (transcription), and mRNA is translated into protein (translation). Additionally, RNA can be reverse-transcribed into DNA by reverse transcriptase (retroviruses like HIV). DNA can also be replicated (DNA → DNA). Information flow from protein back to nucleic acid does not occur normally.`,concepts_tested:[`central dogma`,`transcription`,`translation`,`DNA to RNA to protein`],formulas_used:[],common_trap:`Reverse transcriptase (in retroviruses) allows RNA → DNA, which is an exception to the simple central dogma. But protein → nucleic acid does NOT occur.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00069`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`RNA Polymerase`,subtopic:`RNA Polymerase`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which statement about RNA polymerase is correct?`,options:[`A) It requires a primer to begin synthesis`,`B) It synthesises RNA in the 3' to 5' direction`,`C) It unwinds DNA and synthesises a complementary RNA strand without a primer`,`D) It proofreads with the same efficiency as DNA polymerase`,`E) It only functions in prokaryotes`],correct_index:2,explanation:`Unlike DNA polymerase, RNA polymerase does NOT need a primer — it can initiate synthesis de novo by binding to the promoter sequence. It unwinds the DNA double helix and synthesises RNA 5'→3' by reading the template 3'→5'. RNA polymerase has lower proofreading ability than DNA polymerase. Eukaryotes have three RNA polymerases: Pol I (rRNA), Pol II (mRNA), Pol III (tRNA).`,concepts_tested:[`RNA polymerase`,`transcription`,`primer`,`promoter`],formulas_used:[],common_trap:`DNA polymerase NEEDS a primer. RNA polymerase does NOT — this is an important distinction.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00070`,subject:`Biology`,chapter:`Ch7: DNA, RNA & Central Dogma`,topic:`Wobble Hypothesis`,subtopic:`Wobble Hypothesis`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`The wobble hypothesis (Crick) explains why:`,options:[`A) The genetic code has 64 codons but only 20 amino acids`,`B) A single tRNA can recognise more than one codon due to flexibility at the anticodon 3rd position`,`C) Stop codons do not have corresponding tRNAs`,`D) AUG is the universal start codon`,`E) RNA polymerase does not need a primer`],correct_index:1,explanation:`The wobble hypothesis states that the base at position 1 of the tRNA anticodon (corresponding to position 3 of the mRNA codon) can form non-Watson-Crick base pairs. This wobble pairing allows a single tRNA molecule to recognise 2-4 different codons (those that differ only at the 3rd 'wobble' position). This explains why fewer than 61 tRNA molecules are needed to decode all 61 sense codons.`,concepts_tested:[`wobble hypothesis`,`tRNA`,`anticodon`,`degenerate code`,`codon recognition`],formulas_used:[],common_trap:`The wobble position is the 3rd nucleotide of the CODON (= 1st nucleotide of the anticodon). The 1st and 2nd codon positions base-pair normally (no wobble).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00071`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Semiconservative`,subtopic:`Semiconservative`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`DNA replication is described as 'semiconservative' because:`,options:[`A) Only half of the DNA is replicated`,`B) Each new DNA molecule consists of one original strand and one new strand`,`C) The two new DNA molecules are completely new`,`D) The original DNA is conserved unchanged`,`E) Only coding regions are replicated`],correct_index:1,explanation:`Semiconservative replication (Meselson-Stahl, 1958): each of the two daughter DNA molecules contains one original (parental) strand and one newly synthesised strand. The two strands of the original helix are separated and each serves as a template. Conservative replication (rejected) would produce one fully original + one fully new. Dispersive replication (rejected) would produce hybrids throughout.`,concepts_tested:[`semiconservative replication`,`Meselson-Stahl`,`DNA replication`,`template strand`],formulas_used:[],common_trap:`The Meselson-Stahl experiment using ¹⁵N/¹⁴N labelling proved semiconservative replication. This is the most important experiment in molecular biology.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00072`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`DNA Polymerase`,subtopic:`DNA Polymerase`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`DNA polymerase can only synthesise new DNA in which direction?`,options:[`A) 3' to 5'`,`B) 5' to 3'`,`C) Both directions`,`D) Either direction depending on the template`,`E) From the centromere outward`],correct_index:1,explanation:`DNA polymerase can ONLY add nucleotides to the 3' end of a growing chain — it synthesises in the 5'→3' direction. This means it reads the template 3'→5'. This directionality creates a problem at the replication fork: one strand (leading strand) can be synthesised continuously in the same direction as fork movement, while the other (lagging strand) must be synthesised discontinuously as Okazaki fragments.`,concepts_tested:[`DNA polymerase`,`5 to 3 direction`,`Okazaki fragments`,`leading strand`,`lagging strand`],formulas_used:[],common_trap:`DNA polymerase: synthesises 5'→3', reads template 3'→5'. It CANNOT start without a primer. It CAN proofread (3'→5' exonuclease activity).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00073`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Primers`,subtopic:`Primers`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Why is an RNA primer necessary for DNA replication?`,options:[`A) It provides energy for the replication process`,`B) DNA polymerase cannot initiate a new chain — it can only extend an existing one`,`C) It prevents the DNA strands from re-annealing`,`D) It provides the template for the new DNA strand`,`E) It removes supercoiling ahead of the replication fork`],correct_index:1,explanation:`DNA polymerase III (in prokaryotes) or DNA polymerase α (in eukaryotes) can ONLY add nucleotides to an existing 3'-OH group — it cannot start a new chain from scratch. Primase (an RNA polymerase) synthesises a short RNA primer (~10 nucleotides) complementary to the template, providing the 3'-OH needed for DNA polymerase to extend. The RNA primer is later removed and replaced with DNA.`,concepts_tested:[`primer`,`primase`,`DNA polymerase`,`3-OH`,`replication initiation`],formulas_used:[],common_trap:`Primase makes RNA primers because RNA polymerase can start without a pre-existing 3'-OH. DNA polymerase cannot. This is a fundamental biochemical constraint.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00074`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Helicase`,subtopic:`Helicase`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which enzyme unwinds the DNA double helix at the replication fork?`,options:[`A) DNA polymerase`,`B) Ligase`,`C) Helicase`,`D) Primase`,`E) Topoisomerase`],correct_index:2,explanation:`Helicase breaks the hydrogen bonds between complementary base pairs and unwinds the double helix at the replication fork, separating the two template strands. Single-strand binding proteins (SSBPs) stabilise the separated strands. Topoisomerase relieves the tension (supercoiling) created ahead of the fork. Primase synthesises RNA primers. DNA polymerase extends the new strands. Ligase joins Okazaki fragments.`,concepts_tested:[`helicase`,`replication fork`,`DNA unwinding`,`hydrogen bonds`],formulas_used:[],common_trap:`Helicase = opens/unwinds helix. Topoisomerase = relieves supercoiling tension. These are different enzymes doing different jobs at the replication fork.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00075`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Okazaki Fragments`,subtopic:`Okazaki Fragments`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Okazaki fragments are:`,options:[`A) Short DNA sequences that form the leading strand`,`B) Short DNA sequences synthesised discontinuously on the lagging strand`,`C) RNA primers left in the final DNA`,`D) Damaged DNA segments removed by repair enzymes`,`E) Telomere sequences at chromosome ends`],correct_index:1,explanation:`Because DNA polymerase can only synthesise 5'→3', and the lagging strand template runs 5'→3' away from the fork, the lagging strand must be synthesised in short fragments called Okazaki fragments (~100-200 nucleotides in eukaryotes, ~1000-2000 in prokaryotes). Each fragment starts with an RNA primer. Later, the primers are removed, gaps filled by DNA polymerase, and fragments joined by DNA ligase.`,concepts_tested:[`Okazaki fragments`,`lagging strand`,`discontinuous replication`,`DNA ligase`],formulas_used:[],common_trap:`The leading strand is synthesised continuously. The lagging strand is synthesised as discontinuous Okazaki fragments. This asymmetry is because DNA pol can only go 5'→3'.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00076`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Telomeres`,subtopic:`Telomeres`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Why do linear eukaryotic chromosomes shorten with each round of replication?`,options:[`A) Helicase removes bases from the ends`,`B) RNA primers at the 5' end of the lagging strand cannot be replaced with DNA`,`C) Topoisomerase cuts the chromosome ends`,`D) DNA polymerase digests the 3' ends`,`E) Histones prevent replication at chromosome ends`],correct_index:1,explanation:`At the end of the lagging strand, the terminal RNA primer is removed, but DNA polymerase cannot fill the gap — there is no upstream 3'-OH to extend. This leaves a short single-stranded 3' overhang and the chromosome is shortened by one Okazaki fragment length each replication. Telomeres (TTAGGG repeats) buffer against loss of coding sequences. Telomerase (reverse transcriptase + RNA template) extends telomeres in germ cells and cancer cells.`,concepts_tested:[`telomeres`,`end-replication problem`,`telomerase`,`chromosome shortening`,`ageing`],formulas_used:[],common_trap:`This 'end-replication problem' is why somatic cells age — telomeres shorten with each division. Telomerase maintains telomere length in stem/germ cells and is overactive in cancer.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00077`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`DNA Ligase`,subtopic:`DNA Ligase`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`What is the function of DNA ligase in DNA replication?`,options:[`A) It synthesises new DNA strands`,`B) It joins Okazaki fragments by forming phosphodiester bonds`,`C) It removes RNA primers from the lagging strand`,`D) It unwinds the DNA double helix`,`E) It proofreads for replication errors`],correct_index:1,explanation:`DNA ligase seals the nick between adjacent Okazaki fragments (after the RNA primer has been removed and the gap filled by DNA polymerase) by forming a phosphodiester bond between the 3'-OH of one fragment and the 5'-phosphate of the next. This creates a continuous lagging strand. Ligase also functions in DNA repair.`,concepts_tested:[`DNA ligase`,`Okazaki fragments`,`phosphodiester bond`,`lagging strand`],formulas_used:[],common_trap:`Ligase JOINS fragments — it does not synthesise new DNA or remove primers. Think of it as the 'glue' of DNA replication.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00078`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Replication Origin`,subtopic:`Replication Origin`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In eukaryotic chromosomes, DNA replication begins at:`,options:[`A) A single origin of replication at the centromere`,`B) Multiple origins of replication (ori) along each chromosome`,`C) The telomeres at each end of the chromosome`,`D) The position of RNA polymerase`,`E) Randomly at any point along the chromosome`],correct_index:1,explanation:`Eukaryotic chromosomes have thousands of origins of replication (ori), allowing simultaneous replication at many points. This is necessary because eukaryotic chromosomes are much larger than prokaryotic chromosomes. In prokaryotes (circular chromosome), there is a single origin (oriC). Replication proceeds bidirectionally from each origin, forming replication bubbles that merge as replication completes.`,concepts_tested:[`replication origin`,`eukaryotes`,`multiple origins`,`bidirectional replication`],formulas_used:[],common_trap:`Prokaryotes: 1 origin. Eukaryotes: thousands of origins. More origins = faster replication of large chromosomes.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00079`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Proofreading`,subtopic:`Proofreading`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`DNA polymerase III has 3'→5' exonuclease activity. What is the function of this activity?`,options:[`A) It synthesises the lagging strand in the 3'→5' direction`,`B) It removes incorrectly incorporated nucleotides (proofreading)`,`C) It removes RNA primers after replication`,`D) It separates the DNA strands for replication`,`E) It adds nucleotides to the 3' end of Okazaki fragments`],correct_index:1,explanation:`The 3'→5' exonuclease activity of DNA polymerase III is its proofreading function. After adding each nucleotide in the 5'→3' direction, the polymerase checks if the base pair is correct. If an error is detected, the 3'→5' exonuclease removes the wrong nucleotide (working backwards), and then correct synthesis continues. This reduces the error rate from ~1 in 10⁵ to ~1 in 10⁷. Mismatch repair further reduces this to ~1 in 10⁹.`,concepts_tested:[`proofreading`,`exonuclease`,`DNA polymerase`,`error correction`,`fidelity`],formulas_used:[],common_trap:`The 3'→5' exonuclease goes BACKWARDS to remove errors. The 5'→3' polymerase activity goes FORWARDS to add nucleotides. These are two separate activities of the same enzyme.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00080`,subject:`Biology`,chapter:`Ch8: DNA Replication`,topic:`Replication Summary`,subtopic:`Replication Summary`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which enzyme joins the lagging strand Okazaki fragments into a continuous strand?`,options:[`A) Helicase`,`B) Primase`,`C) DNA polymerase I (in prokaryotes) / RNase H (in eukaryotes)`,`D) DNA ligase`,`E) Topoisomerase`],correct_index:3,explanation:`DNA ligase creates the final phosphodiester bonds joining Okazaki fragments into a continuous strand, AFTER the RNA primers are removed and gaps filled. In prokaryotes, DNA polymerase I removes RNA primers (5'→3' exonuclease) and fills gaps simultaneously. In eukaryotes, RNase H and FEN1 remove primers, and DNA polymerase δ fills gaps. DNA ligase then seals the final nick in both cases.`,concepts_tested:[`DNA ligase`,`lagging strand`,`Okazaki fragments`,`primer removal`],formulas_used:[],common_trap:`The complete lagging strand synthesis requires: primase → DNA pol III → DNA pol I (removes primer/fills gap) → DNA ligase (seals). Each enzyme has a distinct role.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00081`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Promoter`,subtopic:`Promoter`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following best describes the function of a promoter in transcription?`,options:[`A) It codes for the first amino acid of the protein`,`B) It is the DNA sequence where RNA polymerase binds to initiate transcription`,`C) It is the start codon AUG on the mRNA`,`D) It enhances the stability of the mRNA after transcription`,`E) It codes for the ribosome binding site`],correct_index:1,explanation:`A promoter is a specific DNA sequence upstream (5') of the gene that RNA polymerase (and transcription factors in eukaryotes) recognise and bind to initiate transcription. The TATA box (~25-30 bp upstream) is a key promoter element in eukaryotes. The promoter determines: (1) where transcription starts, (2) which strand is the template, (3) the direction of transcription.`,concepts_tested:[`promoter`,`RNA polymerase`,`transcription initiation`,`TATA box`],formulas_used:[],common_trap:`The promoter is on the DNA. The start codon (AUG) is on the mRNA. They are different things: promoter = 'switches on' transcription; start codon = begins translation.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00082`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Ribosome Structure`,subtopic:`Ribosome Structure`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In eukaryotic ribosomes, the large subunit is 60S and the small subunit is 40S. What is the combined sedimentation coefficient?`,options:[`A) 100S`,`B) 80S`,`C) 70S`,`D) 50S`,`E) 110S`],correct_index:1,explanation:`The eukaryotic ribosome is 80S, composed of a 60S large subunit and a 40S small subunit. Note: S values are Svedberg units (sedimentation coefficients) and are NOT additive (60+40≠100 because they reflect shape and density, not just mass). The 80S ribosome has: large subunit (28S, 5.8S, 5S rRNA + ~49 proteins) and small subunit (18S rRNA + ~33 proteins). Prokaryotic ribosomes are 70S (50S + 30S).`,concepts_tested:[`ribosome`,`80S`,`60S`,`40S`,`eukaryotes`,`Svedberg units`],formulas_used:[],common_trap:`S values are NOT additive! 60S + 40S = 80S (eukaryotes). 50S + 30S = 70S (prokaryotes). This non-additivity confuses students.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00083`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Translation Steps`,subtopic:`Translation Steps`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly lists the stages of translation in the correct order?`,options:[`A) Initiation → Termination → Elongation`,`B) Elongation → Initiation → Termination`,`C) Initiation → Elongation → Termination`,`D) Transcription → Initiation → Elongation`,`E) Initiation → Elongation → Splicing`],correct_index:2,explanation:`Translation proceeds in three stages: (1) Initiation: ribosome assembles on mRNA, initiator tRNA (Met-tRNA) binds the start codon AUG in the P site. (2) Elongation: repeated cycles of aminoacyl-tRNA binding to A site, peptide bond formation (by peptidyl transferase), and translocation (ribosome moves 3 nt towards 3' end). (3) Termination: stop codon (UAA, UAG, or UGA) is reached, release factor binds, polypeptide released.`,concepts_tested:[`translation`,`initiation`,`elongation`,`termination`,`ribosome`],formulas_used:[],common_trap:`Splicing occurs during mRNA PROCESSING (in nucleus), not during translation. Transcription also precedes translation entirely.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00084`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Stop Codons`,subtopic:`Stop Codons`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following are the three stop codons?`,options:[`A) UAA, UAG, UGA`,`B) UAA, UAG, UGG`,`C) UAA, UGA, AUG`,`D) UAG, UGA, UGC`,`E) UGA, UAU, UAA`],correct_index:0,explanation:`The three stop (nonsense) codons are: UAA ('ochre'), UAG ('amber'), and UGA ('opal' or 'umber'). They do not code for any amino acid and are not recognised by tRNA — instead, release factors (proteins) bind, triggering release of the completed polypeptide chain and dissociation of the ribosome. AUG is the start codon (methionine). UGG codes for tryptophan.`,concepts_tested:[`stop codons`,`UAA`,`UAG`,`UGA`,`termination`],formulas_used:[],common_trap:`UGG codes for tryptophan (the only single-codon amino acid apart from methionine/AUG). Do not confuse UGG with UGA (stop codon).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00085`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Post-translational Modification`,subtopic:`Post-translational Modification`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following is an example of post-translational modification?`,options:[`A) Addition of a 5' cap to mRNA`,`B) Removal of introns from pre-mRNA`,`C) Cleavage of a signal peptide after protein synthesis`,`D) Addition of a poly-A tail to mRNA`,`E) Binding of ribosomal subunits to mRNA`],correct_index:2,explanation:`Post-translational modifications occur AFTER the polypeptide is synthesised by the ribosome. Examples include: phosphorylation, glycosylation, ubiquitination, signal peptide cleavage (removes N-terminal targeting sequence), disulfide bond formation, and proteolytic cleavage (e.g. proinsulin → insulin). Options A, B, D are pre-translational (mRNA processing). Option E is part of translation initiation.`,concepts_tested:[`post-translational modification`,`signal peptide`,`protein processing`,`phosphorylation`],formulas_used:[],common_trap:`Pre-translational = mRNA processing (capping, tailing, splicing). Post-translational = protein modifications after ribosome releases it. Different cell locations, different enzymes.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00086`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Polysome`,subtopic:`Polysome`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A polyribosome (polysome) is:`,options:[`A) A ribosome with multiple subunits`,`B) Multiple ribosomes translating the same mRNA simultaneously`,`C) A ribosome that reads multiple mRNAs at once`,`D) A cluster of mRNAs around a single ribosome`,`E) The large subunit of the eukaryotic ribosome`],correct_index:1,explanation:`A polysome (polyribosome) is a single mRNA molecule being translated simultaneously by multiple ribosomes. As the first ribosome moves along the mRNA (translating), a second ribosome can attach to the start codon and begin translation. This allows rapid production of multiple copies of the same protein from a single mRNA. In electron microscopy, polysomes appear as beads on a string.`,concepts_tested:[`polysome`,`ribosome`,`translation efficiency`,`mRNA`,`protein synthesis`],formulas_used:[],common_trap:`Polysomes increase the efficiency of translation — many copies of a protein can be made from one mRNA at the same time.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00087`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Mutation Types`,subtopic:`Mutation Types`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A point mutation that changes a codon from AUG to AUA would most likely result in:`,options:[`A) No change in the protein (silent mutation)`,`B) Insertion of the wrong amino acid (missense mutation)`,`C) A premature stop codon (nonsense mutation)`,`D) A frameshift mutation`,`E) Complete loss of gene expression`],correct_index:1,explanation:`AUG codes for Methionine. AUA also codes for Isoleucine (Ile) — this is a missense mutation: the codon still specifies AN amino acid, but a different one. A silent (synonymous) mutation would change the codon but still specify the same amino acid (due to degeneracy). A nonsense mutation creates a stop codon. A frameshift adds/deletes nucleotides changing the reading frame. Point mutations that change one base are substitutions.`,concepts_tested:[`point mutation`,`missense mutation`,`silent mutation`,`codon`,`amino acid substitution`],formulas_used:[],common_trap:`Silent: different codon, same amino acid. Missense: different amino acid. Nonsense: creates stop codon. Frameshift: insertion/deletion shifts reading frame.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00088`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Introns and Exons`,subtopic:`Introns and Exons`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly defines introns and exons?`,options:[`A) Introns are coding sequences; exons are non-coding sequences removed by splicing`,`B) Exons are coding sequences retained in mRNA; introns are non-coding sequences removed by splicing`,`C) Both introns and exons are translated into protein`,`D) Introns are found only in prokaryotes`,`E) Exons are removed during splicing; introns remain in mRNA`],correct_index:1,explanation:`Exons = EXpressed sequences — they are retained in the mature mRNA and translated into protein. Introns = INTRAgenic sequences (non-coding in most cases) — they are transcribed into pre-mRNA but removed by the spliceosome before the mature mRNA is exported. After splicing, the exons are joined together. Prokaryotes generally lack introns.`,concepts_tested:[`introns`,`exons`,`splicing`,`spliceosome`,`pre-mRNA`],formulas_used:[],common_trap:`EXons are EXpressed. INtrons are IN the pre-mRNA but removed. 'Introns go OUT; exons stay IN.'`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00089`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Aminoacyl-tRNA`,subtopic:`Aminoacyl-tRNA`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`The enzyme that attaches an amino acid to its correct tRNA is called:`,options:[`A) Peptidyl transferase`,`B) Aminoacyl-tRNA synthetase`,`C) RNA polymerase`,`D) Ribonuclease`,`E) Ligase`],correct_index:1,explanation:`Aminoacyl-tRNA synthetase (one for each amino acid) recognises both the specific amino acid and its correct tRNA, catalysing the ATP-dependent attachment of the amino acid to the 3' CCA end of the tRNA. This is often called 'charging' the tRNA. There are 20 aminoacyl-tRNA synthetases (one per amino acid). The correct charging of each tRNA is critical — errors here would lead to incorporation of wrong amino acids.`,concepts_tested:[`aminoacyl-tRNA synthetase`,`tRNA charging`,`amino acid`,`translation accuracy`],formulas_used:[],common_trap:`Peptidyl transferase is the ribosomal activity that forms peptide bonds BETWEEN amino acids already on the ribosome. Aminoacyl-tRNA synthetase CHARGES the tRNA BEFORE it goes to the ribosome.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00090`,subject:`Biology`,chapter:`Ch9: Transcription & Translation`,topic:`Reading Frame`,subtopic:`Reading Frame`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`A mutation causes deletion of the 4th nucleotide of an mRNA. Which of the following best describes the consequence?`,options:[`A) Only codon 2 is affected — a missense mutation`,`B) A frameshift mutation affects all codons from position 2 onwards`,`C) The mutation only affects the protein if it occurs in an exon`,`D) The protein is shortened by one amino acid`,`E) The mutation only affects tRNA binding at the A site`],correct_index:1,explanation:`Deletion of a single nucleotide causes a frameshift mutation: the reading frame shifts by 1 nucleotide from that point onwards, affecting ALL codons downstream. This usually produces a completely non-functional protein with a different amino acid sequence and often an early stop codon. Since the deletion is of the 4th nucleotide (in codon 2), codon 1 is unaffected but all subsequent codons are garbled.`,concepts_tested:[`frameshift mutation`,`reading frame`,`deletion`,`codon`,`mutation consequences`],formulas_used:[],common_trap:`Frameshift = insertion or deletion of nucleotides NOT in multiples of 3. Even one nucleotide change shifts the entire reading frame downstream. 3-nucleotide insertion/deletion = adds/removes one amino acid (less severe).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00091`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Mendelian Genetics`,subtopic:`Mendelian Genetics`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`In a monohybrid cross between two heterozygous parents (Tt × Tt), what is the expected phenotypic ratio of the offspring?`,options:[`A) 1:1`,`B) 3:1`,`C) 1:2:1`,`D) 9:3:3:1`,`E) 1:3`],correct_index:1,explanation:`Using a Punnett square for Tt × Tt: TT (25%), Tt (50%), tt (25%). If T (tall) is dominant over t (short): tall phenotype = TT + Tt = 75%, short = tt = 25%. Phenotypic ratio = 3 tall : 1 short. The genotypic ratio is 1 TT : 2 Tt : 1 tt (1:2:1). The 9:3:3:1 ratio applies to dihybrid crosses (AaBb × AaBb).`,concepts_tested:[`Mendelian genetics`,`monohybrid cross`,`Punnett square`,`phenotypic ratio`,`dominant`,`recessive`],formulas_used:[],common_trap:`3:1 = phenotypic ratio (heterozygous × heterozygous, monohybrid). 1:2:1 = genotypic ratio. 9:3:3:1 = dihybrid phenotypic ratio. Don't confuse these.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00092`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Test Cross`,subtopic:`Test Cross`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A test cross is performed by crossing an organism of unknown genotype with:`,options:[`A) A homozygous dominant organism`,`B) A heterozygous organism`,`C) A homozygous recessive organism`,`D) Another organism of unknown genotype`,`E) An organism of a different species`],correct_index:2,explanation:`A test cross uses a homozygous RECESSIVE organism (genotype: aa) to determine the unknown genotype. If the unknown is homozygous dominant (AA): all offspring show dominant phenotype (100% Aa). If the unknown is heterozygous (Aa): offspring are 50% Aa (dominant) and 50% aa (recessive). The recessive parent contributes only recessive alleles, so any recessive offspring reveal a hidden recessive allele in the unknown parent.`,concepts_tested:[`test cross`,`homozygous recessive`,`genotype determination`,`Mendelian genetics`],formulas_used:[],common_trap:`The test cross REVEALS hidden recessive alleles. Only cross with a homozygous RECESSIVE — not dominant — so offspring phenotypes directly reflect the unknown's genotype.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00093`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`X-linked Inheritance`,subtopic:`X-linked Inheritance`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`A woman who is a carrier for X-linked recessive colour blindness (X^B X^b) has children with a man with normal vision (X^B Y). What percentage of their sons will be colour blind?`,options:[`A) 0%`,`B) 25%`,`C) 50%`,`D) 75%`,`E) 100%`],correct_index:2,explanation:`Mother's gametes: X^B or X^b (50% each). Father's gametes: X^B or Y (50% each). Sons receive Y from father plus either X^B or X^b from mother: X^B Y (normal vision) or X^b Y (colour blind) — 50% of sons are colour blind. Daughters receive X^B from father: X^B X^B (normal) or X^B X^b (carrier) — 0% of daughters affected. X-linked recessive conditions affect males much more than females.`,concepts_tested:[`X-linked`,`colour blindness`,`sex-linked`,`carrier`,`X-linked recessive`],formulas_used:[],common_trap:`Only SONS can be affected by X-linked recessive conditions (when their mother is a carrier). Daughters cannot be affected if they receive X^B from their father.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00094`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Codominance`,subtopic:`Codominance`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In the ABO blood group system, a person with genotype I^A I^B has blood group AB. This is an example of:`,options:[`A) Complete dominance`,`B) Incomplete dominance`,`C) Codominance`,`D) Epistasis`,`E) Polygenic inheritance`],correct_index:2,explanation:`Codominance: both alleles are FULLY expressed in the heterozygote. In blood group AB (I^A I^B), BOTH A and B antigens are expressed on red blood cells — neither allele is dominant over the other. Incomplete dominance produces an intermediate phenotype (e.g. red × white → pink flowers). Complete dominance: one allele masks the other. Blood group O (ii) is recessive to both I^A and I^B.`,concepts_tested:[`codominance`,`ABO blood group`,`alleles`,`incomplete dominance`],formulas_used:[],common_trap:`Codominance ≠ incomplete dominance. In codominance, both phenotypes are fully expressed. In incomplete dominance, a blended/intermediate phenotype results.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00095`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Dihybrid Cross`,subtopic:`Dihybrid Cross`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Two plants heterozygous for both seed colour (Yy) and seed texture (Rr) are crossed. What proportion of offspring will have green (yy) wrinkled (rr) seeds?`,options:[`A) 1/4`,`B) 1/8`,`C) 1/16`,`D) 3/16`,`E) 9/16`],correct_index:2,explanation:`Using the law of independent assortment: P(yy) = 1/4, P(rr) = 1/4. P(yy AND rr) = 1/4 × 1/4 = 1/16. The full 9:3:3:1 dihybrid ratio: 9 Y_R_ (yellow round) : 3 Y_rr (yellow wrinkled) : 3 yyR_ (green round) : 1 yyrr (green wrinkled). Only 1 in 16 offspring will be green wrinkled.`,concepts_tested:[`dihybrid cross`,`independent assortment`,`Mendel`,`probability`,`9:3:3:1`],formulas_used:[],common_trap:`For independent assortment, multiply individual probabilities: P(yy) × P(rr) = 1/4 × 1/4 = 1/16. The full dihybrid phenotypic ratio is always 9:3:3:1.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00096`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Hardy-Weinberg`,subtopic:`Hardy-Weinberg`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`In a population at Hardy-Weinberg equilibrium, the frequency of a recessive allele (q) is 0.3. What is the frequency of heterozygous carriers?`,options:[`A) 0.09`,`B) 0.49`,`C) 0.42`,`D) 0.21`,`E) 0.51`],correct_index:2,explanation:`Hardy-Weinberg equations: p + q = 1 and p² + 2pq + q² = 1. Given q = 0.3: p = 1 - 0.3 = 0.7. Heterozygous frequency = 2pq = 2 × 0.7 × 0.3 = 0.42. Homozygous dominant (p²) = 0.49. Homozygous recessive (q²) = 0.09. Check: 0.49 + 0.42 + 0.09 = 1.0 ✓`,concepts_tested:[`Hardy-Weinberg`,`allele frequency`,`heterozygous`,`carrier frequency`,`population genetics`],formulas_used:[],common_trap:`2pq = heterozygous carriers. p² = homozygous dominant. q² = homozygous recessive. The frequency q² is NOT the same as q. If q = 0.3, then q² = 0.09 (only 9% of population is homozygous recessive, not 30%).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00097`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Epistasis`,subtopic:`Epistasis`,difficulty:`hard`,year_style:`2025`,question_type:`single_best`,question:`In Labrador retrievers, coat colour is determined by two genes: B/b (black/brown) and E/e (expression/no pigment). Dogs with ee genotype are yellow regardless of the B genotype. A BbEe × BbEe cross gives which phenotypic ratio?`,options:[`A) 9:3:3:1`,`B) 9:3:4`,`C) 9:7`,`D) 12:3:1`,`E) 15:1`],correct_index:3,explanation:`This is epistasis (recessive epistasis): ee masks the B gene entirely. The 9:3:3:1 ratio is modified: 9 B_E_ (black) + 3 bbE_ (brown) + 3 B_ee (yellow) + 1 bbee (yellow) = 9 black : 3 brown : 4 yellow = 9:3:4 ratio. The ee genotype is epistatic to the B locus — it 'switches off' colour expression.`,concepts_tested:[`epistasis`,`Labrador genetics`,`9:3:4`,`gene interaction`,`recessive epistasis`],formulas_used:[],common_trap:`Epistasis modifies the 9:3:3:1 ratio. Recessive epistasis (two recessive alleles at locus E suppress locus B) gives 9:3:4. This is a classic Lab retriever genetics question.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00098`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Pedigree Analysis`,subtopic:`Pedigree Analysis`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a pedigree showing an autosomal recessive condition, two unaffected parents have an affected child. What are the genotypes of the parents?`,options:[`A) AA × AA`,`B) Aa × AA`,`C) Aa × Aa`,`D) AA × aa`,`E) Aa × aa`],correct_index:2,explanation:`For two UNAFFECTED parents to have an AFFECTED child (aa), BOTH parents must carry one copy of the recessive allele — they must both be heterozygous carriers (Aa). An Aa × Aa cross gives: 1 AA : 2 Aa : 1 aa. The probability of an affected child is 1/4 (25%). If either parent were AA or if only one were Aa, an affected (aa) child would be impossible.`,concepts_tested:[`pedigree analysis`,`autosomal recessive`,`carrier`,`Aa`,`family genetics`],formulas_used:[],common_trap:`Both parents must be Aa — NOT AA. If one parent were AA, no aa offspring could be produced. Two unaffected parents with an affected child = both parents are carriers (Aa × Aa).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00099`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Linkage`,subtopic:`Linkage`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Two genes located very close together on the same chromosome tend to be inherited together because:`,options:[`A) They have identical alleles`,`B) They are linked and rarely separated by crossing over`,`C) They are both on autosomes`,`D) They are both expressed in the same tissue`,`E) They follow Mendel's law of independent assortment`],correct_index:1,explanation:`Genes on the same chromosome are linked and tend to be inherited together (as a unit) rather than assorted independently. The frequency of recombination (crossing over) between them depends on their physical distance: genes far apart recombine frequently (~50% = behaves like independent assortment); genes close together recombine rarely (low recombination frequency = strong linkage). Map units (cM) = % recombination frequency.`,concepts_tested:[`gene linkage`,`crossing over`,`recombination`,`chromosome`,`map units`],formulas_used:[],common_trap:`Linked genes on the same chromosome tend to be inherited TOGETHER. But crossing over can separate them — the closer they are, the less likely crossing over will separate them.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00100`,subject:`Biology`,chapter:`Ch10: Genetics & Inheritance`,topic:`Mutation`,subtopic:`Mutation`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which type of chromosomal mutation involves a segment of chromosome being present three times instead of two?`,options:[`A) Deletion`,`B) Inversion`,`C) Translocation`,`D) Duplication`,`E) Aneuploidy`],correct_index:3,explanation:`A chromosomal duplication involves a segment of a chromosome being replicated so it appears more than once. This results in extra gene copies. Notable example: BRCA1 duplication. Aneuploidy refers to abnormal chromosome NUMBER (e.g. trisomy 21 in Down syndrome). Deletion loses a segment. Inversion reverses a segment. Translocation moves a segment to another chromosome.`,concepts_tested:[`chromosomal duplication`,`mutation`,`aneuploidy`,`chromosome abnormality`],formulas_used:[],common_trap:`Duplication = extra COPY of a segment. Aneuploidy = extra whole CHROMOSOME (e.g. trisomy). Don't confuse segment duplications with whole chromosome aneuploidies.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00101`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Mitosis`,subtopic:`Mitosis`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`During which phase of mitosis do chromosomes line up along the cell's equatorial plate (metaphase plate)?`,options:[`A) Prophase`,`B) Prometaphase`,`C) Metaphase`,`D) Anaphase`,`E) Telophase`],correct_index:2,explanation:`In METAPHASE, chromosomes reach their maximum condensation and align at the metaphase plate (cell equator), equidistant from both poles. Spindle fibres from opposite poles attach to the kinetochores of each chromatid. In PROPHASE, chromosomes condense and spindle forms. ANAPHASE: sister chromatids separate and move to poles. TELOPHASE: nuclear envelopes re-form, chromosomes decondense.`,concepts_tested:[`mitosis`,`metaphase`,`chromosomes`,`cell division`,`spindle`],formulas_used:[],common_trap:`PMAT: Prophase (condense), Metaphase (middle/align), Anaphase (apart/separate), Telophase (two nuclei). Metaphase = chromosomes aligned in the MIDDLE.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00102`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Mitosis vs Meiosis`,subtopic:`Mitosis vs Meiosis`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly distinguishes mitosis from meiosis?`,options:[`A) Mitosis produces 4 haploid cells; meiosis produces 2 diploid cells`,`B) Mitosis occurs in germline cells; meiosis occurs in somatic cells`,`C) Mitosis produces genetically identical diploid cells; meiosis produces genetically unique haploid cells`,`D) Crossing over occurs in mitosis but not meiosis`,`E) Meiosis involves one division; mitosis involves two divisions`],correct_index:2,explanation:`Mitosis: one division, 2 daughter cells, same ploidy as parent (diploid → diploid), genetically identical (barring mutation), occurs in somatic cells for growth/repair. Meiosis: two divisions (meiosis I + II), 4 daughter cells, reduces ploidy (diploid → haploid), genetically UNIQUE (crossing over + independent assortment), occurs in gonads for gamete production.`,concepts_tested:[`mitosis`,`meiosis`,`cell division`,`haploid`,`diploid`,`crossing over`],formulas_used:[],common_trap:`Crossing over occurs in MEIOSIS I (prophase I) — NOT in mitosis. Meiosis has TWO divisions. Mitosis has ONE.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00103`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Meiosis I`,subtopic:`Meiosis I`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`What is the significance of crossing over during prophase I of meiosis?`,options:[`A) It doubles the number of chromosomes`,`B) It creates genetic variation by exchanging segments between homologous chromosomes`,`C) It ensures sister chromatids separate equally`,`D) It prevents non-disjunction`,`E) It reduces the chromosome number from diploid to haploid`],correct_index:1,explanation:`Crossing over (recombination) during prophase I: homologous chromosomes pair up (synapsis) and form bivalents. Non-sister chromatids exchange corresponding segments at chiasmata. This shuffles alleles, creating new combinations of genetic material in the gametes. Combined with independent assortment, crossing over generates enormous genetic variation — critical for evolution and natural selection.`,concepts_tested:[`crossing over`,`prophase I`,`meiosis`,`genetic variation`,`chiasma`,`recombination`],formulas_used:[],common_trap:`Crossing over occurs between NON-SISTER chromatids of HOMOLOGOUS chromosomes. It does NOT occur between sister chromatids (which are identical) or in mitosis.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00104`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Chromosome Number`,subtopic:`Chromosome Number`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`A human somatic (body) cell has 46 chromosomes. How many chromosomes does a secondary oocyte contain?`,options:[`A) 23`,`B) 46`,`C) 69`,`D) 92`,`E) 22`],correct_index:0,explanation:`After meiosis I, the secondary oocyte is haploid with 23 chromosomes (each consisting of 2 sister chromatids joined at the centromere). Meiosis I separates HOMOLOGOUS chromosomes (reducing from 46 to 23). Meiosis II (which completes only upon fertilisation in oocytes) separates SISTER CHROMATIDS, producing 23 individual chromosomes. A primary oocyte has 46; secondary oocyte has 23.`,concepts_tested:[`meiosis`,`oocyte`,`haploid`,`chromosome number`,`secondary oocyte`],formulas_used:[],common_trap:`Primary oocyte = 46 chromosomes (diploid). Secondary oocyte = 23 chromosomes (haploid, but each has 2 chromatids). Mature ovum = 23 chromosomes (haploid, single chromatids).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00105`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Cell Cycle`,subtopic:`Cell Cycle`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which checkpoint in the cell cycle checks that DNA replication is complete and DNA is undamaged before the cell proceeds to mitosis?`,options:[`A) G1 checkpoint`,`B) G2/M checkpoint`,`C) Spindle assembly checkpoint`,`D) G0 checkpoint`,`E) S-phase checkpoint`],correct_index:1,explanation:`The G2/M checkpoint (at the end of G2 phase, before mitosis) verifies: (1) DNA replication is complete (all chromosomes duplicated), (2) DNA damage has been repaired, (3) the cell is large enough for division. Cyclin B/CDK1 drives entry into mitosis. The G1 checkpoint checks for DNA damage and adequate cell size before committing to S phase. The spindle assembly checkpoint (SAC) during metaphase checks that all kinetochores are attached to spindle fibres.`,concepts_tested:[`cell cycle`,`G2 checkpoint`,`checkpoint`,`DNA damage`,`CDK`,`cyclin`],formulas_used:[],common_trap:`G1 checkpoint: before DNA replication (commitment to divide). G2/M checkpoint: after replication, before mitosis. SAC: during mitosis, ensures correct chromosome attachment.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00106`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Cancer`,subtopic:`Cancer`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Loss of function of tumour suppressor genes (e.g. p53) promotes cancer because:`,options:[`A) They normally PROMOTE cell division — losing them slows division`,`B) They normally INHIBIT cell division — losing them removes the brake on proliferation`,`C) They produce growth factors that drive cell division when mutated`,`D) They repair DNA during S phase — losing them causes immediate cell death`,`E) They are required for apoptosis to occur normally`],correct_index:1,explanation:`Tumour suppressor genes (e.g. p53, Rb) normally INHIBIT cell cycle progression. p53 is activated by DNA damage and either: (1) halts the cell cycle to allow repair, or (2) triggers apoptosis if damage is irreparable. Loss of function (mutation) of p53 means damaged cells continue to divide unchecked — accumulating further mutations. Proto-oncogenes when mutated to oncogenes (gain of function) PROMOTE division.`,concepts_tested:[`tumour suppressor`,`p53`,`cancer`,`cell cycle control`,`oncogene`],formulas_used:[],common_trap:`Tumour suppressors are like 'brakes' — losing them removes the brake. Oncogenes are like 'accelerators' — gaining function (mutation) presses the accelerator. Cancer needs BOTH: gain of function in oncogenes AND loss of function in tumour suppressors.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00107`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Apoptosis`,subtopic:`Apoptosis`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Apoptosis (programmed cell death) differs from necrosis in that apoptosis:`,options:[`A) Causes inflammation and damages surrounding tissue`,`B) Is uncontrolled and random`,`C) Is genetically programmed, controlled, and does not cause inflammation`,`D) Only occurs in cancer cells`,`E) Requires bacteria or viruses to initiate`],correct_index:2,explanation:`Apoptosis is controlled, programmed cell death: cells shrink, chromatin condenses, DNA is fragmented by endonucleases, and apoptotic bodies are formed and phagocytosed — NO inflammatory response. Necrosis is uncontrolled death due to injury/toxins: cells swell and burst, releasing contents that trigger inflammation. Apoptosis is essential for: development (finger separation), immune selection, eliminating damaged/infected cells.`,concepts_tested:[`apoptosis`,`necrosis`,`programmed cell death`,`inflammation`,`cell death`],formulas_used:[],common_trap:`Apoptosis = clean, programmed, NO inflammation. Necrosis = messy, uncontrolled, CAUSES inflammation. This distinction is clinically and biologically important.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00108`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Cytokinesis`,subtopic:`Cytokinesis`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`In animal cells, cytokinesis (cytoplasmic division) occurs by:`,options:[`A) Formation of a cell plate from Golgi vesicles`,`B) Contraction of an actin-myosin contractile ring`,`C) Microtubule elongation pushing the cell apart`,`D) Nuclear membrane expanding to divide the cell`,`E) Endocytosis of the central cell membrane`],correct_index:1,explanation:`In animal cells, cytokinesis occurs by formation of a cleavage furrow — actin filaments and myosin II form a contractile ring around the cell equator, which contracts and pinches the cell in two (like tightening a purse string). In PLANT cells (with a rigid cell wall), cytokinesis occurs differently: Golgi vesicles fuse at the equator to form the cell plate, which eventually becomes the new cell wall.`,concepts_tested:[`cytokinesis`,`contractile ring`,`actin`,`myosin`,`cell division`,`animal cells`],formulas_used:[],common_trap:`Animal cells: cleavage furrow (actin-myosin ring). Plant cells: cell plate (Golgi vesicles). They use different mechanisms because plant cells have a cell wall that prevents cleavage.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00109`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Non-disjunction`,subtopic:`Non-disjunction`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Non-disjunction during meiosis I results in:`,options:[`A) Four normal haploid gametes`,`B) Two gametes with an extra chromosome and two normal gametes`,`C) All gametes having either n+1 or n-1 chromosomes`,`D) One gamete with extra chromosomes and three normal gametes`,`E) Gametes with double the normal chromosome number`],correct_index:2,explanation:`If non-disjunction occurs in meiosis I (homologous chromosomes fail to separate): after meiosis I, one secondary oocyte/cell has n+1 chromosomes and one has n-1. After meiosis II (sister chromatids separate normally): two gametes have n+1 and two have n-1. NONE are normal. If non-disjunction in meiosis II: two normal + one n+1 + one n-1 gametes.`,concepts_tested:[`non-disjunction`,`aneuploidy`,`meiosis`,`gametes`,`trisomy`],formulas_used:[],common_trap:`Non-disjunction in meiosis I → ALL 4 gametes abnormal (2 have n+1, 2 have n-1). Non-disjunction in meiosis II → 2 normal + 1 n+1 + 1 n-1. The timing determines which gametes are affected.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00110`,subject:`Biology`,chapter:`Ch11: Cell Division`,topic:`Down Syndrome`,subtopic:`Down Syndrome`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Down syndrome (trisomy 21) results from:`,options:[`A) Deletion of part of chromosome 21`,`B) Non-disjunction causing three copies of chromosome 21`,`C) Mutation in a gene on chromosome 21`,`D) X chromosome non-disjunction`,`E) Translocation of chromosome 21 material to chromosome 14 only`],correct_index:1,explanation:`Trisomy 21 (Down syndrome) most commonly results from non-disjunction during meiosis I or II, causing an egg or sperm with two copies of chromosome 21 — fertilisation then produces a zygote with three copies. Risk increases with maternal age. Rare cases (~4%) involve Robertsonian translocation (21 material translocates to 14), which can be inherited. Features: intellectual disability, characteristic facial features, heart defects.`,concepts_tested:[`Down syndrome`,`trisomy 21`,`non-disjunction`,`aneuploidy`,`maternal age`],formulas_used:[],common_trap:`Most cases (~95%) = free trisomy 21 from non-disjunction. ~4% = Robertsonian translocation. ~1% = mosaic. All are trisomy 21 but have different mechanisms.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00111`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Muscle Contraction`,subtopic:`Muscle Contraction`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`According to the sliding filament theory, muscle contraction occurs when:`,options:[`A) Myosin filaments shorten and pull actin filaments`,`B) Actin filaments shorten, reducing sarcomere length`,`C) Actin filaments slide over myosin filaments, shortening the sarcomere`,`D) Both actin and myosin filaments shorten simultaneously`,`E) Titin proteins contract to pull the Z-lines together`],correct_index:2,explanation:`The sliding filament theory (Huxley & Hanson, 1954): neither actin nor myosin filaments change length — instead, actin thin filaments SLIDE over myosin thick filaments towards the centre of the sarcomere. This shortens the sarcomere (H zone and I band shorten; A band stays the same). Myosin heads (cross-bridges) use ATP to cyclically bind actin, pull it (power stroke), release, and reset.`,concepts_tested:[`sliding filament theory`,`sarcomere`,`actin`,`myosin`,`muscle contraction`],formulas_used:[],common_trap:`NOTHING SHORTENS in sliding filament theory — neither actin nor myosin filaments. Only the SARCOMERE shortens (via I band and H zone narrowing). The A band (myosin length) stays constant.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00112`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Sarcomere`,subtopic:`Sarcomere`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In a sarcomere, which band remains CONSTANT in length during muscle contraction?`,options:[`A) I band`,`B) H zone`,`C) A band`,`D) Z disc width`,`E) The whole sarcomere`],correct_index:2,explanation:`The A band = length of the myosin (thick) filaments = stays CONSTANT because myosin itself does not shorten. During contraction: I band (thin filaments only) shortens as actin slides inward. H zone (myosin only, no actin overlap) narrows as actin slides in. The distance between Z lines (sarcomere length) decreases. A band length = myosin length = unchanged.`,concepts_tested:[`sarcomere`,`A band`,`I band`,`H zone`,`sliding filament`,`muscle contraction`],formulas_used:[],common_trap:`A band = myosin = constant. I band = actin only region = shortens. H zone = no actin zone = narrows. Sarcomere = whole unit = shortens. ONLY the A band stays the same.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00113`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Neuromuscular Junction`,subtopic:`Neuromuscular Junction`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`At the neuromuscular junction, the neurotransmitter released by the motor neuron is:`,options:[`A) Noradrenaline`,`B) Dopamine`,`C) Acetylcholine`,`D) GABA`,`E) Serotonin`],correct_index:2,explanation:`At the neuromuscular junction (NMJ), the motor neuron releases acetylcholine (ACh) into the synaptic cleft. ACh binds to nicotinic ACh receptors on the motor end plate (sarcolemma), causing depolarisation. This action potential propagates along the T-tubules, triggering Ca²⁺ release from the sarcoplasmic reticulum. Ca²⁺ binds troponin, moving tropomyosin to expose actin binding sites, allowing myosin cross-bridge formation.`,concepts_tested:[`neuromuscular junction`,`acetylcholine`,`motor neuron`,`muscle contraction`,`ACh receptor`],formulas_used:[],common_trap:`NMJ uses acetylcholine (ACh). Noradrenaline/adrenaline act at adrenergic receptors (heart, smooth muscle). The NMJ uses nicotinic ACh receptors — different from muscarinic ACh receptors found elsewhere.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00114`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Bone Structure`,subtopic:`Bone Structure`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which cells are responsible for BREAKING DOWN bone matrix (bone resorption)?`,options:[`A) Osteoblasts`,`B) Osteocytes`,`C) Osteoclasts`,`D) Chondrocytes`,`E) Fibroblasts`],correct_index:2,explanation:`Osteoclasts are large multinucleated cells derived from monocytes that break down (resorb) bone matrix by secreting acid and proteolytic enzymes. Osteoblasts BUILD new bone matrix (osteoid) and then become trapped as osteocytes. Osteocytes are mature bone cells that maintain the bone matrix and sense mechanical stress. Chondrocytes produce cartilage. Bone remodelling = osteoclast resorption + osteoblast deposition.`,concepts_tested:[`osteoclast`,`osteoblast`,`bone remodelling`,`bone resorption`,`osteocyte`],formulas_used:[],common_trap:`'Blast' = BUILDS. 'Clast' = BREAKS. Osteoblast = bone builder. Osteoclast = bone breaker. Easy mnemonic.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00115`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Joints`,subtopic:`Joints`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which type of joint allows the greatest range of movement?`,options:[`A) Fibrous joint (suture)`,`B) Cartilaginous joint (symphysis)`,`C) Synovial joint (ball-and-socket)`,`D) Pivot joint`,`E) Hinge joint`],correct_index:2,explanation:`Synovial ball-and-socket joints (e.g. hip, shoulder) allow movement in all planes — flexion/extension, abduction/adduction, rotation, circumduction. The rounded head of one bone fits into the cup-shaped socket of another. Fibrous joints (sutures in skull) allow no movement. Cartilaginous joints (pubic symphysis) allow limited movement. Hinge joints (elbow, knee) allow flexion/extension only. Pivot joints (atlas/axis) allow rotation only.`,concepts_tested:[`synovial joint`,`ball and socket joint`,`range of movement`,`joint types`],formulas_used:[],common_trap:`Ball-and-socket = MOST movement. Hinge = one plane only. Fibrous = NO movement. The shoulder has MORE movement than the hip (less stable, more mobile).`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00116`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Muscle Types`,subtopic:`Muscle Types`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly matches a muscle type with its characteristics?`,options:[`A) Cardiac muscle — voluntary, striated, mononucleated`,`B) Smooth muscle — involuntary, non-striated, mononucleated`,`C) Skeletal muscle — involuntary, striated, multinucleated`,`D) Cardiac muscle — voluntary, non-striated, mononucleated`,`E) Smooth muscle — voluntary, non-striated, multinucleated`],correct_index:1,explanation:`Smooth muscle: involuntary (controlled by autonomic NS), non-striated (no sarcomeres visible), each cell mononucleated — correct (B). Skeletal muscle: voluntary, striated, multinucleated (from fusion of myoblasts). Cardiac muscle: involuntary, striated (has sarcomeres), each cardiomyocyte mono/binucleated, connected by intercalated discs (gap junctions for electrical coupling).`,concepts_tested:[`muscle types`,`smooth muscle`,`cardiac muscle`,`skeletal muscle`,`striated`],formulas_used:[],common_trap:`Cardiac = striated (like skeletal) but involuntary (like smooth). It is NOT mononucleated like smooth muscle in the traditional sense — it is mono/bi-nucleated but this is still 'mononucleated' vs skeletal's multinucleated.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00117`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Calcium in Contraction`,subtopic:`Calcium in Contraction`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`In skeletal muscle contraction, calcium ions (Ca²⁺) initiate the contractile mechanism by:`,options:[`A) Directly activating myosin ATPase`,`B) Binding to troponin, which moves tropomyosin to expose myosin binding sites on actin`,`C) Entering the muscle fibre from the extracellular fluid`,`D) Directly binding to actin and changing its shape`,`E) Activating ATP synthase to produce more ATP`],correct_index:1,explanation:`Ca²⁺ is released from the sarcoplasmic reticulum when an action potential travels down T-tubules. Ca²⁺ binds to TROPONIN (part of the troponin-tropomyosin complex on actin filaments). This causes a conformational change in troponin, which shifts TROPOMYOSIN away from the myosin-binding sites on actin. Exposed actin sites allow myosin heads to bind — cross-bridge cycling begins, powered by ATP hydrolysis.`,concepts_tested:[`calcium`,`troponin`,`tropomyosin`,`muscle regulation`,`sarcoplasmic reticulum`],formulas_used:[],common_trap:`Ca²⁺ binds TROPONIN (not directly myosin or actin). Troponin then moves tropomyosin. Three proteins: actin, tropomyosin, troponin — all involved in this regulation.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00118`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Bone Composition`,subtopic:`Bone Composition`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`The primary inorganic mineral found in bone matrix is:`,options:[`A) Calcium phosphate (hydroxyapatite)`,`B) Calcium carbonate`,`C) Magnesium sulphate`,`D) Sodium chloride`,`E) Potassium phosphate`],correct_index:0,explanation:`Bone matrix consists of ~65% inorganic mineral and ~35% organic matrix (osteoid = mainly collagen type I). The inorganic component is primarily hydroxyapatite [Ca₁₀(PO₄)₆(OH)₂] — calcium phosphate crystals that provide hardness and compressive strength. The collagen provides tensile strength (resistance to pulling). This combination makes bone strong yet slightly flexible.`,concepts_tested:[`bone composition`,`hydroxyapatite`,`calcium phosphate`,`collagen`,`bone matrix`],formulas_used:[],common_trap:`Hydroxyapatite provides HARDNESS. Collagen provides FLEXIBILITY/TENSILE strength. Remove mineral → rubbery bone. Remove collagen → brittle bone. Both components are needed.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00119`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Tendons vs Ligaments`,subtopic:`Tendons vs Ligaments`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which of the following correctly distinguishes tendons from ligaments?`,options:[`A) Tendons connect bone to bone; ligaments connect muscle to bone`,`B) Tendons connect muscle to bone; ligaments connect bone to bone`,`C) Tendons are elastic; ligaments are non-elastic`,`D) Both tendons and ligaments connect bone to bone`,`E) Tendons contain cartilage; ligaments contain bone`],correct_index:1,explanation:`Tendons: connect MUSCLE to BONE — transmit the force of muscle contraction to the skeleton (e.g. Achilles tendon = gastrocnemius muscle to calcaneus). Ligaments: connect BONE to BONE — stabilise joints by preventing excessive movement (e.g. ACL, MCL in the knee). Both are dense connective tissue made primarily of collagen type I, but ligaments contain more elastin.`,concepts_tested:[`tendons`,`ligaments`,`connective tissue`,`musculoskeletal`,`bone to bone`],formulas_used:[],common_trap:`TENDONS: Muscle → Bone (T = 'to bone'). LIGAMENTS: Bone → Bone (L = 'links bones'). This is one of the most commonly confused anatomical distinctions.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00120`,subject:`Biology`,chapter:`Ch12: Human Anatomy I - Musculoskeletal`,topic:`Vertebral Column`,subtopic:`Vertebral Column`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`How many vertebrae are found in the lumbar region of the human spine?`,options:[`A) 7`,`B) 12`,`C) 5`,`D) 4-5 (fused = sacrum)`,`E) 3-4 (fused = coccyx)`],correct_index:2,explanation:`The human vertebral column contains 33 vertebrae: Cervical (7) — neck, supports head; Thoracic (12) — chest, articulates with ribs; Lumbar (5) — lower back, largest vertebrae, weight-bearing; Sacral (5, fused = sacrum) — pelvic region; Coccygeal (4, fused = coccyx) — tailbone. The lumbar vertebrae are the largest and bear the most body weight.`,concepts_tested:[`vertebral column`,`lumbar vertebrae`,`spine anatomy`,`cervical`,`thoracic`],formulas_used:[],common_trap:`Cervical = 7. Thoracic = 12. Lumbar = 5. Sacral = 5 (fused). Coccygeal = 4 (fused). Total = 33. Mnemonic: C-7, T-12, L-5 / 'Breakfast at 7, lunch at 12, dinner at 5'.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00121`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Heart`,subtopic:`Heart`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which chamber of the heart pumps oxygenated blood into the aorta?`,options:[`A) Right atrium`,`B) Right ventricle`,`C) Left atrium`,`D) Left ventricle`,`E) Pulmonary trunk`],correct_index:3,explanation:`The left ventricle has the thickest muscular wall (because it pumps blood against the highest pressure — systemic circulation). It receives oxygenated blood from the left atrium (which received it from the pulmonary veins) and ejects it into the AORTA for systemic circulation. The right ventricle pumps deoxygenated blood to the lungs via the pulmonary artery.`,concepts_tested:[`heart chambers`,`left ventricle`,`aorta`,`cardiac anatomy`,`systemic circulation`],formulas_used:[],common_trap:`Right side = deoxygenated blood → lungs. Left side = oxygenated blood → body. Left ventricle → Aorta → body. Right ventricle → Pulmonary artery → lungs.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00122`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Haemoglobin`,subtopic:`Haemoglobin`,difficulty:`medium`,year_style:`2025`,question_type:`single_best`,question:`Haemoglobin's oxygen dissociation curve shifts to the RIGHT in which conditions?`,options:[`A) Low temperature, high pH, low CO₂`,`B) High temperature, low pH, high CO₂ (Bohr effect)`,`C) Low temperature, low pH, high CO₂`,`D) High temperature, high pH, low CO₂`,`E) Low temperature, low pH, low CO₂`],correct_index:1,explanation:`The Bohr effect: increased temperature, decreased pH (more acidic), and increased CO₂ (all conditions in active tissues) cause the O₂ dissociation curve to shift RIGHT — haemoglobin has LOWER affinity for O₂ and releases more O₂ to tissues. This is physiologically appropriate: active muscles need more O₂, produce more CO₂ and heat, and therefore cause Hb to release more O₂ where it is needed most.`,concepts_tested:[`haemoglobin`,`oxygen dissociation curve`,`Bohr effect`,`temperature`,`pH`,`CO2`],formulas_used:[],common_trap:`Right shift = LOWER affinity = MORE O₂ released to tissues. Left shift = HIGHER affinity = Hb holds O₂ more tightly (e.g. at the lungs: high O₂, low CO₂, higher pH). Bohr effect = right shift.`,image_required:!1,image_description:``,time_estimate_seconds:90,marks:1.5,negative_marks:.4,source_reference:`MUR-style 2025`,mur_aligned:!0},{id:`Q00123`,subject:`Biology`,chapter:`Ch13: Human Anatomy II - Circulation & Gas Transport`,topic:`Blood Vessels`,subtopic:`Blood Vessels`,difficulty:`easy`,year_style:`2025`,question_type:`single_best`,question:`Which blood vessels have the thickest walls with the most smooth muscle and elastic tissue?`,options:[`A) Veins`,`B) Capillaries`,`C) Arteries`,`D) Arterioles`,`E) Venules`],correct_index:2,explanation:`Arteries carry blood AWAY from the heart under HIGH pressure (systolic ~120 mmHg). They have thick
